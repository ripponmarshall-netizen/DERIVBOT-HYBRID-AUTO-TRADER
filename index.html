<script>

// =============================
// 🔒 LOCKED CONFIG
// =============================
const STRATEGIES = {
  DEFAULT: "default",
  MARSBOT_PRO_V50: "marsbot_pro_v50"
};

const MARSBOT_PRO_CONFIG = Object.freeze({
  expiryCandles: 4,
  baseRisk: 0.01,
  minConfidence: 70
});

// =============================
// 🧠 LEARNING ENGINE
// =============================
const AI_STATE = JSON.parse(localStorage.getItem("marsbot_ai")) || {
  wins: 0,
  losses: 0,
  rsiOffset: 0,
  confidenceOffset: 0
};

function saveAI() {
  localStorage.setItem("marsbot_ai", JSON.stringify(AI_STATE));
}

function updateAI(result) {
  if (result === "win") AI_STATE.wins++;
  if (result === "loss") AI_STATE.losses++;

  const total = AI_STATE.wins + AI_STATE.losses;
  const winRate = total ? AI_STATE.wins / total : 0.5;

  // Adaptive logic
  if (winRate < 0.5) {
    AI_STATE.rsiOffset += 1;
    AI_STATE.confidenceOffset += 2;
  } else {
    AI_STATE.rsiOffset -= 1;
    AI_STATE.confidenceOffset -= 1;
  }

  // Clamp values
  AI_STATE.rsiOffset = Math.max(-5, Math.min(5, AI_STATE.rsiOffset));
  AI_STATE.confidenceOffset = Math.max(-10, Math.min(10, AI_STATE.confidenceOffset));

  saveAI();
}

// =============================
// 📊 INDICATORS
// =============================
function EMA(prices, period) {
  const k = 2 / (period + 1);
  let ema = prices[0];
  for (let i = 1; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
  }
  return ema;
}

function RSI(prices, period) {
  let gains = 0, losses = 0;
  for (let i = prices.length - period; i < prices.length - 1; i++) {
    const diff = prices[i + 1] - prices[i];
    if (diff > 0) gains += diff;
    else losses -= diff;
  }
  const rs = gains / (losses || 1);
  return 100 - (100 / (1 + rs));
}

function ATR(data, period) {
  let total = 0;
  for (let i = data.length - period; i < data.length; i++) {
    total += Math.abs(data.high[i] - data.low[i]);
  }
  return total / period;
}

// =============================
// 🧩 HELPERS
// =============================
function averageCandleSize(data, period) {
  let total = 0;
  for (let i = data.length - period; i < data.length; i++) {
    total += Math.abs(data.high[i] - data.low[i]);
  }
  return total / period;
}

function near(price, level, tolerance = 0.002) {
  return Math.abs(price - level) / price < tolerance;
}

function getZones(prices, lookback) {
  const slice = prices.slice(-lookback);
  return {
    support: Math.min(...slice),
    resistance: Math.max(...slice)
  };
}

// =============================
// 🤖 MARSBOT PRO AI STRATEGY
// =============================
function runMarsBotPro(data) {
  const price = data.close[data.close.length - 1];

  const ema10 = EMA(data.close, 10);
  const ema50 = EMA(data.close, 50);
  const rsi = RSI(data.close, 14);
  const atr = ATR(data, 14);

  const avgRange = averageCandleSize(data, 20);
  const volatilityOK = atr > avgRange * 0.8;

  const uptrend = price > ema50 && ema10 > ema50;
  const downtrend = price < ema50 && ema10 < ema50;

  // 🧠 Adaptive RSI
  const baseOversold = 35 + AI_STATE.rsiOffset;
  const baseOverbought = 65 - AI_STATE.rsiOffset;

  const { support, resistance } = getZones(data.close, 20);

  let signal = null;
  let confidence = 0;

  if (uptrend && rsi < baseOversold && near(price, support) && volatilityOK) {
    confidence = 75;
    signal = "BUY";
  }

  if (downtrend && rsi > baseOverbought && near(price, resistance) && volatilityOK) {
    confidence = 75;
    signal = "SELL";
  }

  // 🧠 Adaptive confidence threshold
  const requiredConfidence = MARSBOT_PRO_CONFIG.minConfidence + AI_STATE.confidenceOffset;

  if (confidence < requiredConfidence) {
    signal = null;
  }

  return {
    signal,
    confidence,
    expiry: MARSBOT_PRO_CONFIG.expiryCandles
  };
}

// =============================
// ⚙️ STRATEGY SWITCH
// =============================
function runStrategy(strategy, data) {
  if (strategy === STRATEGIES.MARSBOT_PRO_V50) {
    return runMarsBotPro(data);
  }
  return null;
}

// =============================
// 🎛️ UI LOCK
// =============================
function lockUIIfNeeded(selectedStrategy) {
  if (selectedStrategy === STRATEGIES.MARSBOT_PRO_V50) {
    document.querySelectorAll("input, select").forEach(el => {
      if (el.id !== "strategySelector") el.disabled = true;
    });
  }
}

// =============================
// 📈 RESULT FEEDBACK (CALL THIS AFTER TRADE)
// =============================
function onTradeResult(result) {
  updateAI(result); // "win" or "loss"
}

</script>
