<script type="text/babel">
  const { useState, useRef, useCallback, useEffect } = React;

  // ─── Constants ─────────────────────────────────────────────────────────────

  // ─── Per-symbol strategy config ─────────────────────────────────────────────

  const BASE_CONFIG = {

  const STRAT_CONFIG = {
    R_50: {
      HYBRID: {
        rsiPeriod: 10, rsiBuy: 28, rsiSell: 72,
        bbPeriod: 18, bbTouchPct: 0.18,
        emaFast: 9, emaSlow: 21,

      EMA:  { fast: 7, slow: 21, minStrength: 74, cooldownMs: 20000 },
      BB:   { period: 18, touchPct: 0.18, minStrength: 70, cooldownMs: 20000 },

    },
    R_10: {
      HYBRID: { ...BASE_CONFIG.HYBRID, rsiBuy: 25, rsiSell: 75, minStrength: 72, cooldownMs: 30000 },
      RSI:  { ...BASE_CONFIG.RSI,  buy: 22, sell: 78, minStrength: 70 },
      EMA:  { ...BASE_CONFIG.EMA,  fast: 5, slow: 13 },
      BB:   { ...BASE_CONFIG.BB,   touchPct: 0.12 },
      MACD: { ...BASE_CONFIG.MACD },
    },
    R_25: {
      HYBRID: { ...BASE_CONFIG.HYBRID, rsiBuy: 27, rsiSell: 73, cooldownMs: 22000 },
      RSI:  { ...BASE_CONFIG.RSI,  buy: 27, sell: 73 },
      EMA:  { ...BASE_CONFIG.EMA },
      BB:   { ...BASE_CONFIG.BB },
      MACD: { ...BASE_CONFIG.MACD },
    },
    R_75: {
      HYBRID: { ...BASE_CONFIG.HYBRID, rsiPeriod: 12, bbPeriod: 20, bbTouchPct: 0.16, cooldownMs: 18000 },
      RSI:  { ...BASE_CONFIG.RSI,  period: 12 },
      EMA:  { ...BASE_CONFIG.EMA,  fast: 8 },
      BB:   { ...BASE_CONFIG.BB,   touchPct: 0.16 },
      MACD: { ...BASE_CONFIG.MACD },
    },
    R_100: {
      HYBRID: { ...BASE_CONFIG.HYBRID, rsiPeriod: 10, bbTouchPct: 0.20, cooldownMs: 15000 },
      RSI:  { ...BASE_CONFIG.RSI,  period: 10, buy: 26, sell: 74 },
      EMA:  { ...BASE_CONFIG.EMA,  fast: 7 },
      BB:   { ...BASE_CONFIG.BB,   touchPct: 0.20 },
      MACD: { ...BASE_CONFIG.MACD },
    },
  };

  const getCfg = (symbol, strategy) =>
    STRAT_CONFIG[symbol]?.[strategy] ?? BASE_CONFIG[strategy] ?? null;

  // ─── Indicator Math ──────────────────────────────────────────────────────────

  const calcEMA = (prices, period) => {
    if (prices.length < period) return null;
    const k = 2 / (period + 1);
    let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
    return ema;
  };

  // FIX: Proper Wilder RSI (uses exponential smoothing, not simple average)
  // This matches the industry-standard RSI formula — far more accurate on fast-moving synthetics
  const calcRSI = (prices, period = 14) => {
    if (prices.length < period + 1) return null;
    const changes = [];
    for (let i = 1; i < prices.length; i++) changes.push(prices[i] - prices[i - 1]);

    let avgGain = 0, avgLoss = 0;
    for (let i = 0; i < period; i++) {
      if (changes[i] > 0) avgGain += changes[i];
      else avgLoss += Math.abs(changes[i]);
    }
    avgGain /= period;
    avgLoss /= period;

    // Wilder smoothing for remaining bars
    for (let i = period; i < changes.length; i++) {
      const gain = changes[i] > 0 ? changes[i] : 0;
      const loss = changes[i] < 0 ? Math.abs(changes[i]) : 0;
      avgGain = (avgGain * (period - 1) + gain) / period;
      avgLoss = (avgLoss * (period - 1) + loss) / period;
    }

    if (avgLoss === 0) return 100;
    return 100 - 100 / (1 + avgGain / avgLoss);
  };

  const calcBB = (prices, period = 20) => {
    if (prices.length < period) return null;
    const slice = prices.slice(-period);
    const mean = slice.reduce((a, b) => a + b, 0) / period;
    const std = Math.sqrt(slice.map(p => (p - mean) ** 2).reduce((a, b) => a + b, 0) / period);
    return { upper: mean + 2 * std, middle: mean, lower: mean - 2 * std, std };
  };

  // FIX: MACD signal line now uses a true EMA of MACD values (not SMA)
  // Previous version was O(n²) — recalculating full EMAs for each signal bar
  const calcMACD = (prices, fast = 12, slow = 26, signalPeriod = 9) => {
    if (prices.length < slow + signalPeriod) return null;

    // Build MACD line history for last (signalPeriod + some buffer) bars
    const kFast = 2 / (fast + 1);
    const kSlow = 2 / (slow + 1);

    let emaF = prices.slice(0, fast).reduce((a, b) => a + b, 0) / fast;
    let emaS = prices.slice(0, slow).reduce((a, b) => a + b, 0) / slow;
    for (let i = fast; i < slow; i++) emaF = prices[i] * kFast + emaF * (1 - kFast);

    const macdHistory = [];
    for (let i = slow; i < prices.length; i++) {
      emaF = prices[i] * kFast + emaF * (1 - kFast);
      emaS = prices[i] * kSlow + emaS * (1 - kSlow);
      macdHistory.push(emaF - emaS);
    }

    if (macdHistory.length < signalPeriod) return null;

    const kSig = 2 / (signalPeriod + 1);
    let signalLine = macdHistory.slice(0, signalPeriod).reduce((a, b) => a + b, 0) / signalPeriod;
    for (let i = signalPeriod; i < macdHistory.length; i++) {
      signalLine = macdHistory[i] * kSig + signalLine * (1 - kSig);
    }

    const macdLine = macdHistory[macdHistory.length - 1];
    return { macd: macdLine, signal: signalLine, histogram: macdLine - signalLine };
  };

  // ATR for volatility filter — suppresses signals in choppy/flat markets
  const calcATR = (prices, period = 14) => {
    if (prices.length < period + 1) return null;
    const trs = [];
    for (let i = prices.length - period; i < prices.length; i++) {
      trs.push(Math.abs(prices[i] - prices[i - 1]));
    }
    return trs.reduce((a, b) => a + b, 0) / period;
  };

  // ─── Hybrid Signal Engine ────────────────────────────────────────────────────
  const computeHybrid = (prices, symbol = "R_50") => {
    const cfg = getCfg(symbol, "HYBRID");
    if (!cfg || prices.length < 50) return null;

    const price = prices[prices.length - 1];

    // ATR volatility filter — skip if market is too flat/choppy
    if (cfg.atrPeriod && cfg.atrMinPct) {
      const atr = calcATR(prices, cfg.atrPeriod);
      if (atr !== null && price > 0 && atr / price < cfg.atrMinPct) return null;
    }

    const rsi    = calcRSI(prices, cfg.rsiPeriod);
    const bb     = calcBB(prices, cfg.bbPeriod);
    const emaFast = calcEMA(prices, cfg.emaFast);
    const emaSlow = calcEMA(prices, cfg.emaSlow);

    if (rsi === null || bb === null || emaFast === null || emaSlow === null) return null;

    // RSI vote
    let rsiVote = 0, rsiScore = 0, rsiLabel = "";
    if (rsi < cfg.rsiBuy) {
      rsiVote = 1;
      rsiScore = Math.min(100, 65 + (cfg.rsiBuy - rsi) * 3);
      rsiLabel = `${rsi.toFixed(1)} — oversold`;
    } else if (rsi > cfg.rsiSell) {
      rsiVote = -1;
      rsiScore = Math.min(100, 65 + (rsi - cfg.rsiSell) * 3);
      rsiLabel = `${rsi.toFixed(1)} — overbought`;
    } else {
      rsiScore = Math.max(25, 55 - Math.abs(rsi - 50) * 1.3);
      rsiLabel = `${rsi.toFixed(1)} — neutral`;
    }

    // BB vote
    const bbRange = bb.upper - bb.lower;
    const bbPos   = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
    let bbVote = 0, bbScore = 0, bbLabel = "";
    if (bbPos < cfg.bbTouchPct) {
      bbVote = 1;
      bbScore = Math.min(100, 65 + (cfg.bbTouchPct - bbPos) * 260);
      bbLabel = `${(bbPos * 100).toFixed(0)}% — near lower`;
    } else if (bbPos > 1 - cfg.bbTouchPct) {
      bbVote = -1;
      bbScore = Math.min(100, 65 + (bbPos - (1 - cfg.bbTouchPct)) * 260);
      bbLabel = `${(bbPos * 100).toFixed(0)}% — near upper`;
    } else {
      bbScore = 40;
      bbLabel = `${(bbPos * 100).toFixed(0)}% — mid band`;
    }

    // EMA vote
    const separation = Math.abs(emaFast - emaSlow) / ((emaSlow || 1) * 0.001 + 0.0001);
    const emaScore   = Math.min(100, 60 + Math.min(separation * 22, 100) * 0.35);
    const emaVote    = emaFast > emaSlow ? 1 : -1;
    const emaLabel   = emaFast > emaSlow ? "Fast above slow" : "Fast below slow";

    const callVotes = [rsiVote, bbVote, emaVote].filter(v => v === 1).length;
    const putVotes  = [rsiVote, bbVote, emaVote].filter(v => v === -1).length;
    if (callVotes < 2 && putVotes < 2) return null;

    const direction = callVotes >= putVotes ? "CALL" : "PUT";
    const dirMult   = direction === "CALL" ? 1 : -1;
    const allAgree  = callVotes === 3 || putVotes === 3;

    const W = { rsi: 0.35, bb: 0.30, ema: 0.35 };
    let weightedSum = 0, totalWeight = 0;

    const addVote = (vote, score, w) => {
      if (vote === dirMult)        { weightedSum += score * w; totalWeight += w; }
      else if (vote === 0)         { weightedSum += score * w * 0.25; totalWeight += w * 0.25; }
    };
    addVote(rsiVote, rsiScore, W.rsi);
    addVote(bbVote,  bbScore,  W.bb);
    if (emaVote === dirMult) { weightedSum += emaScore * W.ema; totalWeight += W.ema; }

    const rawStrength = totalWeight > 0 ? weightedSum / totalWeight : 0;
    const strength    = Math.min(100, Math.round(rawStrength + (allAgree ? 6 : 0)));
    if (strength < cfg.minStrength) return null;

    return {
      direction, strength, allAgree,
      summary: `${allAgree ? "3/3" : "2/3"} agree (${symbol})`,
      components: {
        rsi: { vote: rsiVote,  score: Math.round(rsiScore),  label: rsiLabel,  agrees: rsiVote  === dirMult },
        bb:  { vote: bbVote,   score: Math.round(bbScore),   label: bbLabel,   agrees: bbVote   === dirMult },
        ema: { vote: emaVote,  score: Math.round(emaScore),  label: emaLabel,  agrees: emaVote  === dirMult },
      },
    };
  };

  const computeSingle = (strategy, prices, prev, symbol = "R_50") => {
    if (prices.length < 40) return null;
    const cfg = getCfg(symbol, strategy);
    if (!cfg) return null;

    if (strategy === "RSI") {
      const rsi = calcRSI(prices, cfg.period);
      if (rsi === null) return null;
      if (rsi < cfg.buy) return {
        direction: "CALL",
        strength: Math.min(100, Math.round(cfg.minStrength + (cfg.buy - rsi) * 3)),
        summary: `RSI ${rsi.toFixed(1)} — oversold`,
        components: null,
      };
      if (rsi > cfg.sell) return {
        direction: "PUT",
        strength: Math.min(100, Math.round(cfg.minStrength + (rsi - cfg.sell) * 3)),
        summary: `RSI ${rsi.toFixed(1)} — overbought`,
        components: null,
      };
    }

    if (strategy === "EMA") {
      const eFast  = calcEMA(prices, cfg.fast);
      const eSlow  = calcEMA(prices, cfg.slow);
      // FIX: Use prev arrays that are actually one tick shorter for a valid crossover check
      const prevPrices = prev.length >= cfg.slow ? prev : prices.slice(0, -1);
      const peFast = calcEMA(prevPrices, cfg.fast);
      const peSlow = calcEMA(prevPrices, cfg.slow);
      if (!eFast || !eSlow || !peFast || !peSlow) return null;
      if (peFast < peSlow && eFast > eSlow) return {
        direction: "CALL", strength: cfg.minStrength,
        summary: "Fast EMA crossed above slow", components: null,
      };
      if (peFast > peSlow && eFast < eSlow) return {
        direction: "PUT", strength: cfg.minStrength,
        summary: "Fast EMA crossed below slow", components: null,
      };
    }

    if (strategy === "BB") {
      const price = prices[prices.length - 1];
      const bb = calcBB(prices, cfg.period);
      if (!bb) return null;
      const bbRange = bb.upper - bb.lower;
      const bbPos   = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
      if (bbPos <= cfg.touchPct) return {
        direction: "CALL", strength: cfg.minStrength,
        summary: "Price near lower BB", components: null,
      };
      if (bbPos >= 1 - cfg.touchPct) return {
        direction: "PUT", strength: cfg.minStrength,
        summary: "Price near upper BB", components: null,
      };
    }

    if (strategy === "MACD") {
      const m  = calcMACD(prices, cfg.fast, cfg.slow, cfg.signal);
      const pm = calcMACD(prev.length >= cfg.slow ? prev : prices.slice(0, -1), cfg.fast, cfg.slow, cfg.signal);
      if (!m || !pm) return null;
      if (pm.macd < pm.signal && m.macd > m.signal) return {
        direction: "CALL", strength: cfg.minStrength,
        summary: "MACD crossed above signal", components: null,
      };
      if (pm.macd > pm.signal && m.macd < m.signal) return {
        direction: "PUT", strength: cfg.minStrength,
        summary: "MACD crossed below signal", components: null,
      };
    }

    return null;
  };

  const getSignal = (strategy, prices, prev, symbol = "R_50") =>
    strategy === "HYBRID"
      ? computeHybrid(prices, symbol)
      : computeSingle(strategy, prices, prev, symbol);

  // ─── Sparkline ───────────────────────────────────────────────────────────────
  const Sparkline = ({ data, color = "#00ff88", width = 120, height = 34 }) => {
    if (!data || data.length < 2) return <svg width={width} height={height} />;
    const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
    const pts = data.map((v, i) =>
      `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 2) - 1}`
    ).join(" ");
    return (
      <svg width={width} height={height} style={{ overflow: "visible" }}>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
      </svg>
    );
  };

  // ─── Strength Gauge ──────────────────────────────────────────────────────────
  const StrengthGauge = ({ value, size = 68 }) => {
    const r = size / 2 - 7;
    const cx = size / 2, cy = size / 2;
    const toRad = d => (d * Math.PI) / 180;
    const arcPath = (s, e) => {
      const sx = cx + r * Math.cos(toRad(s)), sy = cy + r * Math.sin(toRad(s));
      const ex = cx + r * Math.cos(toRad(e)), ey = cy + r * Math.sin(toRad(e));
      return `M ${sx} ${sy} A ${r} ${r} 0 ${e - s > 180 ? 1 : 0} 1 ${ex} ${ey}`;
    };
    const color  = value >= 80 ? "#00ff88" : value >= 65 ? "#ffaa00" : "#ff3d5f";
    const endDeg = 135 + (value / 100) * 270;
    return (
      <svg width={size} height={size}>
        <path d={arcPath(135, 404.9)} fill="none" stroke="#162e22" strokeWidth="6" strokeLinecap="round" />
        <path d={arcPath(135, Math.min(endDeg, 404.8))} fill="none" stroke={color} strokeWidth="6"
          strokeLinecap="round" style={{ filter: `drop-shadow(0 0 5px ${color}90)` }} />
        <text x={cx} y={cy + 5} textAnchor="middle" fill={color} fontSize="13"
          fontFamily="'Syne',sans-serif" fontWeight="800">{value}%</text>
      </svg>
    );
  };

  // ─── Indicator Pill ──────────────────────────────────────────────────────────
  const Pill = ({ label, score, agrees, vote }) => {
    const color  = agrees ? "#00ff88" : vote === 0 ? "#5a9e78" : "#ff3d5f";
    const bg     = agrees ? "rgba(0,255,136,.09)" : vote === 0 ? "rgba(90,158,120,.06)" : "rgba(255,61,95,.09)";
    const border = agrees ? "rgba(0,255,136,.3)"  : vote === 0 ? "rgba(90,158,120,.2)"  : "rgba(255,61,95,.3)";
    const arrow  = vote === 1 ? "↑" : vote === -1 ? "↓" : "–";
    return (
      <div style={{ flex: 1, background: bg, border: `1px solid ${border}`, borderRadius: 4,
        padding: "7px 9px", display: "flex", flexDirection: "column", gap: 4 }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: 8, color: "#5a9e78", letterSpacing: 1.5, textTransform: "uppercase" }}>{label}</span>
          <span style={{ fontSize: 13, color, fontWeight: 700, lineHeight: 1 }}>{arrow}</span>
        </div>
        <div style={{ fontSize: 12, color, fontWeight: 700 }}>{score}%</div>
        <div style={{ height: 3, background: "#162e22", borderRadius: 2 }}>
          <div style={{ height: "100%", width: `${score}%`, background: color, borderRadius: 2, transition: "width .4s" }} />
        </div>
      </div>
    );
  };

  // ─── Main Component ──────────────────────────────────────────────────────────

    // Refs

    // Sync refs
    useEffect(() => { execModeRef.current    = execMode;                }, [execMode]);

          contract_type: signal.direction,
          currency: accountInfoRef.current?.currency || "USD",
          duration: durationRef.current,
          duration_unit: "m",
          symbol: symbolRef.current,

      pendingDirections.current["__next"] = signal.direction;
      socketRef.current.send(JSON.stringify(payload));

        maxLossRef.current = (data.authorize.balance * (parseFloat(maxDailyLoss) || 0)) / 100;
        addLog(`Authorized — ${data.authorize.loginid} · ${data.authorize.currency} ${data.authorize.balance}`, "success");
        socketRef.current?.send(JSON.stringify({ balance: 1, subscribe: 1 }));

                <span style={{ fontSize: 9, color: "var(--t2)", whiteSpace: "nowrap" }}>
                  {accountInfo?.loginid} · {accountInfo?.currency} {balance?.toFixed(2)}
                </span>
              )}
              <button className="hb" onClick={() => setSidebarOpen(o => !o)}>
                {sidebarOpen ? "✕ Close" : "☰ Config"}
              </button>
            </div>
          </header>

          <div className="B">
            {/* Mobile overlay */}
            <div className={`ov ${sidebarOpen ? "open" : ""}`} onClick={() => setSidebarOpen(false)} />

            {/* Sidebar */}
            <aside className={`S ${sidebarOpen ? "open" : ""}`}>
              <div>
                <div className="sl">Connection</div>
                <div className="sc">
                  <div className="fg">
                    <label className="fl">Token</label>
                    <input className="fi" type="password" placeholder="Paste Deriv API token"
                      value={tokenInput} onChange={e => setTokenInput(e.target.value)} />
                  </div>
                  <button className="btn bg" onClick={connect} disabled={connected}>
                    {connected ? "Connected" : "Connect"}
                  </button>
                  <button className="btn bgh" onClick={authorize} disabled={!connected || authorized}>
                    {authorized ? "Authorized" : "Authorize"}
                  </button>
                </div>
              </div>

              <div>
                <div className="sl">Market & Strategy</div>
                <div className="sc">
                  <div className="fg">
                    <label className="fl">Symbol</label>
                    <select className="fse" value={symbol} onChange={e => setSymbol(e.target.value)}>
                      {SYMBOLS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                    </select>
                  </div>
                  <div className="fg">
                    <label className="fl">Strategy</label>
                    <select className="fse" value={strategy} onChange={e => setStrategy(e.target.value)}>
                      {STRATEGIES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                    </select>
                  </div>
                  <div className="fg">
                    <label className="fl">Duration</label>
                    <select className="fse" value={duration} onChange={e => setDuration(parseInt(e.target.value, 10))}>
                      {DURATIONS.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
                    </select>
                  </div>
                </div>
              </div>

              <div>
                <div className="sl">Risk & Money</div>
                <div className="sc">
                  <div className="fg">
                    <label className="fl">Stake (amount)</label>
                    <input className="fi" value={stake} onChange={e => setStake(e.target.value)} />
                  </div>
                  <div className="fg">
                    <label className="fl">Max daily loss (% of balance)</label>
                    <input className="fi" value={maxDailyLoss} onChange={e => setMaxDailyLoss(e.target.value)} />
                  </div>
                  <div className="fg">
                    <label className="fl">Max trades per day</label>
                    <input className="fi" value={maxTrades} onChange={e => setMaxTrades(e.target.value)} />
                  </div>
                  <div className="fg">
                    <label className="fl">Min signal strength</label>
                    <input className="fi" value={minStrength} onChange={e => setMinStrength(e.target.value)} />
                  </div>
                  <div className="tr">
                    <span className="tl">Martingale (capped)</span>
                    <label className="tog">
                      <input type="checkbox" checked={martingale} onChange={e => setMartingale(e.target.checked)} />
                      <span className="tt" /><span className="tb" />
                    </label>
                  </div>
                  {martingale && (
                    <div className="fg">
                      <label className="fl">Martingale multiplier</label>
                      <input className="fi" value={martMul} onChange={e => setMartMul(e.target.value)} />
                    </div>
                  )}
                </div>
              </div>

              <div>
                <div className="sl">Execution</div>
                <div className="sc">
                  <div className="ms">
                    <button className={`mb ${execMode === "auto" ? "ma" : ""}`} onClick={() => setExecMode("auto")}>Auto</button>
                    <button className={`mb ${execMode === "manual" ? "mm" : ""}`} onClick={() => setExecMode("manual")}>Manual</button>
                  </div>
                  <button className="btn bg" onClick={() => { startBot(); setSidebarOpen(false); }} disabled={!authorized || botRunning}>Start Bot</button>
                  <button className="btn bst" onClick={stopBot} disabled={!botRunning}>Stop Bot</button>
                  <button className="btn bgh" onClick={resetDay}>Reset Daily Stats</button>
                </div>
              </div>
            </aside>

            {/* Main */}
            <main className="M">
              {/* Stats Grid */}
              <section className="sg">
                <div className="st">
                  <div className="stl">Market</div>
                  <div className="stv">{symInfo?.label || symbol}</div>
                  <div className="sts">Tag: {symInfo?.tag}</div>
                </div>
                <div className="st">
                  <div className="stl">Balance</div>
                  <div className="stv cg">{balance != null ? balance.toFixed(2) : "--"}</div>
                  <div className="sts">Live account</div>
                </div>
                <div className="st">
                  <div className="stl">Today PnL</div>
                  <div className={`stv ${dailyPnL >= 0 ? "cg" : "cr"}`}>{dailyPnL.toFixed(2)}</div>
                  <div className="sts">Trades: {todayTrades}{winRate ? ` · ${winRate}% WR` : ""}</div>
                </div>
                <div className="st">
                  <div className="stl">Risk Load</div>
                  <div className="stv"><span style={{ color: riskColor }}>{lossRatio.toFixed(1)}%</span></div>
                  <div className="rb">
                    <div className="rf" style={{ width: `${lossRatio}%`, background: riskColor }} />
                  </div>
                  <div className="sts">vs daily cap</div>
                </div>
              </section>

              {/* Signal Card */}
              <section className="card">
                <div className="ct">Live Signal & Market Snapshot</div>
                <div className="sh">
                  <div className={`sm ${liveSignal ? (liveSignal.direction === "CALL" ? "sc2" : "sp") : ""}`}>
                    <div className="sd cg2">{currentPrice != null ? currentPrice.toFixed(5) : "--"}</div>
                    <div className="ss2">
                      {liveSignal
                        ? `${liveSignal.direction} · ${liveSignal.strength}% · ${liveSignal.summary}`
                        : "Waiting for qualified signal…"}
                    </div>
                    <div className="pr">
                      <Sparkline data={priceHistory} />
                    </div>
                    {liveSignal?.components && (
                      <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                        <Pill label="RSI" score={liveSignal.components.rsi.score} agrees={liveSignal.components.rsi.agrees} vote={liveSignal.components.rsi.vote} />
                        <Pill label="BB"  score={liveSignal.components.bb.score}  agrees={liveSignal.components.bb.agrees}  vote={liveSignal.components.bb.vote}  />
                        <Pill label="EMA" score={liveSignal.components.ema.score} agrees={liveSignal.components.ema.agrees} vote={liveSignal.components.ema.vote} />
                      </div>
                    )}
                  </div>
                  <div className="gc">
                    <div className="gl">Strength</div>
                    <StrengthGauge value={liveSignal?.strength || 0} />
                    <div style={{ fontSize: 9, color: "#4d9968" }}>Min: {minStrength}%</div>
                  </div>
                </div>

                {pendingSignal && (
                  <div style={{ marginTop: 10 }}>
                    <div className="pb">
                      <div className="pbt">Manual confirmation required</div>
                      <div className="pa">
                        <button className="bex gc3" onClick={() => placeTrade(pendingSignal)}>
                          Execute {pendingSignal.direction}
                        </button>
                        <button className="bex rc3" onClick={dismissSignal}>Dismiss</button>
                      </div>
                    </div>
                  </div>
                )}
              </section>

              {/* Tabs */}
              <section className="card">
                <div className="tabs">
                  {[["signal","Signals"],["trades","Trades"],["open","Open"],["log","Log"]].map(([v,l]) => (
                    <button key={v} className={`tab ${activeTab === v ? "on" : ""}`} onClick={() => setActiveTab(v)}>{l}</button>
                  ))}
                </div>

                {activeTab === "signal" && (
                  <div>
                    {signals.length === 0 && <div className="em">No signals yet.</div>}
                    {signals.map(s => (
                      <div key={s.id} className="shr">
                        <span className={`db ${s.direction}`}>{s.direction}</span>
                        <span className="sr2">{s.summary}</span>
                        <span className="strb">
                          <span className="sst" style={{ color: strColor(s.strength) }}>{s.strength}%</span>
                          <span className="strtr">
                            <span className="strfi" style={{ width: `${s.strength}%`, background: strColor(s.strength) }} />
                          </span>
                        </span>
                        <span className="stim">{s.time}</span>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === "trades" && (
                  <div>
                    <div className="trow th">
                      <div>Time</div><div>Dir</div><div>Stake</div><div>Payout</div><div>Profit</div><div>Symbol</div>
                    </div>
                    {trades.length === 0 && <div className="em">No trades yet.</div>}
                    {trades.map(t => (
                      <div key={t.id} className="trow">
                        <div>{t.time}</div>
                        <div style={{ color: t.direction === "CALL" ? "#00ff88" : "#ff3d5f" }}>{t.direction}</div>
                        <div>{t.stake.toFixed(2)}</div>
                        <div>{t.payout.toFixed(2)}</div>
                        <div className={t.won ? "pp" : "pn"}>{t.profit.toFixed(2)}</div>
                        <div>{t.symbol}</div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === "open" && (
                  <div>
                    {openContracts.length === 0 && <div className="em">No open contracts.</div>}
                    {openContracts.map(c => (
                      <div key={c.id} className="oc">
                        <span style={{ fontSize: 9, color: "#4d9968" }}>#{c.id}</span>
                        <span style={{ fontSize: 9 }}>{c.symbol} · {c.direction}</span>
                        <span style={{ fontSize: 9, color: "#b0f0cc" }}>{c.buyPrice}</span>
                        <span style={{ marginLeft: "auto", fontSize: 9, color: "#2a5438" }}>{c.openTime}</span>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === "log" && (
                  <div>
                    {logs.length === 0 && <div className="em">No logs yet.</div>}
                    {logs.map(l => (
                      <div key={l.id} className="lr">
                        <span className="lt">{l.time}</span>
                        <span className={`lm ${l.type}`}>{l.msg}</span>
                      </div>
                    ))}
                  </div>
                )}
              </section>

              {/* Notes */}
              <section className="card">
                <div className="ct">Notes</div>
                <div className="hn">
                  · Hybrid uses Wilder RSI, true EMA-based MACD signal, and ATR volatility filter — signals require market movement to be valid.{" "}
                  · Each symbol has its own tuned parameters. V50 uses the most aggressive settings.{" "}
                  · Martingale stakes are capped at 5% of balance. Max daily loss is calculated as % of balance at login.{" "}
                  · Always forward-test on a demo account before going live.
                </div>
              </section>
            </main>
          </div>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<DerivBot />);
</script>
