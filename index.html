const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ================================================================

const WS_URL = 'wss://ws.binaryws.com/websockets/v3?app_id=1089';

const MAX_PRICES = 200;
const MAX_LOGS = 500;
const TRADE_STORAGE_KEY = 'marsbot_v4_trades';

const SYMBOLS = [
  { value: 'R_10', label: 'Vol 10' },

/* FIX #4: Duration as single source of truth.
   Each entry has value (number), unit (letter code), and label.
   The selected entry is looked up by a string key "value|unit",
   so there's zero possibility of index mismatch. */
const DURATIONS = [
  { value: 1, unit: 't', label: '1 Tick' },
  { value: 2, unit: 't', label: '2 Ticks' },
  { value: 3, unit: 't', label: '3 Ticks' },
  { value: 5, unit: 't', label: '5 Ticks' },
  { value: 7, unit: 't', label: '7 Ticks' },
  { value: 10, unit: 't', label: '10 Ticks' },
  { value: 15, unit: 's', label: '15 Sec' },
  { value: 30, unit: 's', label: '30 Sec' },
  { value: 60, unit: 's', label: '1 Min' },
  { value: 120, unit: 's', label: '2 Min' },
  { value: 300, unit: 's', label: '5 Min' },
];

const makeDurKey = (d) => `${d.value}|${d.unit}`;
const parseDurKey = (key) => {
  const entry = DURATIONS.find(d => makeDurKey(d) === key);
  return entry || DURATIONS[4]; // fallback to 7 ticks
};
const DEFAULT_DUR_KEY = makeDurKey(DURATIONS[4]); // 7 ticks

/* ================================================================
   MARSBOT PRO V50 — LOCKED CONFIG & AI ENGINE
   🔒 These values are frozen and cannot be changed by user inputs.
   ================================================================ */

const MARSBOT_PRO_ID = 'MARSBOT_PRO_V50';

const MARSBOT_PRO_CONFIG = Object.freeze({
  expiryCandles: 4,
  baseRisk: 0.01,
  minConfidence: 70,
});

// 🧠 Persistent AI State (localStorage-backed)
const AI_STATE = JSON.parse(localStorage.getItem('marsbot_ai') || 'null') || {
  wins: 0,
  losses: 0,
  rsiOffset: 0,
  confidenceOffset: 0,
};

function saveAI() {
  localStorage.setItem('marsbot_ai', JSON.stringify(AI_STATE));
}

function updateAI(result) {
  if (result === 'win') AI_STATE.wins++;
  if (result === 'loss') AI_STATE.losses++;
  const total = AI_STATE.wins + AI_STATE.losses;
  const winRate = total ? AI_STATE.wins / total : 0.5;
  if (winRate < 0.5) {
    AI_STATE.rsiOffset += 1;
    AI_STATE.confidenceOffset += 2;
  } else {
    AI_STATE.rsiOffset -= 1;
    AI_STATE.confidenceOffset -= 1;
  }
  AI_STATE.rsiOffset = Math.max(-5, Math.min(5, AI_STATE.rsiOffset));
  AI_STATE.confidenceOffset = Math.max(-10, Math.min(10, AI_STATE.confidenceOffset));
  saveAI();
}


const STRATEGIES = ['HYBRID', 'EMA_STOCH', 'SMA_RSI', 'BB_SQUEEZE', 'RSI', 'EMA', 'BB', 'MACD', 'MARSBOT_PRO_V50'];
const STRATEGY_LABELS = {
  HYBRID: 'Hybrid (5-Indicator)',
  EMA_STOCH: 'EMA-Stoch Scalper',
  SMA_RSI: 'SMA-RSI Pullback',
  BB_SQUEEZE: 'BB Squeeze Breakout',
  RSI: 'RSI',
  EMA: 'EMA Crossover',
  BB: 'Bollinger Bands',
  MACD: 'MACD',
  MARSBOT_PRO_V50: '🔒 MarsBotPro V50',
};
const MM_SYSTEMS = ['FLAT', 'MARTINGALE', 'DALEMBERT', 'REVERSE_MARTINGALE'];

/* FIX #8: UI label helper — maps API direction to user-facing label.
   The API always sends CALL/PUT. The UI always shows Up/Down. */
const dirLabel = (apiDir) => apiDir === 'CALL' ? 'Up' : apiDir === 'PUT' ? 'Down' : '—';
const dirArrow = (apiDir) => apiDir === 'CALL' ? '▲' : apiDir === 'PUT' ? '▼' : '—';
const dirClass = (apiDir) => apiDir === 'CALL' ? 'up' : apiDir === 'PUT' ? 'down' : 'neutral';

const GENERIC_CONFIG = {
  HYBRID: {
    rsiPeriod: 14, stochPeriod: 14, stochSmooth: 3, bbPeriod: 20,
    emaFast: 9, emaSlow: 21, emaTrend: 50,
    macdFast: 12, macdSlow: 26, macdSignal: 9,
    atrPeriod: 14, atrSpikeMulti: 1.5,
    weights: { rsi: 1, stochRSI: 1, bb: 1, ema: 1, macd: 1 },
    autoMinVotes: 3, autoMinStrength: 78,
    manualMinVotes: 2, manualMinStrength: 65,
  },
  RSI: {
    rsiPeriod: 14, rsiOB: 70, rsiOS: 30,
    emaTrend: 50, macdFast: 12, macdSlow: 26, macdSignal: 9,
  },
  EMA: {
    emaFast: 9, emaSlow: 21,
    atrPeriod: 14, atrSpikeMulti: 1.5,
    macdFast: 12, macdSlow: 26, macdSignal: 9,
  },
  BB: {
    bbPeriod: 20, stochPeriod: 14, stochSmooth: 3,
    macdFast: 12, macdSlow: 26, macdSignal: 9,
  },
  MACD: {
    macdFast: 12, macdSlow: 26, macdSignal: 9,
    rsiPeriod: 14, rsiOB: 65, rsiOS: 35,
  },
  /* --- V50 Research Strategies --- */
  EMA_STOCH: {
    ema8Period: 8, ema21Period: 21,
    stochK: 5, stochD: 3, stochSlowing: 3,
    slopeThreshold: 0.5,
    atrPeriod: 14,
  },
  SMA_RSI: {
    sma20Period: 20, sma50Period: 50,
    rsiPeriod: 14,
    pullbackThreshold: 2,
    minSmaSep: 0.5,
    atrPeriod: 14,
  },
  BB_SQUEEZE: {
    bbPeriod: 20, bbMult: 2.0,
    kcPeriod: 20, kcAtrMulti: 1.5, kcAtrPeriod: 14,
    minSqueezeBars: 3,
    macdFast: 12, macdSlow: 26, macdSignal: 9,
    rsiPeriod: 14,
    atrPeriod: 14,
  },
};

const R50_CONFIG = {
  ...GENERIC_CONFIG,
  HYBRID: {
    ...GENERIC_CONFIG.HYBRID,
    rsiPeriod: 12, stochPeriod: 12, bbPeriod: 18,
    emaFast: 8, emaSlow: 18, emaTrend: 45,
    weights: { rsi: 1.2, stochRSI: 1, bb: 1.1, ema: 0.9, macd: 1.3 },
    autoMinVotes: 3, autoMinStrength: 75,
  },
  /* V50-tuned research strategies */
  EMA_STOCH: {
    ...GENERIC_CONFIG.EMA_STOCH,
    slopeThreshold: 0.3, // V50 smoother, lower threshold
  },
  SMA_RSI: {
    ...GENERIC_CONFIG.SMA_RSI,
    pullbackThreshold: 1.5, // V50 tighter pullbacks
    minSmaSep: 0.3,
  },
  BB_SQUEEZE: {
    ...GENERIC_CONFIG.BB_SQUEEZE,
    minSqueezeBars: 3, // V50 has consistent squeeze behavior
  },
};

const getConfig = (symbol, strategy) => {
  const cfg = symbol === 'R_50' ? R50_CONFIG : GENERIC_CONFIG;
  return cfg[strategy] || GENERIC_CONFIG[strategy];
};

/* ================================================================
   SECTION 2: TECHNICAL INDICATORS (pure functions)
   FIX #3: Every function has explicit data-sufficiency guards
   and returns safe defaults (null / empty) if insufficient data.
   No NaN propagation — all divisions guarded against zero.
   ================================================================ */

const calcEMA = (prices, period) => {
  if (!prices || prices.length < period || period < 1) return null;
  const k = 2 / (period + 1);
  let ema = 0;
  for (let i = 0; i < period; i++) ema += prices[i];
  ema /= period;
  for (let i = period; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
  }
  return isFinite(ema) ? ema : null;
};

const calcEMASeries = (prices, period) => {
  if (!prices || prices.length < period || period < 1) return [];
  const k = 2 / (period + 1);
  let ema = 0;
  for (let i = 0; i < period; i++) ema += prices[i];
  ema /= period;
  const series = [ema];
  for (let i = period; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
    series.push(ema);
  }
  return series;
};

const calcRSI = (prices, period = 14) => {
  if (!prices || prices.length < period + 1 || period < 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = prices[i] - prices[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  const rsi = 100 - 100 / (1 + rs);
  return isFinite(rsi) ? rsi : null;
};

const calcRSISeries = (prices, period = 14) => {
  if (!prices || prices.length < period + 1 || period < 1) return [];
  const series = [];
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = prices[i] - prices[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  if (avgLoss === 0) series.push(100);
  else { const rs = avgGain / avgLoss; series.push(100 - 100 / (1 + rs)); }
  for (let i = period + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
    if (avgLoss === 0) series.push(100);
    else { const rs = avgGain / avgLoss; series.push(100 - 100 / (1 + rs)); }
  }
  return series;
};

const calcStochRSI = (prices, rsiPeriod = 14, stochPeriod = 14, smooth = 3) => {
  const rsiSeries = calcRSISeries(prices, rsiPeriod);
  if (rsiSeries.length < stochPeriod) return { k: null, d: null };
  const stochVals = [];
  for (let i = stochPeriod - 1; i < rsiSeries.length; i++) {
    const slice = rsiSeries.slice(i - stochPeriod + 1, i + 1);
    const min = Math.min(...slice);
    const max = Math.max(...slice);
    const range = max - min;
    stochVals.push(range === 0 ? 50 : ((rsiSeries[i] - min) / range) * 100);
  }
  if (stochVals.length < smooth) return { k: stochVals[stochVals.length - 1] || null, d: null };
  const kLine = [];
  for (let i = smooth - 1; i < stochVals.length; i++) {
    let sum = 0;
    for (let j = 0; j < smooth; j++) sum += stochVals[i - j];
    kLine.push(sum / smooth);
  }
  const k = kLine[kLine.length - 1];
  let d = null;
  if (kLine.length >= smooth) {
    let sum = 0;
    for (let j = 0; j < smooth; j++) sum += kLine[kLine.length - 1 - j];
    d = sum / smooth;
  }
  return { k: isFinite(k) ? k : null, d: isFinite(d) ? d : null };
};

const calcBB = (prices, period = 20) => {
  if (!prices || prices.length < period || period < 1) return { upper: null, middle: null, lower: null, pctB: null };
  const slice = prices.slice(-period);
  const mean = slice.reduce((a, b) => a + b, 0) / period;
  const variance = slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period;
  const std = Math.sqrt(variance);
  const upper = mean + 2 * std;
  const lower = mean - 2 * std;
  const current = prices[prices.length - 1];
  const range = upper - lower;
  const pctB = range === 0 ? 50 : ((current - lower) / range) * 100;
  return { upper, middle: mean, lower, pctB: isFinite(pctB) ? pctB : null };
};

const calcMACD = (prices, fast = 12, slow = 26, signal = 9) => {
  const nullResult = { macd: null, signal: null, histogram: null, crossUp: false, crossDown: false, bullish: false };
  if (!prices || prices.length < slow + signal) return nullResult;
  const fastEMA = calcEMASeries(prices, fast);
  const slowEMA = calcEMASeries(prices, slow);
  if (fastEMA.length === 0 || slowEMA.length === 0) return nullResult;
  const offset = fastEMA.length - slowEMA.length;
  const macdLine = [];
  for (let i = 0; i < slowEMA.length; i++) {
    macdLine.push(fastEMA[i + offset] - slowEMA[i]);
  }
  if (macdLine.length < signal) return { ...nullResult, macd: macdLine[macdLine.length - 1] || null };
  const signalEMA = calcEMASeries(macdLine, signal);
  if (signalEMA.length === 0) return { ...nullResult, macd: macdLine[macdLine.length - 1] || null };
  const currentMACD = macdLine[macdLine.length - 1];
  const currentSignal = signalEMA[signalEMA.length - 1];
  const prevMACD = macdLine.length >= 2 ? macdLine[macdLine.length - 2] : currentMACD;
  const prevSignal = signalEMA.length >= 2 ? signalEMA[signalEMA.length - 2] : currentSignal;
  const histogram = currentMACD - currentSignal;
  const crossUp = prevMACD <= prevSignal && currentMACD > currentSignal;
  const crossDown = prevMACD >= prevSignal && currentMACD < currentSignal;
  const bullish = currentMACD > currentSignal;
  return { macd: currentMACD, signal: currentSignal, histogram, crossUp, crossDown, bullish };
};

/* FIX #3: ATR — O(1) single-pass instead of O(n^2) recompute.
   Only calculates ATR once from the tail of the price array,
   and calculates the rolling average from a single pass. */
const calcATR = (prices, period = 14) => {
  if (!prices || prices.length < period + 1 || period < 1) return null;
  let sum = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    sum += Math.abs(prices[i] - prices[i - 1]);
  }
  const atr = sum / period;
  return isFinite(atr) ? atr : null;
};

const calcATRAvg = (prices, period = 14, avgLen = 50) => {
  if (!prices || prices.length < avgLen + period + 1) return { atr: null, avg: null, spike: false };
  const atr = calcATR(prices, period);
  if (atr === null) return { atr: null, avg: null, spike: false };
  // Compute rolling ATR average in a single pass from the end
  let atrSum = 0;
  let count = 0;
  for (let end = prices.length; end >= period + 1 && count < avgLen; end--) {
    let s = 0;
    for (let j = end - period; j < end; j++) {
      s += Math.abs(prices[j] - prices[j - 1]);
    }
    atrSum += s / period;
    count++;
  }
  if (count < avgLen) return { atr, avg: null, spike: false };
  const avg = atrSum / count;
  return { atr, avg, spike: atr > avg * 1.5 };
};

const macdGate = (prices, cfg) => {
  return calcMACD(prices, cfg.macdFast || 12, cfg.macdSlow || 26, cfg.macdSignal || 9);
};

/* ---- SMA (Simple Moving Average) ---- */
const calcSMA = (prices, period) => {
  if (!prices || prices.length < period || period < 1) return null;
  let sum = 0;
  for (let i = prices.length - period; i < prices.length; i++) sum += prices[i];
  return sum / period;
};

const calcSMASeries = (prices, period) => {
  if (!prices || prices.length < period || period < 1) return [];
  const series = [];
  let sum = 0;
  for (let i = 0; i < period; i++) sum += prices[i];
  series.push(sum / period);
  for (let i = period; i < prices.length; i++) {
    sum += prices[i] - prices[i - period];
    series.push(sum / period);
  }
  return series;
};

/* ---- Classic Stochastic Oscillator (K, D) ---- */
const calcStochastic = (prices, kPeriod = 5, dPeriod = 3, slowing = 3) => {
  const nullResult = { k: null, d: null, kPrev: null, dPrev: null, kSeries: [] };
  if (!prices || prices.length < kPeriod + slowing + dPeriod) return nullResult;
  // Step 1: Raw %K values (fast K)
  const rawK = [];
  for (let i = kPeriod - 1; i < prices.length; i++) {
    let high = -Infinity, low = Infinity;
    for (let j = i - kPeriod + 1; j <= i; j++) {
      if (prices[j] > high) high = prices[j];
      if (prices[j] < low) low = prices[j];
    }
    const range = high - low;
    rawK.push(range === 0 ? 50 : ((prices[i] - low) / range) * 100);
  }
  // Step 2: Slow %K (SMA of rawK with 'slowing' period)
  if (rawK.length < slowing) return nullResult;
  const slowK = [];
  for (let i = slowing - 1; i < rawK.length; i++) {
    let s = 0;
    for (let j = 0; j < slowing; j++) s += rawK[i - j];
    slowK.push(s / slowing);
  }
  // Step 3: %D (SMA of slowK with dPeriod)
  if (slowK.length < dPeriod) return { ...nullResult, k: slowK[slowK.length - 1], kSeries: slowK };
  const dLine = [];
  for (let i = dPeriod - 1; i < slowK.length; i++) {
    let s = 0;
    for (let j = 0; j < dPeriod; j++) s += slowK[i - j];
    dLine.push(s / dPeriod);
  }
  return {
    k: slowK[slowK.length - 1],
    d: dLine[dLine.length - 1],
    kPrev: slowK.length >= 2 ? slowK[slowK.length - 2] : null,
    dPrev: dLine.length >= 2 ? dLine[dLine.length - 2] : null,
    kSeries: slowK,
  };
};

/* ---- Keltner Channels ---- */
const calcKeltnerChannels = (prices, period = 20, atrMulti = 1.5, atrPeriod = 14) => {
  const nullResult = { upper: null, middle: null, lower: null };
  if (!prices || prices.length < Math.max(period, atrPeriod + 1)) return nullResult;
  const middle = calcEMA(prices, period);
  const atr = calcATR(prices, atrPeriod);
  if (middle === null || atr === null) return nullResult;
  return { upper: middle + atrMulti * atr, middle, lower: middle - atrMulti * atr };
};

/* ---- Bollinger Bands Series (for squeeze detection over N bars) ---- */
const calcBBAtIndex = (prices, endIdx, period = 20, mult = 2.0) => {
  if (endIdx < period - 1) return null;
  let sum = 0;
  for (let i = endIdx - period + 1; i <= endIdx; i++) sum += prices[i];
  const mean = sum / period;
  let variance = 0;
  for (let i = endIdx - period + 1; i <= endIdx; i++) variance += (prices[i] - mean) ** 2;
  const std = Math.sqrt(variance / period);
  return { upper: mean + mult * std, middle: mean, lower: mean - mult * std };
};

const calcKCAtIndex = (prices, endIdx, period = 20, atrMulti = 1.5, atrPeriod = 14) => {
  if (endIdx < Math.max(period, atrPeriod)) return null;
  // EMA up to endIdx
  const slice = prices.slice(0, endIdx + 1);
  const middle = calcEMA(slice, period);
  if (middle === null) return null;
  let atrSum = 0;
  for (let i = endIdx - atrPeriod + 1; i <= endIdx; i++) {
    atrSum += Math.abs(prices[i] - prices[i - 1]);
  }
  const atr = atrSum / atrPeriod;
  return { upper: middle + atrMulti * atr, middle, lower: middle - atrMulti * atr };
};

/* Count consecutive squeeze bars ending at the last price */
const countSqueezeBars = (prices, bbPeriod = 20, bbMult = 2.0, kcPeriod = 20, kcAtrMulti = 1.5, kcAtrPeriod = 14, maxLookback = 20) => {
  let count = 0;
  for (let i = prices.length - 1; i >= Math.max(bbPeriod, kcAtrPeriod + 1) && count < maxLookback; i--) {
    const bb = calcBBAtIndex(prices, i, bbPeriod, bbMult);
    const kc = calcKCAtIndex(prices, i, kcPeriod, kcAtrMulti, kcAtrPeriod);
    if (!bb || !kc) break;
    if (bb.upper < kc.upper && bb.lower > kc.lower) {
      count++;
    } else {
      break;
    }
  }
  return count;
};

/* ================================================================
   SECTION 3: RSI DIVERGENCE DETECTION
   ================================================================ */

const detectRSIDivergence = (prices, rsiPeriod = 14, lookback = 30) => {
  const result = { bullish: false, bearish: false };
  if (!prices || prices.length < rsiPeriod + lookback) return result;
  const pSlice = prices.slice(-lookback);
  const rsiSeries = calcRSISeries(prices, rsiPeriod);
  if (rsiSeries.length < lookback) return result;
  const rSlice = rsiSeries.slice(-lookback);

  const findLocalMaxima = (arr) => {
    const maxima = [];
    for (let i = 2; i < arr.length - 2; i++) {
      if (arr[i] > arr[i-1] && arr[i] > arr[i-2] && arr[i] > arr[i+1] && arr[i] > arr[i+2]) {
        maxima.push({ idx: i, val: arr[i] });
      }
    }
    return maxima;
  };
  const findLocalMinima = (arr) => {
    const minima = [];
    for (let i = 2; i < arr.length - 2; i++) {
      if (arr[i] < arr[i-1] && arr[i] < arr[i-2] && arr[i] < arr[i+1] && arr[i] < arr[i+2]) {
        minima.push({ idx: i, val: arr[i] });
      }
    }
    return minima;
  };

  const pMaxima = findLocalMaxima(pSlice);
  const rMaxima = findLocalMaxima(rSlice);
  if (pMaxima.length >= 2 && rMaxima.length >= 2) {
    const pLast2 = pMaxima.slice(-2);
    const rLast2 = rMaxima.slice(-2);
    if (pLast2[1].val > pLast2[0].val && rLast2[1].val < rLast2[0].val) {
      result.bearish = true;
    }
  }

  const pMinima = findLocalMinima(pSlice);
  const rMinima = findLocalMinima(rSlice);
  if (pMinima.length >= 2 && rMinima.length >= 2) {
    const pLast2 = pMinima.slice(-2);
    const rLast2 = rMinima.slice(-2);
    if (pLast2[1].val < pLast2[0].val && rLast2[1].val > rLast2[0].val) {
      result.bullish = true;
    }
  }
  return result;
};

/* ================================================================
   SECTION 4: STRATEGY ENGINES
   FIX #3: Minimum data requirements enforced per strategy.
   HYBRID needs 60 ticks, single strategies need 40.
   ================================================================ */

const computeHybrid = (prices, cfg, isAuto) => {
  const out = { direction: null, strength: 0, votes: 0, total: 5, components: {}, macdOk: false, atrSpike: false };
  if (!prices || prices.length < 60) return out;

  const rsi = calcRSI(prices, cfg.rsiPeriod);
  const stoch = calcStochRSI(prices, cfg.rsiPeriod, cfg.stochPeriod, cfg.stochSmooth);
  const bb = calcBB(prices, cfg.bbPeriod);
  const emaF = calcEMA(prices, cfg.emaFast);
  const emaS = calcEMA(prices, cfg.emaSlow);
  const emaT = calcEMA(prices, cfg.emaTrend);
  const m = calcMACD(prices, cfg.macdFast, cfg.macdSlow, cfg.macdSignal);
  const atrData = calcATRAvg(prices, cfg.atrPeriod || 14, 50);

  out.macdOk = m.bullish !== null ? true : false;
  out.atrSpike = atrData.spike;
  const w = cfg.weights;
  let callScore = 0, putScore = 0, callVotes = 0, putVotes = 0;

  if (rsi !== null) {
    if (rsi < 35) { callScore += w.rsi * (35 - rsi) / 35 * 100; callVotes++; out.components.rsi = { dir: 'CALL', score: Math.round((35 - rsi) / 35 * 100) }; }
    else if (rsi > 65) { putScore += w.rsi * (rsi - 65) / 35 * 100; putVotes++; out.components.rsi = { dir: 'PUT', score: Math.round((rsi - 65) / 35 * 100) }; }
    else { out.components.rsi = { dir: 'NEUTRAL', score: 0 }; }
  }

  if (stoch.k !== null) {
    if (stoch.k < 20) { callScore += w.stochRSI * (20 - stoch.k) / 20 * 100; callVotes++; out.components.stochRSI = { dir: 'CALL', score: Math.round((20 - stoch.k) / 20 * 100) }; }
    else if (stoch.k > 80) { putScore += w.stochRSI * (stoch.k - 80) / 20 * 100; putVotes++; out.components.stochRSI = { dir: 'PUT', score: Math.round((stoch.k - 80) / 20 * 100) }; }
    else { out.components.stochRSI = { dir: 'NEUTRAL', score: 0 }; }
  }

  if (bb.pctB !== null) {
    if (bb.pctB < 10) { callScore += w.bb * (10 - bb.pctB) / 10 * 100; callVotes++; out.components.bb = { dir: 'CALL', score: Math.round((10 - bb.pctB) / 10 * 100) }; }
    else if (bb.pctB > 90) { putScore += w.bb * (bb.pctB - 90) / 10 * 100; putVotes++; out.components.bb = { dir: 'PUT', score: Math.round((bb.pctB - 90) / 10 * 100) }; }
    else { out.components.bb = { dir: 'NEUTRAL', score: 0 }; }
  }

  if (emaF !== null && emaS !== null) {
    const price = prices[prices.length - 1];
    if (emaF > emaS && price > emaF) { callScore += w.ema * 80; callVotes++; out.components.ema = { dir: 'CALL', score: 80 }; }
    else if (emaF < emaS && price < emaF) { putScore += w.ema * 80; putVotes++; out.components.ema = { dir: 'PUT', score: 80 }; }
    else { out.components.ema = { dir: 'NEUTRAL', score: 0 }; }
  }

  if (m.macd !== null) {
    if (m.crossUp || (m.bullish && m.histogram > 0)) {
      callScore += w.macd * (m.crossUp ? 100 : 70);
      callVotes++;
      out.components.macd = { dir: 'CALL', score: m.crossUp ? 100 : 70 };
    } else if (m.crossDown || (!m.bullish && m.histogram < 0)) {
      putScore += w.macd * (m.crossDown ? 100 : 70);
      putVotes++;
      out.components.macd = { dir: 'PUT', score: m.crossDown ? 100 : 70 };
    } else {
      out.components.macd = { dir: 'NEUTRAL', score: 0 };
    }
  }

  const totalWeight = w.rsi + w.stochRSI + w.bb + w.ema + w.macd;
  let direction = null, votes = 0, strength = 0;
  if (callScore > putScore) {
    direction = 'CALL'; votes = callVotes; strength = totalWeight > 0 ? Math.min(100, Math.round(callScore / totalWeight)) : 0;
  } else if (putScore > callScore) {
    direction = 'PUT'; votes = putVotes; strength = totalWeight > 0 ? Math.min(100, Math.round(putScore / totalWeight)) : 0;
  }

  const macdDir = m.bullish ? 'CALL' : 'PUT';
  out.macdOk = direction === macdDir;

  if (emaT !== null) {
    const price = prices[prices.length - 1];
    if (direction === 'CALL' && price < emaT) strength = Math.round(strength * 0.7);
    if (direction === 'PUT' && price > emaT) strength = Math.round(strength * 0.7);
  }

  if (atrData.spike) strength = Math.round(strength * 0.6);

  const div = detectRSIDivergence(prices, cfg.rsiPeriod);
  if (div.bullish && direction === 'CALL') strength = Math.min(100, strength + 5);
  if (div.bearish && direction === 'PUT') strength = Math.min(100, strength + 5);

  const minVotes = isAuto ? cfg.autoMinVotes : cfg.manualMinVotes;
  const minStr = isAuto ? cfg.autoMinStrength : cfg.manualMinStrength;

  if (votes < minVotes || strength < minStr || !out.macdOk) {
    direction = null;
  }

  out.direction = direction;
  out.strength = strength;
  out.votes = votes;
  return out;
};

const computeSingle = (strategy, prices, cfg, isAuto) => {
  const out = { direction: null, strength: 0, votes: 0, total: 1, components: {}, macdOk: false, atrSpike: false };
  if (!prices || prices.length < 40) return out;

  const m = macdGate(prices, cfg);

  if (strategy === 'RSI') {
    const rsi = calcRSI(prices, cfg.rsiPeriod);
    const emaT = calcEMA(prices, cfg.emaTrend || 50);
    if (rsi === null) return out;
    let dir = null, str = 0;
    if (rsi < cfg.rsiOS) { dir = 'CALL'; str = Math.round((cfg.rsiOS - rsi) / cfg.rsiOS * 100); }
    else if (rsi > cfg.rsiOB) { dir = 'PUT'; str = Math.round((rsi - cfg.rsiOB) / (100 - cfg.rsiOB) * 100); }
    out.components.rsi = { dir: dir || 'NEUTRAL', score: str };
    if (dir && emaT !== null) {
      const price = prices[prices.length - 1];
      if (dir === 'CALL' && price < emaT) str = Math.round(str * 0.7);
      if (dir === 'PUT' && price > emaT) str = Math.round(str * 0.7);
    }
    const macdDir = m.bullish ? 'CALL' : 'PUT';
    out.macdOk = dir === macdDir;
    if (!out.macdOk) dir = null;
    out.direction = dir; out.strength = str; out.votes = dir ? 1 : 0;
    out.components.macd = { dir: macdDir, score: m.crossUp || m.crossDown ? 100 : 50 };
    return out;
  }

  if (strategy === 'EMA') {
    const emaF = calcEMA(prices, cfg.emaFast);
    const emaS = calcEMA(prices, cfg.emaSlow);
    const atrData = calcATRAvg(prices, cfg.atrPeriod, 50);
    if (emaF === null || emaS === null) return out;
    const prevPrices = prices.slice(0, -1);
    const prevF = calcEMA(prevPrices, cfg.emaFast);
    const prevS = calcEMA(prevPrices, cfg.emaSlow);
    let dir = null, str = 0;
    if (prevF !== null && prevS !== null) {
      if (prevF <= prevS && emaF > emaS) { dir = 'CALL'; str = 85; }
      else if (prevF >= prevS && emaF < emaS) { dir = 'PUT'; str = 85; }
      else if (emaF > emaS) { dir = 'CALL'; str = 60; }
      else if (emaF < emaS) { dir = 'PUT'; str = 60; }
    }
    out.components.ema = { dir: dir || 'NEUTRAL', score: str };
    out.atrSpike = atrData.spike;
    if (atrData.spike) str = Math.round(str * 0.6);
    const macdDir = m.bullish ? 'CALL' : 'PUT';
    out.macdOk = dir === macdDir;
    if (!out.macdOk) dir = null;
    out.direction = dir; out.strength = str; out.votes = dir ? 1 : 0;
    out.components.macd = { dir: macdDir, score: m.crossUp || m.crossDown ? 100 : 50 };
    return out;
  }

  if (strategy === 'BB') {
    const bb = calcBB(prices, cfg.bbPeriod);
    const stoch = calcStochRSI(prices, 14, cfg.stochPeriod, cfg.stochSmooth);
    if (bb.pctB === null) return out;
    let dir = null, str = 0;
    if (bb.pctB < 5 && stoch.k !== null && stoch.k < 20) { dir = 'CALL'; str = Math.round(90 - bb.pctB * 2); }
    else if (bb.pctB > 95 && stoch.k !== null && stoch.k > 80) { dir = 'PUT'; str = Math.round(90 - (100 - bb.pctB) * 2); }
    else if (bb.pctB < 15) { dir = 'CALL'; str = 55; }
    else if (bb.pctB > 85) { dir = 'PUT'; str = 55; }
    out.components.bb = { dir: dir || 'NEUTRAL', score: str };
    if (stoch.k !== null) out.components.stochRSI = { dir: stoch.k < 30 ? 'CALL' : stoch.k > 70 ? 'PUT' : 'NEUTRAL', score: Math.round(Math.abs(stoch.k - 50)) };
    const macdDir = m.bullish ? 'CALL' : 'PUT';
    out.macdOk = dir === macdDir;
    if (!out.macdOk) dir = null;
    out.direction = dir; out.strength = str; out.votes = dir ? 1 : 0;
    out.components.macd = { dir: macdDir, score: m.crossUp || m.crossDown ? 100 : 50 };
    return out;
  }

  if (strategy === 'MACD') {
    const rsi = calcRSI(prices, cfg.rsiPeriod);
    if (m.macd === null) return out;
    let dir = null, str = 0;
    if (m.crossUp) { dir = 'CALL'; str = 90; }
    else if (m.crossDown) { dir = 'PUT'; str = 90; }
    else if (m.bullish && m.histogram > 0) { dir = 'CALL'; str = 65; }
    else if (!m.bullish && m.histogram < 0) { dir = 'PUT'; str = 65; }
    out.components.macd = { dir: dir || 'NEUTRAL', score: str };
    out.macdOk = true;
    if (rsi !== null) {
      if (dir === 'CALL' && rsi > cfg.rsiOB) { str = Math.round(str * 0.5); dir = null; }
      if (dir === 'PUT' && rsi < cfg.rsiOS) { str = Math.round(str * 0.5); dir = null; }
      out.components.rsi = { dir: rsi < 40 ? 'CALL' : rsi > 60 ? 'PUT' : 'NEUTRAL', score: Math.round(Math.abs(rsi - 50) * 2) };
    }
    out.direction = dir; out.strength = str; out.votes = dir ? 1 : 0;
    return out;
  }

  return out;
};

/* ================================================================
   SECTION 4B: V50 RESEARCH STRATEGIES
   Three strategies from the V50 Quantitative Strategy Guide.
   EMA_STOCH: EMA(8) + Stochastic(5,3,3) trend scalper
   SMA_RSI:   SMA(20/50) crossover + RSI pullback swing
   BB_SQUEEZE: Bollinger Band squeeze breakout
   ================================================================ */

const computeEmaStoch = (prices, cfg) => {
  const out = { direction: null, strength: 0, votes: 0, total: 3, components: {}, macdOk: true, atrSpike: false };
  if (!prices || prices.length < 40) return out;

  const ema8 = calcEMA(prices, cfg.ema8Period || 8);
  const ema21 = calcEMA(prices, cfg.ema21Period || 21);
  const stoch = calcStochastic(prices, cfg.stochK || 5, cfg.stochD || 3, cfg.stochSlowing || 3);
  const atrData = calcATRAvg(prices, cfg.atrPeriod || 14, 50);
  const close = prices[prices.length - 1];

  out.atrSpike = atrData.spike;

  // Component: EMA trend direction
  if (ema8 !== null) {
    if (close > ema8) out.components.ema = { dir: 'CALL', score: 70 };
    else if (close < ema8) out.components.ema = { dir: 'PUT', score: 70 };
    else out.components.ema = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: Stochastic crossover
  if (stoch.k !== null && stoch.d !== null && stoch.kPrev !== null && stoch.dPrev !== null) {
    // Check if %K was oversold in recent bars (look at kSeries)
    const recentK = stoch.kSeries.slice(-5);
    const wasOversold = recentK.some(v => v < 20);
    const wasOverbought = recentK.some(v => v > 80);
    const crossUp = stoch.kPrev < stoch.dPrev && stoch.k > stoch.d;
    const crossDown = stoch.kPrev > stoch.dPrev && stoch.k < stoch.d;

    if (crossUp && wasOversold && stoch.kPrev <= 20 && stoch.dPrev <= 20) {
      out.components.stoch = { dir: 'CALL', score: 90 };
    } else if (crossDown && wasOverbought && stoch.kPrev >= 80 && stoch.dPrev >= 80) {
      out.components.stoch = { dir: 'PUT', score: 90 };
    } else if (crossUp && wasOversold) {
      out.components.stoch = { dir: 'CALL', score: 65 };
    } else if (crossDown && wasOverbought) {
      out.components.stoch = { dir: 'PUT', score: 65 };
    } else {
      out.components.stoch = { dir: 'NEUTRAL', score: 0 };
    }
  } else {
    out.components.stoch = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: EMA slope filter (8 EMA not flat)
  if (ema8 !== null && prices.length > 3) {
    const prevEma8 = calcEMA(prices.slice(0, -3), cfg.ema8Period || 8);
    const slopeOk = prevEma8 !== null && Math.abs(ema8 - prevEma8) > (cfg.slopeThreshold || 0.5);
    out.components.slope = { dir: slopeOk ? 'CALL' : 'NEUTRAL', score: slopeOk ? 60 : 0 };
  }

  // Determine direction: all conditions must align
  const emaDir = out.components.ema?.dir;
  const stochDir = out.components.stoch?.dir;
  const slopeOk = out.components.slope?.dir !== 'NEUTRAL';

  let dir = null, str = 0, votes = 0;

  if (emaDir === 'CALL' && stochDir === 'CALL' && slopeOk) {
    // Optional 21 EMA filter
    if (ema21 !== null && ema8 !== null && ema8 < ema21) {
      str = 50; // downgrade if against longer trend
    } else {
      str = out.components.stoch.score;
    }
    dir = 'CALL'; votes = 3;
  } else if (emaDir === 'PUT' && stochDir === 'PUT' && slopeOk) {
    if (ema21 !== null && ema8 !== null && ema8 > ema21) {
      str = 50;
    } else {
      str = out.components.stoch.score;
    }
    dir = 'PUT'; votes = 3;
  } else if (emaDir === stochDir && emaDir !== 'NEUTRAL') {
    dir = emaDir; str = 55; votes = 2; // missing slope confirmation
  }

  if (atrData.spike) str = Math.round(str * 0.6);

  out.direction = dir; out.strength = str; out.votes = votes;
  out.macdOk = true; // No MACD gate for this strategy
  return out;
};

const computeSmaRsi = (prices, cfg) => {
  const out = { direction: null, strength: 0, votes: 0, total: 3, components: {}, macdOk: true, atrSpike: false };
  if (!prices || prices.length < 60) return out;

  const sma20 = calcSMA(prices, cfg.sma20Period || 20);
  const sma50 = calcSMA(prices, cfg.sma50Period || 50);
  const rsi = calcRSI(prices, cfg.rsiPeriod || 14);
  const close = prices[prices.length - 1];
  const atrData = calcATRAvg(prices, cfg.atrPeriod || 14, 50);

  out.atrSpike = atrData.spike;

  if (sma20 === null || sma50 === null || rsi === null) return out;

  // Check SMA crossover within last 10 bars
  const sma20Series = calcSMASeries(prices, cfg.sma20Period || 20);
  const sma50Series = calcSMASeries(prices, cfg.sma50Period || 50);
  let recentCrossUp = false, recentCrossDown = false;

  if (sma20Series.length > 0 && sma50Series.length > 0) {
    const offset = sma20Series.length - sma50Series.length;
    const lookback = Math.min(10, sma50Series.length - 1);
    for (let i = 0; i < lookback; i++) {
      const idx50 = sma50Series.length - 1 - i;
      const idx20 = idx50 + offset;
      const prevIdx50 = idx50 - 1;
      const prevIdx20 = idx20 - 1;
      if (prevIdx50 >= 0 && prevIdx20 >= 0) {
        if (sma20Series[prevIdx20] <= sma50Series[prevIdx50] && sma20Series[idx20] > sma50Series[idx50]) recentCrossUp = true;
        if (sma20Series[prevIdx20] >= sma50Series[prevIdx50] && sma20Series[idx20] < sma50Series[idx50]) recentCrossDown = true;
      }
    }
  }

  // Current relationship
  const sma20AboveSma50 = sma20 > sma50;
  const smaSep = Math.abs(sma20 - sma50);
  const minSep = cfg.minSmaSep || 0.5;

  // Component: SMA crossover
  if (sma20AboveSma50 && smaSep >= minSep) {
    out.components.sma = { dir: 'CALL', score: recentCrossUp ? 85 : 65 };
  } else if (!sma20AboveSma50 && smaSep >= minSep) {
    out.components.sma = { dir: 'PUT', score: recentCrossDown ? 85 : 65 };
  } else {
    out.components.sma = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: RSI filter
  if (rsi > 50 && rsi < 70) {
    out.components.rsi = { dir: 'CALL', score: Math.round((rsi - 50) * 3.5) };
  } else if (rsi < 50 && rsi > 30) {
    out.components.rsi = { dir: 'PUT', score: Math.round((50 - rsi) * 3.5) };
  } else {
    out.components.rsi = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: Pullback to 20 SMA
  const distToSma20 = Math.abs(close - sma20);
  const pullbackThreshold = cfg.pullbackThreshold || 2;
  const isPullback = distToSma20 <= pullbackThreshold;

  if (sma20AboveSma50 && isPullback && close >= sma20) {
    out.components.pullback = { dir: 'CALL', score: 80 };
  } else if (!sma20AboveSma50 && isPullback && close <= sma20) {
    out.components.pullback = { dir: 'PUT', score: 80 };
  } else {
    out.components.pullback = { dir: 'NEUTRAL', score: isPullback ? 30 : 0 };
  }

  // Aggregate: need SMA + RSI alignment + pullback
  const smaDir = out.components.sma.dir;
  const rsiDir = out.components.rsi.dir;
  const pbDir = out.components.pullback.dir;

  let dir = null, str = 0, votes = 0;

  if (smaDir === 'CALL' && rsiDir === 'CALL' && pbDir === 'CALL') {
    dir = 'CALL'; str = Math.round((out.components.sma.score + out.components.rsi.score + out.components.pullback.score) / 3); votes = 3;
  } else if (smaDir === 'PUT' && rsiDir === 'PUT' && pbDir === 'PUT') {
    dir = 'PUT'; str = Math.round((out.components.sma.score + out.components.rsi.score + out.components.pullback.score) / 3); votes = 3;
  } else if (smaDir === rsiDir && smaDir !== 'NEUTRAL') {
    dir = smaDir; str = Math.round((out.components.sma.score + out.components.rsi.score) / 2 * 0.7); votes = 2;
  }

  if (atrData.spike) str = Math.round(str * 0.6);

  out.direction = dir; out.strength = str; out.votes = votes;
  out.macdOk = true;
  return out;
};

const computeBbSqueeze = (prices, cfg) => {
  const out = { direction: null, strength: 0, votes: 0, total: 4, components: {}, macdOk: false, atrSpike: false };
  if (!prices || prices.length < 60) return out;

  const bbPeriod = cfg.bbPeriod || 20;
  const bbMult = cfg.bbMult || 2.0;
  const kcPeriod = cfg.kcPeriod || 20;
  const kcAtrMulti = cfg.kcAtrMulti || 1.5;
  const kcAtrPeriod = cfg.kcAtrPeriod || 14;
  const minSqueezeBars = cfg.minSqueezeBars || 3;

  const bb = calcBB(prices, bbPeriod);
  const kc = calcKeltnerChannels(prices, kcPeriod, kcAtrMulti, kcAtrPeriod);
  const m = calcMACD(prices, cfg.macdFast || 12, cfg.macdSlow || 26, cfg.macdSignal || 9);
  const rsi = calcRSI(prices, cfg.rsiPeriod || 14);
  const atr = calcATR(prices, cfg.atrPeriod || 14);
  const atrData = calcATRAvg(prices, cfg.atrPeriod || 14, 50);
  const close = prices[prices.length - 1];

  out.atrSpike = atrData.spike;

  if (!bb.upper || !kc.upper) return out;

  // Check for prior squeeze
  // Use the previous bar's data to see if squeeze was active BEFORE current bar
  const prevPrices = prices.slice(0, -1);
  const squeezeBars = countSqueezeBars(prevPrices, bbPeriod, bbMult, kcPeriod, kcAtrMulti, kcAtrPeriod);
  const squeezeWasActive = squeezeBars >= minSqueezeBars;

  // Current bar: squeeze fired? (BB expanded beyond KC)
  const bbAboveKc = bb.upper > kc.upper;
  const bbBelowKc = bb.lower < kc.lower;
  const squeezeFiredUp = squeezeWasActive && bbAboveKc;
  const squeezeFiredDown = squeezeWasActive && bbBelowKc;

  // Component: Squeeze state
  if (squeezeFiredUp) {
    out.components.squeeze = { dir: 'CALL', score: 85 };
  } else if (squeezeFiredDown) {
    out.components.squeeze = { dir: 'PUT', score: 85 };
  } else if (squeezeWasActive) {
    out.components.squeeze = { dir: 'NEUTRAL', score: 40 }; // squeeze still active, waiting
  } else {
    out.components.squeeze = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: Price breakout beyond BB
  if (close > bb.upper) {
    out.components.bb = { dir: 'CALL', score: 80 };
  } else if (close < bb.lower) {
    out.components.bb = { dir: 'PUT', score: 80 };
  } else {
    out.components.bb = { dir: 'NEUTRAL', score: 0 };
  }

  // Component: MACD/RSI momentum confirmation
  if (m.histogram !== null) {
    if (m.histogram > 0) out.components.macd = { dir: 'CALL', score: 70 };
    else if (m.histogram < 0) out.components.macd = { dir: 'PUT', score: 70 };
    else out.components.macd = { dir: 'NEUTRAL', score: 0 };
  } else {
    out.components.macd = { dir: 'NEUTRAL', score: 0 };
  }

  if (rsi !== null) {
    if (rsi > 50) out.components.rsi = { dir: 'CALL', score: Math.round((rsi - 50) * 2) };
    else out.components.rsi = { dir: 'PUT', score: Math.round((50 - rsi) * 2) };
  }

  // Aggregate: squeeze fired + price breakout + momentum confirm
  const sqDir = out.components.squeeze.dir;
  const bbDir = out.components.bb.dir;
  const macdDir = out.components.macd.dir;

  let dir = null, str = 0, votes = 0;

  if (sqDir === 'CALL' && bbDir === 'CALL' && macdDir === 'CALL') {
    dir = 'CALL'; str = Math.round((out.components.squeeze.score + out.components.bb.score + out.components.macd.score) / 3); votes = 3;
    if (rsi !== null && rsi > 50) { votes = 4; str = Math.min(100, str + 5); }
  } else if (sqDir === 'PUT' && bbDir === 'PUT' && macdDir === 'PUT') {
    dir = 'PUT'; str = Math.round((out.components.squeeze.score + out.components.bb.score + out.components.macd.score) / 3); votes = 3;
    if (rsi !== null && rsi < 50) { votes = 4; str = Math.min(100, str + 5); }
  } else if (sqDir === bbDir && sqDir !== 'NEUTRAL') {
    dir = sqDir; str = Math.round((out.components.squeeze.score + out.components.bb.score) / 2 * 0.7); votes = 2;
  }

  out.macdOk = dir ? (macdDir === dir) : false;
  out.direction = dir; out.strength = str; out.votes = votes;
  return out;
};

/* ================================================================
   SECTION 4C: MARSBOT PRO V50 — LOCKED AI STRATEGY ENGINE
   🔒 Config is frozen. Parameters cannot be modified externally.
   Uses adaptive RSI thresholds + EMA trend + support/resistance zones.
   ================================================================ */

function _mbpEMA(prices, period) {
  if (!prices || prices.length < period || period < 1) return null;
  const k = 2 / (period + 1);
  let ema = 0;
  for (let i = 0; i < period; i++) ema += prices[i];
  ema /= period;
  for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
  return isFinite(ema) ? ema : null;
}

function _mbpRSI(prices, period) {
  if (!prices || prices.length < period + 1 || period < 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = prices[i] - prices[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  const rsi = 100 - 100 / (1 + avgGain / avgLoss);
  return isFinite(rsi) ? rsi : null;
}

function _mbpATR(prices, period) {
  if (!prices || prices.length < period + 1 || period < 1) return null;
  let total = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    total += Math.abs(prices[i] - prices[i - 1]);
  }
  const atr = total / period;
  return isFinite(atr) ? atr : null;
}

function _mbpAvgRange(prices, period) {
  if (!prices || prices.length < period || period < 1) return null;
  let total = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    total += Math.abs(prices[i] - prices[i - 1]);
  }
  return total / period;
}

function _mbpNear(price, level, tolerance) {
  if (!price || !level) return false;
  return Math.abs(price - level) / price < tolerance;
}

function _mbpZones(prices, lookback) {
  const slice = prices.slice(-lookback);
  return {
    support: Math.min(...slice),
    resistance: Math.max(...slice),
  };
}

const computeMarsBotPro = (prices) => {
  const out = { direction: null, strength: 0, votes: 0, total: 4, components: {}, macdOk: true, atrSpike: false };
  if (!prices || prices.length < 60) return out;

  const price  = prices[prices.length - 1];
  const ema10  = _mbpEMA(prices, 10);
  const ema50  = _mbpEMA(prices, 50);
  const rsi    = _mbpRSI(prices, 14);
  const atr    = _mbpATR(prices, 14);
  const avgRange = _mbpAvgRange(prices, 20);

  if (ema10 === null || ema50 === null || rsi === null || atr === null || avgRange === null) return out;

  const volatilityOK = atr > avgRange * 0.8;
  out.atrSpike = atr > avgRange * 1.5;

  const uptrend   = price > ema50 && ema10 > ema50;
  const downtrend = price < ema50 && ema10 < ema50;

  // 🧠 Adaptive RSI thresholds from AI_STATE
  const baseOversold   = 35 + AI_STATE.rsiOffset;
  const baseOverbought = 65 - AI_STATE.rsiOffset;

  const { support, resistance } = _mbpZones(prices, 20);

  let signal = null;
  let confidence = 0;

  // Component breakdown
  out.components.ema    = { dir: uptrend ? 'CALL' : downtrend ? 'PUT' : 'NEUTRAL', score: uptrend || downtrend ? 70 : 0 };
  out.components.rsi    = { dir: rsi < baseOversold ? 'CALL' : rsi > baseOverbought ? 'PUT' : 'NEUTRAL', score: rsi < baseOversold ? Math.round((baseOversold - rsi) / baseOversold * 100) : rsi > baseOverbought ? Math.round((rsi - baseOverbought) / (100 - baseOverbought) * 100) : 0 };
  out.components.zone   = { dir: _mbpNear(price, support, 0.002) ? 'CALL' : _mbpNear(price, resistance, 0.002) ? 'PUT' : 'NEUTRAL', score: (_mbpNear(price, support, 0.002) || _mbpNear(price, resistance, 0.002)) ? 80 : 0 };
  out.components.vol    = { dir: volatilityOK ? 'CALL' : 'NEUTRAL', score: volatilityOK ? 60 : 0 };

  if (uptrend && rsi < baseOversold && _mbpNear(price, support, 0.002) && volatilityOK) {
    confidence = 75;
    signal = 'CALL';
  }
  if (downtrend && rsi > baseOverbought && _mbpNear(price, resistance, 0.002) && volatilityOK) {
    confidence = 75;
    signal = 'PUT';
  }

  // 🧠 Adaptive confidence threshold from AI_STATE
  const requiredConfidence = MARSBOT_PRO_CONFIG.minConfidence + AI_STATE.confidenceOffset;

  if (confidence < requiredConfidence) signal = null;

  out.direction = signal;
  out.strength  = signal ? confidence : 0;
  out.votes     = signal ? 4 : 0;
  return out;
};

const getSignal = (strategy, prices, symbol, isAuto) => {
  // 🔒 MARSBOT PRO V50: locked strategy, bypasses all external config
  if (strategy === MARSBOT_PRO_ID) return computeMarsBotPro(prices);
  const cfg = getConfig(symbol, strategy);
  if (strategy === 'HYBRID') return computeHybrid(prices, cfg, isAuto);
  if (strategy === 'EMA_STOCH') return computeEmaStoch(prices, cfg);
  if (strategy === 'SMA_RSI') return computeSmaRsi(prices, cfg);
  if (strategy === 'BB_SQUEEZE') return computeBbSqueeze(prices, cfg);
  return computeSingle(strategy, prices, cfg, isAuto);
};

/* ================================================================
   SECTION 5: BACKTEST ENGINE
   ================================================================ */

const runBacktest = (prices, strategy, symbol, isAuto = true) => {
  const results = { trades: [], wins: 0, losses: 0, totalPnL: 0, maxDrawdown: 0, maxStreak: 0, maxLossStreak: 0, callCount: 0, putCount: 0, rollingWR: [] };
  if (!prices || prices.length < 80) return results;

  let equity = 0, peak = 0, streak = 0, lossStreak = 0;

  for (let i = 60; i < prices.length - 1; i++) {
    const slice = prices.slice(0, i + 1);
    const signal = getSignal(strategy, slice, symbol, isAuto);
    if (!signal.direction) continue;

    const entry = prices[i];
    const exit = prices[i + 1];
    const won = signal.direction === 'CALL' ? exit > entry : exit < entry;
    const pnl = won ? 0.85 : -1;

    if (signal.direction === 'CALL') results.callCount++;
    else results.putCount++;

    results.trades.push({
      idx: i,
      direction: signal.direction,
      strength: signal.strength,
      strategy,
      entry,
      exit,
      won,
      pnl,
    });

    if (won) { results.wins++; streak++; lossStreak = 0; }
    else { results.losses++; lossStreak++; streak = 0; }
    results.maxStreak = Math.max(results.maxStreak, streak);
    results.maxLossStreak = Math.max(results.maxLossStreak, lossStreak);
    results.totalPnL += pnl;
    equity += pnl;
    peak = Math.max(peak, equity);
    const dd = peak - equity;
    results.maxDrawdown = Math.max(results.maxDrawdown, dd);

    const recentTrades = results.trades.slice(-20);
    const recentWins = recentTrades.filter(t => t.won).length;
    results.rollingWR.push(Math.round((recentWins / recentTrades.length) * 100));
  }

  return results;
};

/* ================================================================
   SECTION 6: SOUND ENGINE
   ================================================================ */

let audioCtx = null;
const getAudioCtx = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
};

const playTone = (freq, dur, type = 'sine') => {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) { /* ignore audio errors */ }
};

const sounds = {
  signal: () => playTone(880, 0.15),
  win: () => { playTone(660, 0.12); setTimeout(() => playTone(880, 0.15), 130); },
  loss: () => playTone(220, 0.4, 'square'),
};

const exportCSV = (trades) => {
  const headers = ['Time', 'Symbol', 'Direction', 'UI Label', 'Strategy', 'Stake', 'Result', 'P&L', 'Strength', 'MACD Gate'];
  const rows = trades.map(t => [
    t.time || '', t.symbol || '', t.direction || '', dirLabel(t.direction),
    t.strategy || '', t.stake || '', t.won ? 'WIN' : 'LOSS',
    typeof t.profit === 'number' ? t.profit.toFixed(2) : '',
    t.strength || '', t.macdOk ? 'YES' : 'NO',
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `marsbot_trades_${Date.now()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

   Trades are stored in localStorage with dedup by contract_id.
   ================================================================ */

const loadStoredTrades = () => {
  try {
    const raw = localStorage.getItem(TRADE_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
};

const saveStoredTrades = (trades) => {
  try {
    const trimmed = trades.slice(0, MAX_STORED_TRADES);
    localStorage.setItem(TRADE_STORAGE_KEY, JSON.stringify(trimmed));
  } catch { /* quota exceeded — silently fail */ }
};

const addTradeDeduped = (existing, newTrade) => {
  // Dedup by contract_id
  if (newTrade.id && existing.some(t => t.id === newTrade.id)) {
    return existing; // already recorded
  }
  const updated = [newTrade, ...existing].slice(0, MAX_STORED_TRADES);
  saveStoredTrades(updated);
  return updated;
};

// Sparkline Component
const Sparkline = ({ data, width = 280, height = 50, color = 'var(--primary)' }) => {
  if (!data || data.length < 2) return <svg width={width} height={height} />;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const points = data.map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 4) - 2}`).join(' ');
  return (
    <svg width={width} height={height} style={{ display: 'block', width: '100%', height: height }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
      <circle cx={(data.length - 1) * step} cy={height - ((data[data.length - 1] - min) / range) * (height - 4) - 2} r="3" fill={color} />
    </svg>
  );
};

// WR Sparkline
const WRSparkline = ({ data, width = 280, height = 40 }) => {
  if (!data || data.length < 2) return null;
  const step = width / (data.length - 1);
  const points = data.map((v, i) => `${i * step},${height - (v / 100) * (height - 4) - 2}`).join(' ');
  const fiftyY = height - (50 / 100) * (height - 4) - 2;
  return (
    <svg width={width} height={height} style={{ display: 'block', width: '100%', height: height }}>
      <line x1="0" y1={fiftyY} x2={width} y2={fiftyY} stroke="var(--muted)" strokeWidth="0.5" strokeDasharray="4 4" />
      <polyline points={points} fill="none" stroke="var(--warning)" strokeWidth="1.5" strokeLinejoin="round" />
    </svg>
  );
};

// Strength Gauge — FIX #8: shows Up/Down instead of CALL/PUT
const StrengthGauge = ({ strength = 0, direction }) => {
  const r = 60;
  const cx = 80;
  const cy = 75;
  const startAngle = Math.PI;
  const sweep = Math.PI;
  const pct = Math.max(0, Math.min(100, strength)) / 100;

  const arcPath = (start, end, radius) => {
    const x1 = cx + radius * Math.cos(start);
    const y1 = cy + radius * Math.sin(start);
    const x2 = cx + radius * Math.cos(end);
    const y2 = cy + radius * Math.sin(end);
    const largeArc = end - start > Math.PI ? 1 : 0;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`;
  };

  const color = direction === 'CALL' ? 'var(--primary)' : direction === 'PUT' ? 'var(--danger)' : 'var(--muted)';
  const label = direction ? dirLabel(direction) : 'WAITING';

  return (
    <div className="gauge-container">
      <svg width="160" height="100" viewBox="0 0 160 100">
        <path d={arcPath(startAngle, 0, r)} fill="none" stroke="var(--surface)" strokeWidth="10" strokeLinecap="round" />
        {pct > 0 && <path d={arcPath(startAngle, startAngle + sweep * pct, r)} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" />}
        <text x={cx} y={cy - 8} textAnchor="middle" fill={color} fontSize="28" fontWeight="700" fontFamily="'JetBrains Mono', monospace">{strength}%</text>
        <text x={cx} y={cy + 10} textAnchor="middle" fill="var(--muted)" fontSize="10" fontWeight="600">{label}</text>
      </svg>
    </div>
  );
};

// Indicator Pill — FIX #8: shows Up/Down
const IndicatorPill = ({ name, data }) => {
  if (!data) return <span className="pill pill-neutral">{name} —</span>;
  const cls = data.dir === 'CALL' ? 'pill-up' : data.dir === 'PUT' ? 'pill-down' : 'pill-neutral';
  const arrow = data.dir === 'CALL' ? '↑' : data.dir === 'PUT' ? '↓' : '—';
  const label = data.dir === 'CALL' ? 'Up' : data.dir === 'PUT' ? 'Down' : '—';
  return <span className={`pill ${cls}`}>{name} {arrow} {data.score}</span>;
};

/* ================================================================
   FIX #5: Contract Countdown Timer Component
   Uses Deriv's start_time and expiry_time epochs.
   ================================================================ */
const ContractCountdown = ({ expiryTime }) => {
  const [remaining, setRemaining] = useState('');

  useEffect(() => {
    if (!expiryTime) { setRemaining(''); return; }
    const update = () => {
      const now = Date.now() / 1000;
      const diff = expiryTime - now;
      if (diff <= 0) {
        setRemaining('Expiring...');
        return;
      }
      const mins = Math.floor(diff / 60);
      const secs = Math.floor(diff % 60);
      if (mins > 0) {
        setRemaining(`${mins}:${secs.toString().padStart(2, '0')}`);
      } else {
        setRemaining(`${secs}s`);
      }
    };
    update();
    const iv = setInterval(update, 250);
    return () => clearInterval(iv);
  }, [expiryTime]);

  if (!remaining) return null;
  return <div className="contract-countdown">{remaining}</div>;
};

const BacktestTab = ({ backtestResult, strategy, symbol, prices, doBacktest, btRunning }) => {
  const r = backtestResult;
  const totalTrades = r ? r.wins + r.losses : 0;
  const wr = totalTrades > 0 ? Math.round((r.wins / totalTrades) * 100) : 0;
  const profitFactor = r && r.losses > 0 ? Math.abs((r.wins * 0.85) / (r.losses * 1)).toFixed(2) : '∞';
  const avgPnL = totalTrades > 0 ? (r.totalPnL / totalTrades).toFixed(3) : '0';
  let sharpe = '—';
  if (r && r.trades.length > 1) {
    const returns = r.trades.map(t => t.pnl);
    const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
    const std = Math.sqrt(returns.reduce((a, b) => a + (b - mean) ** 2, 0) / returns.length);
    if (std > 0) sharpe = (mean / std).toFixed(2);
  }

  return (
    <div>
      <div className="card">
        <div className="card-title">Backtest — {strategy} on {symbol}</div>
        <div className="fs-11 text-muted mb-8">Using {prices.length} collected ticks</div>
        <button className="btn btn-primary btn-full" onClick={doBacktest} disabled={btRunning || prices.length < 80}>
          {btRunning ? 'Running...' : 'Run Backtest'}
        </button>
      </div>

      {r && (
        <>
          <div className="stats-grid">
            <div className="stat-box">
              <div className="stat-label">Total Trades</div>
              <div className="stat-value">{totalTrades}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Win Rate</div>
              <div className="stat-value">{wr}%</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Net P&L</div>
              <div className={`stat-value ${r.totalPnL >= 0 ? 'text-primary' : 'text-danger'}`}>{r.totalPnL.toFixed(2)}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Profit Factor</div>
              <div className="stat-value">{profitFactor}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Max Drawdown</div>
              <div className="stat-value text-danger">{r.maxDrawdown.toFixed(2)}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Sharpe-like</div>
              <div className="stat-value">{sharpe}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Best Streak</div>
              <div className="stat-value text-primary">{r.maxStreak}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Worst Streak</div>
              <div className="stat-value text-danger">{r.maxLossStreak}</div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Up / Down</div>
              <div className="stat-value"><span className="text-primary">{r.callCount}</span> / <span className="text-danger">{r.putCount}</span></div>
            </div>
            <div className="stat-box">
              <div className="stat-label">Avg P&L / Trade</div>
              <div className="stat-value">{avgPnL}</div>
            </div>
          </div>

          {r.rollingWR.length > 2 && (
            <div className="card mt-8">

/* ================================================================
