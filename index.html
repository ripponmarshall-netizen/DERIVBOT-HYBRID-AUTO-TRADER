const App = () => {
  // ---- State ----
  const [tab, setTab] = useState('signal');
  const [connStatus, setConnStatus] = useState('disconnected');
  const [balance, setBalance] = useState(null);
  const [currency, setCurrency] = useState('USD');
  const [prices, setPrices] = useState([]);
  const [logs, setLogs] = useState([]);
  const [signal, setSignal] = useState({ direction: null, strength: 0, votes: 0, total: 5, components: {}, macdOk: false, atrSpike: false });
  const [trades, setTrades] = useState(() => loadStoredTrades()); // FIX #2: load from localStorage
  const [openContract, setOpenContract] = useState(null);
  const [backtestResult, setBTResult] = useState(null);
  const [btRunning, setBTRunning] = useState(false);

  // Settings
  const [token, setToken] = useState('');
  const [symbol, setSymbol] = useState('R_50');
  const [durKey, setDurKey] = useState(DEFAULT_DUR_KEY); // FIX #4: string key, not index
  const [strategy, setStrategy] = useState('HYBRID');
  const [autoMode, setAutoMode] = useState(false);
  const [stake, setStake] = useState('1');
  const [mmSystem, setMMSystem] = useState('FLAT');
  const [martiFactor, setMartiFactor] = useState(2);
  const [maxMartiSteps, setMaxMartiSteps] = useState(5);
  const [dalUnit, setDalUnit] = useState(0.5);
  const [revMartiMax, setRevMartiMax] = useState(10);
  const [soundOn, setSoundOn] = useState(true);
  const [profitTarget, setProfitTarget] = useState('');
  const [lossLimit, setLossLimit] = useState('');
  const [maxTrades, setMaxTrades] = useState('');
  const [cooldownLosses, setCooldownLosses] = useState(3);
  const [cooldownSecs, setCooldownSecs] = useState(30);
  const [macdGateEnabled, setMacdGateEnabled] = useState(true);
  const [minStrength, setMinStrength] = useState(70);
  const [running, setRunning] = useState(false);

  // Session
  const [sessionPnL, setSessionPnL] = useState(0);
  const [sessionTrades, setSessionTrades] = useState(0);
  const [sessionWins, setSessionWins] = useState(0);
  const [bestTrade, setBestTrade] = useState(0);
  const [worstTrade, setWorstTrade] = useState(0);
  const [winStreak, setWinStreak] = useState(0);
  const [maxWinStreak, setMaxWinStreak] = useState(0);
  const [consLosses, setConsLosses] = useState(0);
  const [cooldownEnd, setCooldownEnd] = useState(null);
  const [cooldownRemain, setCooldownRemain] = useState(0);
  const [sessionStopped, setSessionStopped] = useState(false);
  const [currentStake, setCurrentStake] = useState(1);
  const [martiStep, setMartiStep] = useState(0);
  const [isBuying, setIsBuying] = useState(false); // FIX: reactive buying state for button UI

  // Refs for WebSocket callbacks (avoid stale closures)
  const wsRef = useRef(null);
  const pingRef = useRef(null);
  const reconnectCount = useRef(0);
  const reconnectTimer = useRef(null);
  const pricesRef = useRef([]);
  const runningRef = useRef(false);
  const autoModeRef = useRef(false);
  const strategyRef = useRef('HYBRID');
  const symbolRef = useRef('R_50');
  const stakeRef = useRef(1);
  const currentStakeRef = useRef(1);
  const mmSystemRef = useRef('FLAT');
  const martiFactorRef = useRef(2);
  const maxMartiStepsRef = useRef(5);
  const dalUnitRef = useRef(0.5);
  const revMartiMaxRef = useRef(10);
  const martiStepRef = useRef(0);
  const soundOnRef = useRef(true);
  const profitTargetRef = useRef('');
  const lossLimitRef = useRef('');
  const maxTradesRef = useRef('');
  const cooldownLossesRef = useRef(3);
  const cooldownSecsRef = useRef(30);
  const macdGateEnabledRef = useRef(true);
  const minStrengthRef = useRef(70);
  const sessionPnLRef = useRef(0);
  const sessionTradesRef = useRef(0);
  const consLossesRef = useRef(0);
  const cooldownEndRef = useRef(null);
  const sessionStoppedRef = useRef(false);
  const durKeyRef = useRef(DEFAULT_DUR_KEY); // FIX #4
  const pendingBuyId = useRef(null);
  const contractSubId = useRef(null);
  const tickSubId = useRef(null);
  const tokenRef = useRef(''); // FIX #6: keep token for reconnect re-auth
  const isBuyingRef = useRef(false); // FIX: ref-based buying flag for button disable
  const contractSafetyTimer = useRef(null); // FIX: safety timeout to clear stale contracts

  // Sync state to refs
  useEffect(() => { pricesRef.current = prices; }, [prices]);
  useEffect(() => { runningRef.current = running; }, [running]);
  useEffect(() => { autoModeRef.current = autoMode; }, [autoMode]);
  useEffect(() => { strategyRef.current = strategy; }, [strategy]);
  useEffect(() => { symbolRef.current = symbol; }, [symbol]);
  useEffect(() => { stakeRef.current = parseFloat(stake) || 1; }, [stake]);
  useEffect(() => { currentStakeRef.current = currentStake; }, [currentStake]);
  useEffect(() => { mmSystemRef.current = mmSystem; }, [mmSystem]);
  useEffect(() => { martiFactorRef.current = martiFactor; }, [martiFactor]);
  useEffect(() => { maxMartiStepsRef.current = maxMartiSteps; }, [maxMartiSteps]);
  useEffect(() => { dalUnitRef.current = dalUnit; }, [dalUnit]);
  useEffect(() => { revMartiMaxRef.current = revMartiMax; }, [revMartiMax]);
  useEffect(() => { martiStepRef.current = martiStep; }, [martiStep]);
  useEffect(() => { soundOnRef.current = soundOn; }, [soundOn]);
  useEffect(() => { profitTargetRef.current = profitTarget; }, [profitTarget]);
  useEffect(() => { lossLimitRef.current = lossLimit; }, [lossLimit]);
  useEffect(() => { maxTradesRef.current = maxTrades; }, [maxTrades]);
  useEffect(() => { cooldownLossesRef.current = cooldownLosses; }, [cooldownLosses]);
  useEffect(() => { cooldownSecsRef.current = cooldownSecs; }, [cooldownSecs]);
  useEffect(() => { macdGateEnabledRef.current = macdGateEnabled; }, [macdGateEnabled]);
  useEffect(() => { minStrengthRef.current = minStrength; }, [minStrength]);
  useEffect(() => { sessionPnLRef.current = sessionPnL; }, [sessionPnL]);
  useEffect(() => { sessionTradesRef.current = sessionTrades; }, [sessionTrades]);
  useEffect(() => { consLossesRef.current = consLosses; }, [consLosses]);
  useEffect(() => { cooldownEndRef.current = cooldownEnd; }, [cooldownEnd]);
  useEffect(() => { sessionStoppedRef.current = sessionStopped; }, [sessionStopped]);
  useEffect(() => { durKeyRef.current = durKey; }, [durKey]); // FIX #4
  useEffect(() => { tokenRef.current = token; }, [token]); // FIX #6

  // ---- Logging ----
  const addLog = useCallback((msg, level = 'info') => {
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    setLogs(prev => {
      const next = [{ time, msg, level }, ...prev];
      return next.length > MAX_LOGS ? next.slice(0, MAX_LOGS) : next;
    });
  }, []);

  // ---- Cooldown timer ----
  useEffect(() => {
    if (!cooldownEnd) { setCooldownRemain(0); return; }
    const iv = setInterval(() => {
      const rem = Math.max(0, Math.ceil((cooldownEnd - Date.now()) / 1000));
      setCooldownRemain(rem);
      if (rem <= 0) { setCooldownEnd(null); cooldownEndRef.current = null; addLog('Cooldown ended, resuming', 'success'); }
    }, 500);
    return () => clearInterval(iv);
  }, [cooldownEnd, addLog]);

  // ---- WebSocket ----
  const wsSend = useCallback((data) => {
    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
      wsRef.current.send(JSON.stringify(data));
    }
  }, []);

  const unsubTicks = useCallback(() => {
    if (tickSubId.current) {
      wsSend({ forget: tickSubId.current });
      tickSubId.current = null;
    }
  }, [wsSend]);

  const subTicks = useCallback((sym) => {
    unsubTicks();
    wsSend({ ticks: sym, subscribe: 1 });
    addLog(`Subscribed to ${sym} ticks`, 'info');
  }, [wsSend, unsubTicks, addLog]);

  /* FIX #4: placeTrade reads durKey not durIdx. Parses the key to get
     the exact value/unit. What the UI shows is exactly what the API gets. */
  const placeTrade = useCallback((direction) => {
    if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) return;
    if (sessionStoppedRef.current) { addLog('Session stopped — trade blocked', 'warn'); return; }
    if (cooldownEndRef.current && Date.now() < cooldownEndRef.current) { addLog('Cooldown active — trade blocked', 'warn'); return; }

    const dur = parseDurKey(durKeyRef.current);
    const amount = currentStakeRef.current;
    const req = {
      buy: 1,
      price: amount,
      parameters: {
        contract_type: direction, // Always CALL or PUT — API contract type
        symbol: symbolRef.current,
        duration: dur.value,
        duration_unit: dur.unit,
        basis: 'stake',
        amount: amount,
        currency: 'USD',
      },
    };
    isBuyingRef.current = true; // FIX: set buying flag immediately
    setIsBuying(true); // FIX: trigger re-render to disable buttons
    pendingBuyId.current = Date.now();
    wsSend(req);
    addLog(`Trade placed: ${dirLabel(direction)} ${symbolRef.current} $${amount.toFixed(2)} (${dur.label})`, 'info');
    // FIX: Safety timeout for buy — if no response in 15s, re-enable buttons
    setTimeout(() => {
      if (isBuyingRef.current && !openContract) {
        isBuyingRef.current = false;
        setIsBuying(false);
        addLog('Buy timeout — no response, re-enabling buttons', 'warn');
      }
    }, 15000);
    if (soundOnRef.current) sounds.signal();
  }, [wsSend, addLog]);

  const evalSignal = useCallback(() => {
    const p = pricesRef.current;
    if (p.length < 40) return; // FIX #3: guard against insufficient data
    const sig = getSignal(strategyRef.current, p, symbolRef.current, autoModeRef.current);

    // 🔒 MarsBotPro V50 manages its own thresholds — bypass external filters
    if (strategyRef.current !== MARSBOT_PRO_ID) {
      if (sig.direction && sig.strength < minStrengthRef.current) {
        sig.direction = null;
      }
      if (sig.direction && macdGateEnabledRef.current && !sig.macdOk) {
        sig.direction = null;
      }
    }

    setSignal(sig);

    if (!sig.direction || !runningRef.current) return;
    if (sessionStoppedRef.current) return;
    if (cooldownEndRef.current && Date.now() < cooldownEndRef.current) return;

    // FIX: Don't place auto trade if there's already an open contract
    if (autoModeRef.current && !isBuyingRef.current) {
      placeTrade(sig.direction);
    }
  }, [placeTrade]);

  /* FIX #2: handleContractUpdate with dedup + localStorage persistence.
     FIX #5: extracts start_time, expiry_time from proposal_open_contract. */
  const handleContractUpdate = useCallback((data) => {
    const c = data.proposal_open_contract;
    if (!c) return;

    // FIX: Detect ALL terminal contract states — Deriv uses sold/won/lost + is_expired+is_settleable
    const isTerminal = c.is_sold || c.status === 'sold' || c.status === 'won' || c.status === 'lost' || (c.is_expired && c.is_settleable);
    if (isTerminal) {
      const pnl = parseFloat(c.profit) || 0;
      const won = pnl > 0;
      const tradeRecord = {
        id: c.contract_id, // used for dedup
        time: new Date().toLocaleTimeString('en-US', { hour12: false }),
        symbol: c.underlying || symbolRef.current,
        direction: c.contract_type === 'CALL' ? 'CALL' : 'PUT', // API value stays CALL/PUT
        strategy: strategyRef.current,
        stake: parseFloat(c.buy_price) || currentStakeRef.current,
        won,
        profit: pnl,
        strength: 0,
        macdOk: true,
      };

      // FIX #2: dedup by contract_id + persist to localStorage
      setTrades(prev => addTradeDeduped(prev, tradeRecord));
      setOpenContract(null);
      isBuyingRef.current = false; // FIX: clear buying flag on contract completion
      setIsBuying(false); // FIX: re-enable buttons
      if (contractSafetyTimer.current) { clearTimeout(contractSafetyTimer.current); contractSafetyTimer.current = null; }

      if (contractSubId.current) {
        wsSend({ forget: contractSubId.current });
        contractSubId.current = null;
      }

      // Session tracking
      const newPnL = sessionPnLRef.current + pnl;
      const newTradeCount = sessionTradesRef.current + 1;
      setSessionPnL(newPnL);
      sessionPnLRef.current = newPnL;
      setSessionTrades(newTradeCount);
      sessionTradesRef.current = newTradeCount;

      if (won) {
        setSessionWins(prev => prev + 1);
        setWinStreak(prev => { const n = prev + 1; setMaxWinStreak(m => Math.max(m, n)); return n; });
        setConsLosses(0);
        consLossesRef.current = 0;
        setBestTrade(prev => Math.max(prev, pnl));
        addLog(`WIN +$${pnl.toFixed(2)}`, 'success');
        if (soundOnRef.current) sounds.win();
        // 🔒 MarsBotPro AI learning feedback
        if (strategyRef.current === MARSBOT_PRO_ID) updateAI('win');
      } else {
        setWinStreak(0);
        const newConsLosses = consLossesRef.current + 1;
        setConsLosses(newConsLosses);
        consLossesRef.current = newConsLosses;
        setWorstTrade(prev => Math.min(prev, pnl));
        addLog(`LOSS -$${Math.abs(pnl).toFixed(2)}`, 'error');
        if (soundOnRef.current) sounds.loss();
        // 🔒 MarsBotPro AI learning feedback
        if (strategyRef.current === MARSBOT_PRO_ID) updateAI('loss');

        if (newConsLosses >= cooldownLossesRef.current && cooldownSecsRef.current > 0) {
          const end = Date.now() + cooldownSecsRef.current * 1000;
          setCooldownEnd(end);
          cooldownEndRef.current = end;
          addLog(`Cooldown activated: ${cooldownSecsRef.current}s after ${newConsLosses} consecutive losses`, 'warn');
        }
      }

      // Money management
      const baseStake = stakeRef.current;
      let nextStake = baseStake;
      const mm = mmSystemRef.current;

      if (mm === 'FLAT') {
        nextStake = baseStake;
      } else if (mm === 'MARTINGALE') {
        if (won) {
          nextStake = baseStake;
          setMartiStep(0); martiStepRef.current = 0;
        } else {
          const newStep = Math.min(martiStepRef.current + 1, maxMartiStepsRef.current);
          setMartiStep(newStep); martiStepRef.current = newStep;
          nextStake = baseStake * Math.pow(martiFactorRef.current, newStep);
        }
      } else if (mm === 'DALEMBERT') {
        if (won) {
          nextStake = Math.max(baseStake, currentStakeRef.current - dalUnitRef.current);
        } else {
          nextStake = currentStakeRef.current + dalUnitRef.current;
        }
      } else if (mm === 'REVERSE_MARTINGALE') {
        if (won) {
          nextStake = Math.min(currentStakeRef.current * martiFactorRef.current, revMartiMaxRef.current);
        } else {
          nextStake = baseStake;
        }
      }

      nextStake = Math.round(nextStake * 100) / 100;
      setCurrentStake(nextStake);
      currentStakeRef.current = nextStake;

      // Session stop checks
      const pt = parseFloat(profitTargetRef.current);
      const ll = parseFloat(lossLimitRef.current);
      const mt = parseInt(maxTradesRef.current);

      if (pt && newPnL >= pt) {
        setSessionStopped(true); sessionStoppedRef.current = true;
        setRunning(false); runningRef.current = false;
        addLog(`PROFIT TARGET reached: $${newPnL.toFixed(2)} >= $${pt.toFixed(2)}`, 'success');
      } else if (ll && newPnL <= -Math.abs(ll)) {
        setSessionStopped(true); sessionStoppedRef.current = true;
        setRunning(false); runningRef.current = false;
        addLog(`LOSS LIMIT reached: $${newPnL.toFixed(2)} <= -$${Math.abs(ll).toFixed(2)}`, 'error');
      } else if (mt && newTradeCount >= mt) {
        setSessionStopped(true); sessionStoppedRef.current = true;
        setRunning(false); runningRef.current = false;
        addLog(`MAX TRADES reached: ${newTradeCount}/${mt}`, 'warn');
      }
    } else {
      // Still open — FIX #5: include start_time, expiry_time, countdown
      setOpenContract({
        id: c.contract_id,
        type: c.contract_type,
        buyPrice: parseFloat(c.buy_price),
        currentPnL: parseFloat(c.profit) || 0,
        entrySpot: c.entry_spot,
        currentSpot: c.current_spot,
        isExpired: c.is_expired,
        startTime: c.date_start || c.purchase_time || null,  // FIX #5: server epoch
        expiryTime: c.date_expiry || null,                    // FIX #5: server epoch
      });

      // FIX: Safety timeout — if contract has an expiry, set a timer to force-clear
      // after expiry + 30s buffer in case the sold/won/lost message is missed
      if (c.date_expiry && !contractSafetyTimer.current) {
        const nowSec = Math.floor(Date.now() / 1000);
        const bufferMs = Math.max((c.date_expiry - nowSec + 30) * 1000, 10000); // min 10s
        contractSafetyTimer.current = setTimeout(() => {
          addLog('Safety timeout: clearing stale contract', 'warn');
          setOpenContract(null);
          isBuyingRef.current = false;
          setIsBuying(false);
          if (contractSubId.current) {
            wsSend({ forget: contractSubId.current });
            contractSubId.current = null;
          }
          contractSafetyTimer.current = null;
        }, bufferMs);
      }
    }
  }, [wsSend, addLog]);

  const handleMessage = useCallback((evt) => {
    let data;
    try { data = JSON.parse(evt.data); } catch { return; }

    if (data.error) {
      addLog(`API Error: ${data.error.message}`, 'error');
      // FIX: If this is a buy error, clear the pending buy state so buttons re-enable
      if (data.echo_req && data.echo_req.buy) {
        isBuyingRef.current = false;
        setIsBuying(false);
        setOpenContract(null);
        pendingBuyId.current = null;
        addLog('Buy failed — buttons re-enabled', 'warn');
      }
      return;
    }

    if (data.msg_type === 'authorize') {
      setConnStatus('connected');
      reconnectCount.current = 0;
      const acct = data.authorize;
      setBalance(parseFloat(acct.balance));
      setCurrency(acct.currency || 'USD');
      addLog(`Authorized: ${acct.loginid} | Balance: ${acct.currency} ${acct.balance}`, 'success');
      wsSend({ balance: 1, subscribe: 1 });
      subTicks(symbolRef.current);
    }

    if (data.msg_type === 'balance') {
      setBalance(parseFloat(data.balance.balance));
    }

    if (data.msg_type === 'tick') {
      const tick = data.tick;
      if (data.subscription && data.subscription.id) tickSubId.current = data.subscription.id;
      const price = parseFloat(tick.quote);
      setPrices(prev => {
        const next = [...prev, price];
        return next.length > MAX_PRICES ? next.slice(-MAX_PRICES) : next;
      });
      pricesRef.current = [...pricesRef.current, price];
      if (pricesRef.current.length > MAX_PRICES) pricesRef.current = pricesRef.current.slice(-MAX_PRICES);
      evalSignal();
    }

    if (data.msg_type === 'buy') {
      const buyResp = data.buy;
      addLog(`Contract purchased: ID ${buyResp.contract_id} | Cost: $${parseFloat(buyResp.buy_price).toFixed(2)}`, 'info');
      wsSend({ proposal_open_contract: 1, contract_id: buyResp.contract_id, subscribe: 1 });
    }

    if (data.msg_type === 'proposal_open_contract') {
      if (data.subscription) contractSubId.current = data.subscription.id;
      handleContractUpdate(data);
    }

    if (data.msg_type === 'ping') { /* keep alive ack */ }
  }, [addLog, wsSend, subTicks, evalSignal, handleContractUpdate]);

  /* FIX #6: WebSocket reconnect with exponential backoff, re-auth, re-subscribe.
     Uses 2^n * 1000ms delay (1s, 2s, 4s, 8s, 16s, 32s, 64s max).
     On reconnect: re-authorizes token, re-subscribes to ticks. */
  const connect = useCallback(() => {
    const tok = tokenRef.current || token;
    if (!tok.trim()) { addLog('Enter API token first', 'warn'); return; }
    if (wsRef.current) {
      wsRef.current.onclose = null;
      wsRef.current.close();
    }
    setConnStatus('connecting');
    addLog('Connecting...', 'info');

    const ws = new WebSocket(WS_URL);
    wsRef.current = ws;

    ws.onopen = () => {
      addLog('WebSocket connected, authorizing...', 'info');
      ws.send(JSON.stringify({ authorize: tok.trim() })); // FIX #6: re-auth on reconnect
      if (pingRef.current) clearInterval(pingRef.current);
      pingRef.current = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ ping: 1 }));
      }, PING_INTERVAL);
    };

    ws.onmessage = handleMessage;

    ws.onclose = () => {
      setConnStatus('disconnected');
      setOpenContract(null);
      isBuyingRef.current = false; // FIX: clear buying state on disconnect
      setIsBuying(false);
      if (contractSafetyTimer.current) { clearTimeout(contractSafetyTimer.current); contractSafetyTimer.current = null; }
      tickSubId.current = null; // FIX #6: clear stale sub IDs
      contractSubId.current = null;
      if (pingRef.current) clearInterval(pingRef.current);
      addLog('WebSocket disconnected', 'warn');

      // FIX #6: Exponential backoff reconnect with re-auth
      if (reconnectCount.current < MAX_RECONNECT && tokenRef.current.trim()) {
        reconnectCount.current++;
        const delay = Math.min(Math.pow(2, reconnectCount.current) * 1000, 64000); // max 64s
        addLog(`Reconnecting in ${(delay / 1000).toFixed(0)}s (attempt ${reconnectCount.current}/${MAX_RECONNECT})...`, 'info');
        reconnectTimer.current = setTimeout(() => connect(), delay);
      } else if (reconnectCount.current >= MAX_RECONNECT) {
        addLog('Max reconnect attempts reached. Please reconnect manually.', 'error');
      }
    };

    ws.onerror = () => {
      addLog('WebSocket error', 'error');
    };
  }, [token, handleMessage, addLog]);

  const disconnect = useCallback(() => {
    reconnectCount.current = MAX_RECONNECT; // prevent auto reconnect
    if (reconnectTimer.current) clearTimeout(reconnectTimer.current);
    if (pingRef.current) clearInterval(pingRef.current);
    if (wsRef.current) {
      wsRef.current.onclose = null;
      wsRef.current.close();
      wsRef.current = null;
    }
    setConnStatus('disconnected');
    setRunning(false);
    runningRef.current = false;
    setPrices([]);
    pricesRef.current = [];
    setSignal({ direction: null, strength: 0, votes: 0, total: 5, components: {}, macdOk: false, atrSpike: false });
    addLog('Disconnected', 'info');
  }, [addLog]);

  // FIX #3: On symbol change, clear prices and re-subscribe cleanly
  useEffect(() => {
    if (connStatus === 'connected') {
      setPrices([]);
      pricesRef.current = [];
      setSignal({ direction: null, strength: 0, votes: 0, total: 5, components: {}, macdOk: false, atrSpike: false });
      subTicks(symbol);
    }
  }, [symbol, connStatus, subTicks]);

  // Cleanup on unmount
  useEffect(() => {
    return () => {
      if (wsRef.current) wsRef.current.close();
      if (pingRef.current) clearInterval(pingRef.current);
      if (reconnectTimer.current) clearTimeout(reconnectTimer.current);
      if (contractSafetyTimer.current) clearTimeout(contractSafetyTimer.current);
    };
  }, []);

  // Start/Stop
  const toggleRunning = () => {
    if (connStatus !== 'connected') { addLog('Connect first', 'warn'); return; }
    const next = !running;
    setRunning(next);
    runningRef.current = next;
    if (next) {
      setSessionStopped(false);
      sessionStoppedRef.current = false;
      addLog(`Bot STARTED — ${strategy} / ${autoMode ? 'Auto' : 'Manual'} / ${mmSystem}`, 'success');
    } else {
      addLog('Bot STOPPED', 'warn');
    }
  };

  const resetSession = () => {
    setSessionPnL(0); sessionPnLRef.current = 0;
    setSessionTrades(0); sessionTradesRef.current = 0;
    setSessionWins(0);
    setBestTrade(0); setWorstTrade(0);
    setWinStreak(0); setMaxWinStreak(0);
    setConsLosses(0); consLossesRef.current = 0;
    setCooldownEnd(null); cooldownEndRef.current = null;
    setSessionStopped(false); sessionStoppedRef.current = false;
    setCurrentStake(parseFloat(stake) || 1);
    currentStakeRef.current = parseFloat(stake) || 1;
    setMartiStep(0); martiStepRef.current = 0;
    addLog('Session reset', 'info');
  };

  const doBacktest = () => {
    const p = pricesRef.current;
    if (p.length < 80) { addLog('Need at least 80 ticks for backtest', 'warn'); return; }
    setBTRunning(true);
    addLog('Running backtest...', 'info');
    setTimeout(() => {
      const result = runBacktest(p, strategy, symbol, true);
      setBTResult(result);
      setBTRunning(false);
      addLog(`Backtest done: ${result.trades.length} trades, ${result.wins}W/${result.losses}L, P&L: ${result.totalPnL.toFixed(2)}`, 'success');
    }, 50);
  };

  const manualTrade = (dir) => {
    if (connStatus !== 'connected') { addLog('Not connected', 'warn'); return; }
    if (!running) { addLog('Start bot first', 'warn'); return; }
    if (isBuyingRef.current) { addLog('Trade already in progress', 'warn'); return; }
    placeTrade(dir);
  };

  // Derived
  const sessionWinRate = sessionTrades > 0 ? Math.round((sessionWins / sessionTrades) * 100) : 0;
  const priceSpark = prices.slice(-80);

  /* ================================================================
     RENDER: MAIN APP
     FIX #1: Tab components are stable references defined outside App.
     They receive data via props, so React doesn't unmount/remount them.
     ================================================================ */
  return (
    <>
      {/* Header */}
      <div className="app-header">
        <div className="logo">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="#00ff88" strokeWidth="2" />
            <circle cx="16" cy="16" r="6" fill="#00ff88" opacity="0.3" />
            <path d="M16 2 L16 8 M16 24 L16 30 M2 16 L8 16 M24 16 L30 16" stroke="#00ff88" strokeWidth="1.5" strokeLinecap="round" />
            <path d="M8 8 L12 12 M20 20 L24 24 M24 8 L20 12 M12 20 L8 24" stroke="#00ff88" strokeWidth="1" strokeLinecap="round" opacity="0.5" />
          </svg>
          <div>
            <span className="logo-text">MarsBot</span>
            <span className="logo-ver"> V4</span>
          </div>
        </div>
        <div className="header-right">
          <div className={`conn-dot ${connStatus}`} />
          {balance !== null && <span className="balance-display">${balance.toFixed(2)}</span>}
        </div>
      </div>

      {/* Tab Content — FIX #1: stable components, props-driven */}
      <div className="tab-content">
        {tab === 'signal' && <SignalTab
          cooldownRemain={cooldownRemain} sessionStopped={sessionStopped}
          profitTarget={profitTarget} sessionPnL={sessionPnL} lossLimit={lossLimit}
          maxTrades={maxTrades} sessionTrades={sessionTrades} resetSession={resetSession}
          signal={signal} strategy={strategy} autoMode={autoMode} running={running}
          connStatus={connStatus} currentStake={currentStake} toggleRunning={toggleRunning}
          manualTrade={manualTrade} sessionWinRate={sessionWinRate} sessionWins={sessionWins}
          maxWinStreak={maxWinStreak} priceSpark={priceSpark} prices={prices} symbol={symbol}
          openContract={openContract} isBuying={isBuying}
        />}
        {tab === 'trades' && <TradesTab
          openContract={openContract} sessionTrades={sessionTrades}
          sessionWinRate={sessionWinRate} sessionPnL={sessionPnL} sessionWins={sessionWins}
          bestTrade={bestTrade} worstTrade={worstTrade} resetSession={resetSession}
          trades={trades} addLog={addLog} symbol={symbol}
        />}
        {tab === 'backtest' && <BacktestTab
          backtestResult={backtestResult} strategy={strategy} symbol={symbol}
          prices={prices} doBacktest={doBacktest} btRunning={btRunning}
        />}
        {tab === 'settings' && <SettingsTab
          connStatus={connStatus} token={token} setToken={setToken}
          connect={connect} disconnect={disconnect} symbol={symbol} setSymbol={setSymbol}
          durKey={durKey} setDurKey={setDurKey}
          strategy={strategy} setStrategy={setStrategy}
          macdGateEnabled={macdGateEnabled} setMacdGateEnabled={setMacdGateEnabled}
          minStrength={minStrength} setMinStrength={setMinStrength}
          autoMode={autoMode} setAutoMode={setAutoMode}
          stake={stake} setStake={setStake} setCurrentStake={setCurrentStake}
          currentStakeRef={currentStakeRef} mmSystem={mmSystem} setMMSystem={setMMSystem}
          setMartiStep={setMartiStep} martiStepRef={martiStepRef}
          martiFactor={martiFactor} setMartiFactor={setMartiFactor}
          maxMartiSteps={maxMartiSteps} setMaxMartiSteps={setMaxMartiSteps}
          dalUnit={dalUnit} setDalUnit={setDalUnit}
          revMartiMax={revMartiMax} setRevMartiMax={setRevMartiMax}
          currentStake={currentStake} martiStep={martiStep}
          profitTarget={profitTarget} setProfitTarget={setProfitTarget}
          lossLimit={lossLimit} setLossLimit={setLossLimit}
          maxTrades={maxTrades} setMaxTrades={setMaxTrades}
          cooldownLosses={cooldownLosses} setCooldownLosses={setCooldownLosses}
          cooldownSecs={cooldownSecs} setCooldownSecs={setCooldownSecs}
          soundOn={soundOn} setSoundOn={setSoundOn}
        />}
        {tab === 'logs' && <LogsTab logs={logs} setLogs={setLogs} />}
      </div>

      {/* Tab Bar */}
      <div className="tab-bar">
        {[
          { id: 'signal', label: 'Signal', icon: Icons.signal },
          { id: 'trades', label: 'Trades', icon: Icons.trades },
          { id: 'backtest', label: 'Backtest', icon: Icons.backtest },
          { id: 'settings', label: 'Settings', icon: Icons.settings },
          { id: 'logs', label: 'Logs', icon: Icons.logs },
        ].map(t => (
          <button key={t.id} className={`tab-btn ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            <t.icon />
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </>
  );
};

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<footer class="footer-attr">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>
