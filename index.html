<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>DerivBot</title>
    <!-- React + ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX-in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      // ─── Constants ────────────────────────────────────────────────────────────────
      const DERIV_WS_URL = "wss://ws.binaryws.com/websockets/v3?app_id=1089";

      const SYMBOLS = [
        { value: "R_10",  label: "Volatility 10",  tag: "V10"  },
        { value: "R_25",  label: "Volatility 25",  tag: "V25"  },
        { value: "R_50",  label: "Volatility 50",  tag: "V50"  },
        { value: "R_75",  label: "Volatility 75",  tag: "V75"  },
        { value: "R_100", label: "Volatility 100", tag: "V100" },
      ];

      const STRATEGIES = [
        { value: "HYBRID", label: "Hybrid (RSI + BB + EMA)", desc: "All three indicators vote. Requires 2 of 3 to agree. Weighted scoring." },
        { value: "RSI",    label: "RSI Only",                desc: "Buy when RSI oversold, Sell when RSI overbought (V50 tuned)." },
        { value: "EMA",    label: "EMA Only",                desc: "Buy when fast EMA crosses above slow EMA, Sell on cross below (V50 tuned)." },
        { value: "BB",     label: "Bollinger Band Only",     desc: "Buy near lower band, Sell near upper band (V50 tuned)." },
        { value: "MACD",   label: "MACD Only",               desc: "Buy on MACD crossing above signal line, Sell on cross below (V50 tuned)." },
      ];

      const DURATIONS = [
        { value: 1,  label: "1 min"  },
        { value: 2,  label: "2 min"  },
        { value: 5,  label: "5 min"  },
        { value: 10, label: "10 min" },
        { value: 15, label: "15 min" },
      ];

      // ─── Per-symbol / strategy config (V50‑focused) ──────────────────────────────
      const STRAT_CONFIG = {
        R_50: {
          HYBRID: {
            rsiPeriod: 10,
            rsiBuy: 28,
            rsiSell: 72,
            bbPeriod: 18,
            bbTouchPct: 0.18,
            emaFast: 9,
            emaSlow: 21,
            minStrength: 70,
            cooldownMs: 20000, // 20s between signals on V50
          },
          RSI: {
            period: 9,
            buy: 25,
            sell: 75,
            minStrength: 68,
          },
          EMA: {
            fast: 7,
            slow: 21,
            minStrength: 74,
          },
          BB: {
            period: 18,
            touchPct: 0.18,
            minStrength: 70,
          },
          MACD: {
            fast: 12,
            slow: 26,
            signal: 9,
            minStrength: 72,
          },
        },
      };

      // ─── Indicator Math ───────────────────────────────────────────────────────────
      const calcEMA = (prices, period) => {
        if (prices.length < period) return null;
        const k = 2 / (period + 1);
        let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
        return ema;
      };

      const calcRSI = (prices, period = 14) => {
        if (prices.length < period + 1) return null;
        const changes = prices
          .slice(-period - 1)
          .map((p, i, a) => (i === 0 ? 0 : p - a[i - 1]))
          .slice(1);
        const avgGain =
          changes
            .map((c) => (c > 0 ? c : 0))
            .reduce((a, b) => a + b, 0) / period;
        const avgLoss =
          changes
            .map((c) => (c < 0 ? -c : 0))
            .reduce((a, b) => a + b, 0) / period;
        if (avgLoss === 0) return 100;
        return 100 - 100 / (1 + avgGain / avgLoss);
      };

      const calcBB = (prices, period = 20) => {
        if (prices.length < period) return null;
        const slice = prices.slice(-period);
        const mean = slice.reduce((a, b) => a + b, 0) / period;
        const std = Math.sqrt(
          slice
            .map((p) => (p - mean) ** 2)
            .reduce((a, b) => a + b, 0) / period
        );
        return { upper: mean + 2 * std, middle: mean, lower: mean - 2 * std };
      };

      const calcMACD = (prices, fast = 12, slow = 26, signalPeriod = 9) => {
        if (prices.length < slow) return null;
        const emaFast = calcEMA(prices, fast);
        const emaSlow = calcEMA(prices, slow);
        if (emaFast === null || emaSlow === null) return null;
        const macdLine = emaFast - emaSlow;

        const lastN = prices.slice(-signalPeriod).map((_, i) => {
          const sub = prices.slice(0, prices.length - signalPeriod + i + 1);
          const a = calcEMA(sub, fast);
          const b = calcEMA(sub, slow);
          return a !== null && b !== null ? a - b : 0;
        });
        const signalLine = lastN.reduce((a, b) => a + b, 0) / signalPeriod;
        return { macd: macdLine, signal: signalLine, histogram: macdLine - signalLine };
      };

      // ─── Hybrid Signal Engine (V50 tuned) ────────────────────────────────────────
      const computeHybrid = (prices, symbol = "R_50") => {
        const cfg = STRAT_CONFIG[symbol]?.HYBRID;
        if (!cfg) return null;

        if (prices.length < 40) return null;
        const price = prices[prices.length - 1];

        const rsi  = calcRSI(prices, cfg.rsiPeriod);
        const bb   = calcBB(prices, cfg.bbPeriod);
        const emaFast = calcEMA(prices, cfg.emaFast);
        const emaSlow = calcEMA(prices, cfg.emaSlow);

        if (rsi === null || bb === null || emaFast === null || emaSlow === null) return null;

        // RSI vote
        let rsiVote = 0, rsiScore = 0, rsiLabel = "";
        if (rsi < cfg.rsiBuy) {
          rsiVote = 1;
          rsiScore = Math.min(100, 65 + (cfg.rsiBuy - rsi) * 3);
          rsiLabel = `${rsi.toFixed(1)} — oversold`;
        } else if (rsi > cfg.rsiSell) {
          rsiVote = -1;
          rsiScore = Math.min(100, 65 + (rsi - cfg.rsiSell) * 3);
          rsiLabel = `${rsi.toFixed(1)} — overbought`;
        } else {
          rsiScore = Math.max(25, 55 - Math.abs(rsi - 50) * 1.3);
          rsiLabel = `${rsi.toFixed(1)} — neutral`;
        }

        // BB vote
        const bbRange = bb.upper - bb.lower;
        const bbPos   = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
        let bbVote = 0, bbScore = 0, bbLabel = "";
        if (bbPos < cfg.bbTouchPct) {
          bbVote = 1;
          bbScore = Math.min(100, 65 + (cfg.bbTouchPct - bbPos) * 260);
          bbLabel = `${(bbPos * 100).toFixed(0)}% — near lower band`;
        } else if (bbPos > 1 - cfg.bbTouchPct) {
          bbVote = -1;
          bbScore = Math.min(100, 65 + (bbPos - (1 - cfg.bbTouchPct)) * 260);
          bbLabel = `${(bbPos * 100).toFixed(0)}% — near upper band`;
        } else {
          bbScore = 40;
          bbLabel = `${(bbPos * 100).toFixed(0)}% — mid band`;
        }

        // EMA vote
        const separation = Math.abs(emaFast - emaSlow) / (emaSlow * 0.001 + 0.0001);
        const emaScore   = Math.min(100, 60 + Math.min(separation * 22, 100) * 0.35);
        const emaVote    = emaFast > emaSlow ? 1 : -1;
        const emaLabel   = emaFast > emaSlow ? "Fast EMA above slow EMA" : "Fast EMA below slow EMA";

        const callVotes = [rsiVote, bbVote, emaVote].filter(v => v === 1).length;
        const putVotes  = [rsiVote, bbVote, emaVote].filter(v => v === -1).length;
        if (callVotes < 2 && putVotes < 2) return null;

        const direction  = callVotes >= putVotes ? "CALL" : "PUT";
        const dirMult    = direction === "CALL" ? 1 : -1;
        const allAgree   = callVotes === 3 || putVotes === 3;

        const W = { rsi: 0.35, bb: 0.30, ema: 0.35 };
        let weightedSum = 0, totalWeight = 0;

        const addVote = (vote, score, w) => {
          if (vote === dirMult)   { weightedSum += score * w; totalWeight += w; }
          else if (vote === 0)    { weightedSum += score * w * 0.25; totalWeight += w * 0.25; }
        };
        addVote(rsiVote, rsiScore, W.rsi);
        addVote(bbVote,  bbScore,  W.bb);
        if (emaVote === dirMult)  { weightedSum += emaScore * W.ema; totalWeight += W.ema; }

        const rawStrength = totalWeight > 0 ? weightedSum / totalWeight : 0;
        const strength    = Math.min(100, Math.round(rawStrength + (allAgree ? 6 : 0)));
        if (strength < cfg.minStrength) return null;

        return {
          direction, strength, allAgree,
          summary: `${allAgree ? "3/3" : "2/3"} indicators align (V50 tuned)`,
          components: {
            rsi: { vote: rsiVote,  score: Math.round(rsiScore),  label: rsiLabel,  agrees: rsiVote  === dirMult },
            bb:  { vote: bbVote,   score: Math.round(bbScore),   label: bbLabel,   agrees: bbVote   === dirMult },
            ema: { vote: emaVote,  score: Math.round(emaScore),  label: emaLabel,  agrees: emaVote  === dirMult },
          },
        };
      };

      const computeSingle = (strategy, prices, prev, symbol = "R_50") => {
        if (prices.length < 40) return null;

        const cfgRoot = STRAT_CONFIG[symbol];
        if (!cfgRoot) return null;

        if (strategy === "RSI") {
          const cfg = cfgRoot.RSI;
          const rsi = calcRSI(prices, cfg.period);
          if (rsi === null) return null;

          if (rsi < cfg.buy) return {
            direction: "CALL",
            strength: Math.min(100, Math.round(cfg.minStrength + (cfg.buy - rsi) * 3)),
            summary: `RSI ${rsi.toFixed(1)} — oversold (V50 tuned)`,
            components: null,
          };
          if (rsi > cfg.sell) return {
            direction: "PUT",
            strength: Math.min(100, Math.round(cfg.minStrength + (rsi - cfg.sell) * 3)),
            summary: `RSI ${rsi.toFixed(1)} — overbought (V50 tuned)`,
            components: null,
          };
        }

        if (strategy === "EMA") {
          const cfg = cfgRoot.EMA;
          const eFast  = calcEMA(prices, cfg.fast);
          const eSlow  = calcEMA(prices, cfg.slow);
          const peFast = calcEMA(prev, cfg.fast);
          const peSlow = calcEMA(prev, cfg.slow);
          if (!eFast || !eSlow || !peFast || !peSlow) return null;

          if (peFast < peSlow && eFast > eSlow) return {
            direction: "CALL",
            strength: cfg.minStrength,
            summary: "Fast EMA crossed above slow EMA (V50)",
            components: null,
          };
          if (peFast > peSlow && eFast < eSlow) return {
            direction: "PUT",
            strength: cfg.minStrength,
            summary: "Fast EMA crossed below slow EMA (V50)",
            components: null,
          };
        }

        if (strategy === "BB") {
          const cfg = cfgRoot.BB;
          const price = prices[prices.length - 1];
          const bb = calcBB(prices, cfg.period);
          if (!bb) return null;

          const bbRange = bb.upper - bb.lower;
          const bbPos   = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;

          if (bbPos <= cfg.touchPct) return {
            direction: "CALL",
            strength: cfg.minStrength,
            summary: "Price near lower Bollinger Band (V50)",
            components: null,
          };
          if (bbPos >= 1 - cfg.touchPct) return {
            direction: "PUT",
            strength: cfg.minStrength,
            summary: "Price near upper Bollinger Band (V50)",
            components: null,
          };
        }

        if (strategy === "MACD") {
          const cfg = cfgRoot.MACD;
          const m  = calcMACD(prices, cfg.fast, cfg.slow, cfg.signal);
          const pm = calcMACD(prev,    cfg.fast, cfg.slow, cfg.signal);
          if (!m || !pm) return null;

          if (pm.macd < pm.signal && m.macd > m.signal) return {
            direction: "CALL",
            strength: cfg.minStrength,
            summary: "MACD crossed above signal (V50)",
            components: null,
          };
          if (pm.macd > pm.signal && m.macd < m.signal) return {
            direction: "PUT",
            strength: cfg.minStrength,
            summary: "MACD crossed below signal (V50)",
            components: null,
          };
        }

        return null;
      };

      const getSignal = (strategy, prices, prev, symbol = "R_50") =>
        strategy === "HYBRID"
          ? computeHybrid(prices, symbol)
          : computeSingle(strategy, prices, prev, symbol);

      // ─── Sparkline ────────────────────────────────────────────────────────────────
      const Sparkline = ({ data, color = "#00ff88", width = 130, height = 38 }) => {
        if (!data || data.length < 2) return <svg width={width} height={height} />;
        const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
        const pts = data.map((v, i) =>
          `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`
        ).join(" ");
        return (
          <svg width={width} height={height} style={{ overflow: "visible" }}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
          </svg>
        );
      };

      // ─── Circular Strength Gauge ──────────────────────────────────────────────────
      const StrengthGauge = ({ value, size = 70 }) => {
        const r  = size / 2 - 7;
        const cx = size / 2, cy = size / 2;
        const toRad = deg => (deg * Math.PI) / 180;
        const arcPath = (startDeg, endDeg) => {
          const sx = cx + r * Math.cos(toRad(startDeg));
          const sy = cy + r * Math.sin(toRad(startDeg));
          const ex = cx + r * Math.cos(toRad(endDeg));
          const ey = cy + r * Math.sin(toRad(endDeg));
          const large = endDeg - startDeg > 180 ? 1 : 0;
          return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
        };
        const color  = value >= 80 ? "#00ff88" : value >= 65 ? "#ffaa00" : "#ff3d5f";
        const endDeg = 135 + (value / 100) * 270;
        return (
          <svg width={size} height={size}>
            <path d={arcPath(135, 404.9)} fill="none" stroke="#162e22" strokeWidth="6" strokeLinecap="round" />
            <path d={arcPath(135, Math.min(endDeg, 404.8))} fill="none" stroke={color} strokeWidth="6"
              strokeLinecap="round" style={{ filter: `drop-shadow(0 0 5px ${color}90)` }} />
            <text x={cx} y={cy + 5} textAnchor="middle" fill={color} fontSize="13"
              fontFamily="'Syne',sans-serif" fontWeight="800">{value}%</text>
          </svg>
        );
      };

      // ─── Indicator Pill ───────────────────────────────────────────────────────────
      const Pill = ({ label, score, agrees, vote }) => {
        const color  = agrees ? "#00ff88" : vote === 0 ? "#5a9e78" : "#ff3d5f";
        const bg     = agrees ? "rgba(0,255,136,.09)"   : vote === 0 ? "rgba(90,158,120,.06)"  : "rgba(255,61,95,.09)";
        const border = agrees ? "rgba(0,255,136,.3)"    : vote === 0 ? "rgba(90,158,120,.2)"   : "rgba(255,61,95,.3)";
        const arrow  = vote === 1 ? "↑" : vote === -1 ? "↓" : "–";
        return (
          <div style={{ flex: 1, background: bg, border: `1px solid ${border}`, borderRadius: 4,
            padding: "7px 9px", display: "flex", flexDirection: "column", gap: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 8, color: "#5a9e78", letterSpacing: 1.5, textTransform: "uppercase" }}>{label}</span>
              <span style={{ fontSize: 13, color, fontWeight: 700, lineHeight: 1 }}>{arrow}</span>
            </div>
            <div style={{ fontSize: 12, color, fontWeight: 700 }}>{score}%</div>
            <div style={{ height: 3, background: "#162e22", borderRadius: 2 }}>
              <div style={{ height: "100%", width: `${score}%`, background: color, borderRadius: 2, transition: "width .4s" }} />
            </div>
          </div>
        );
      };

      // ─── Main Component ───────────────────────────────────────────────────────────
      function DerivBot() {
        // Auth & connection state
        const [tokenInput, setTokenInput]   = useState("");
        const [connected, setConnected]     = useState(false);
        const [authorized, setAuthorized]   = useState(false);
        const [accountInfo, setAccountInfo] = useState(null);
        const [balance, setBalance]         = useState(null);
        const [wsStatus, setWsStatus]       = useState("disconnected");

        // Bot configuration
        const [symbol, setSymbol]               = useState("R_50");
        const [strategy, setStrategy]           = useState("HYBRID");
        const [stake, setStake]                 = useState("1");
        const [duration, setDuration]           = useState(5);
        const [maxDailyLoss, setMaxDailyLoss]   = useState("5");   // as % of balance
        const [maxTrades, setMaxTrades]         = useState("20");
        const [minStrength, setMinStrength]     = useState("70");
        const [martingale, setMartingale]       = useState(false);
        const [martMul, setMartMul]             = useState("1.8");
        const [execMode, setExecMode]           = useState("auto");

        // Bot runtime state
        const [botRunning, setBotRunning]           = useState(false);
        const [currentPrice, setCurrentPrice]       = useState(null);
        const [priceHistory, setPriceHistory]       = useState([]);
        const [liveSignal, setLiveSignal]           = useState(null);
        const [pendingSignal, setPendingSignal]     = useState(null);
        const [signals, setSignals]                 = useState([]);
        const [trades, setTrades]                   = useState([]);
        const [openContracts, setOpenContracts]     = useState([]);
        const [dailyPnL, setDailyPnL]               = useState(0);
        const [todayTrades, setTodayTrades]         = useState(0);
        const [consecLosses, setConsecLosses]       = useState(0);
        const [activeTab, setActiveTab]             = useState("signal");
        const [logs, setLogs]                       = useState([]);

        // Refs
        const socketRef       = useRef(null);
        const pricesRef       = useRef([]);
        const prevRef         = useRef([]);
        const runningRef      = useRef(false);
        const pnlRef          = useRef(0);
        const tradeCountRef   = useRef(0);
        const consecLossRef   = useRef(0);
        const initStakeRef    = useRef(1);
        const currentStakeRef = useRef(1);
        const execModeRef     = useRef("auto");
        const symbolRef       = useRef("R_50");
        const strategyRef     = useRef("HYBRID");
        const durationRef     = useRef(5);
        const minStrRef       = useRef(70);
        const accountInfoRef  = useRef(null);
        const martingaleRef   = useRef(false);
        const martMulRef      = useRef(1.8);
        const maxLossRef      = useRef(10);
        const maxTradesRef    = useRef(20);
        const lastSignalRef   = useRef(0);
        const tickCountRef    = useRef(0);

        const pendingDirections = useRef({});
        const handleMsgRef  = useRef(null);
        const evalSignalRef = useRef(null);

        // Keep config refs in sync
        useEffect(() => { execModeRef.current      = execMode;                }, [execMode]);
        useEffect(() => { symbolRef.current        = symbol;                  }, [symbol]);
        useEffect(() => { strategyRef.current      = strategy;                }, [strategy]);
        useEffect(() => { durationRef.current      = duration;                }, [duration]);
        useEffect(() => { minStrRef.current        = parseFloat(minStrength); }, [minStrength]);
        useEffect(() => { accountInfoRef.current   = accountInfo;             }, [accountInfo]);
        useEffect(() => { martingaleRef.current    = martingale;              }, [martingale]);
        useEffect(() => { martMulRef.current       = parseFloat(martMul);     }, [martMul]);
        useEffect(() => { maxTradesRef.current     = parseInt(maxTrades, 10); }, [maxTrades]);
        useEffect(() => { initStakeRef.current     = parseFloat(stake);       }, [stake]);

        // Max daily loss as % of balance
        useEffect(() => {
          const bal = balance ?? accountInfo?.balance ?? 0;
          const pct = parseFloat(maxDailyLoss) || 0;
          maxLossRef.current = (bal * pct) / 100;
        }, [maxDailyLoss, balance, accountInfo]);

        const addLog = useCallback((msg, type = "info") => {
          const time = new Date().toLocaleTimeString("en-GB");
          setLogs(prev => [{ time, msg, type, id: Date.now() + Math.random() }, ...prev].slice(0, 100));
        }, []);

        // Place trade
        const placeTrade = useCallback((signal) => {
          if (!socketRef.current || socketRef.current.readyState !== WebSocket.OPEN) {
            addLog("WebSocket not ready", "error");
            return;
          }
          const tradeStake = currentStakeRef.current;
          const payload = {
            buy: 1,
            price: tradeStake,
            parameters: {
              amount: tradeStake,
              basis: "stake",
              contract_type: signal.direction,
              currency: accountInfoRef.current?.currency || "USD",
              duration: durationRef.current,
              duration_unit: "m",
              symbol: symbolRef.current,
            },
          };
          pendingDirections.current["__next"] = signal.direction;
          socketRef.current.send(JSON.stringify(payload));
          setPendingSignal(null);
          addLog(`Placing ${signal.direction} · stake ${tradeStake.toFixed(2)} · strength ${signal.strength}%`, "success");
        }, [addLog]);

        const dismissSignal = useCallback(() => {
          addLog("Signal dismissed", "warning");
          setPendingSignal(null);
        }, [addLog]);

        // Main message handler
        const handleMsg = (data) => {
          if (data.error) {
            addLog(`Deriv error: ${data.error.message}`, "error");
            return;
          }

          if (data.msg_type === "authorize") {
            setAuthorized(true);
            setAccountInfo(data.authorize);
            accountInfoRef.current = data.authorize;
            setBalance(data.authorize.balance);
            addLog(`Authorized — ${data.authorize.loginid} · ${data.authorize.currency} ${data.authorize.balance}`, "success");
            socketRef.current?.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          }

          if (data.msg_type === "balance") {
            setBalance(data.balance.balance);
          }

          if (data.msg_type === "tick") {
            const price = parseFloat(data.tick.quote);
            setCurrentPrice(price);
            prevRef.current = [...pricesRef.current];
            pricesRef.current = [...pricesRef.current, price].slice(-300);

            tickCountRef.current += 1;
            if (tickCountRef.current % 5 === 0) {
              setPriceHistory([...pricesRef.current]);
            }

            if (runningRef.current && pricesRef.current.length >= 40) {
              evalSignalRef.current(price);
            }
          }

          if (data.msg_type === "buy") {
            const contractId = data.buy.contract_id;
            const direction = pendingDirections.current["__next"] || "CALL";
            delete pendingDirections.current["__next"];
            pendingDirections.current[contractId] = direction;

            tradeCountRef.current += 1;
            setTodayTrades(prev => prev + 1);

            addLog(`Contract #${contractId} opened · stake ${data.buy.buy_price}`, "success");
            setOpenContracts(prev => [...prev, {
              id: contractId,
              buyPrice: data.buy.buy_price,
              openTime: new Date().toLocaleTimeString(),
              symbol: symbolRef.current,
              direction,
            }]);
            socketRef.current?.send(JSON.stringify({
              proposal_open_contract: 1,
              contract_id: contractId,
              subscribe: 1,
            }));
          }

          if (data.msg_type === "proposal_open_contract") {
            const contract = data.proposal_open_contract;
            if (!contract.is_sold) return;

            const contractId = contract.contract_id;
            const profit = parseFloat(contract.profit);
            socketRef.current?.send(JSON.stringify({ forget: contract.id }));
            delete pendingDirections.current[contractId];

            pnlRef.current += profit;
            setDailyPnL(prev => prev + profit);
            setOpenContracts(prev => prev.filter(c => c.id !== contractId));

            if (profit > 0) {
              consecLossRef.current = 0;
              setConsecLosses(0);
              currentStakeRef.current = initStakeRef.current;
              addLog(`✓ WON +${profit.toFixed(2)}`, "success");
            } else {
              consecLossRef.current += 1;

                const bal = balance ?? accountInfoRef.current?.balance ?? 0;
                const maxStake = bal * 0.05; // cap at 5% of balance
                currentStakeRef.current = Math.min(nextStake, maxStake);
                addLog(

                  "warning"

              symbol: symbolRef.current,
              direction: dir,
              stake: parseFloat(contract.buy_price),

              payout: parseFloat(contract.sell_price || 0),

          const cfgRoot = STRAT_CONFIG[symbol];

          if (pnlRef.current <= -maxLossRef.current) {
            addLog("⚠ Daily loss limit hit — stopping bot", "warning");
            setBotRunning(false);
            runningRef.current = false;
            return;

          if (tradeCountRef.current >= maxTradesRef.current) {
            addLog("⚠ Max daily trades reached — stopping bot", "warning");
            setBotRunning(false);
            runningRef.current = false;
            return;

          if (consecLossRef.current >= 5) {

            consecLossRef.current = 0;

            return;

          const prices = pricesRef.current;
          const prev   = prevRef.current.length > 0 ? prevRef.current : prices.slice(0, -1);
          const signal = getSignal(strategyRef.current, prices, prev, symbol);

          setLiveSignal(signal);
          if (!signal || signal.strength < minStrRef.current) return;

          const now = Date.now();
          const cooldown = hyCfg?.cooldownMs || 12000;
          if (now - lastSignalRef.current < cooldown) return;
          lastSignalRef.current = now;

          const entry = {
            id: now,
            time: new Date().toLocaleTimeString(),
            ...signal,
            price: price.toFixed(5),
            acted: execModeRef.current === "auto",

          setSignals(prev => [entry, ...prev].slice(0, 30));
          addLog(`Signal: ${signal.direction} · ${signal.strength}% · ${signal.summary}`, "signal");

          if (execModeRef.current === "auto") {
            placeTrade(signal);
          } else {
            setPendingSignal(entry);
          }

                      </div>
                    </div>
                    <div className="st">
                      <div className="stl">Risk Load</div>
                      <div className="stv">
                        <span style={{ color: riskColor }}>{lossRatio.toFixed(1)}%</span>
                      </div>
                      <div className="rb">
                        <div className="rf" style={{ width: `${lossRatio}%`, background: riskColor }} />
                      </div>
                      <div className="sts">vs daily loss cap</div>
                    </div>
                  </section>

                  <section className="card">
                    <div className="ct">
                      Live Signal & Market Snapshot
                    </div>
                    <div className="sh">
                      <div className={`sm ${liveSignal ? (liveSignal.direction === "CALL" ? "sc2" : "sp") : ""}`}>
                        <div className="sd cg2">
                          {currentPrice != null ? currentPrice.toFixed(5) : "--"}
                        </div>
                        <div className="ss2">
                          {liveSignal
                            ? `${liveSignal.direction} · ${liveSignal.strength}% · ${liveSignal.summary}`
                            : "Waiting for qualified signal..."}
                        </div>
                        <div className="pr">
                          <Sparkline data={priceHistory} />
                        </div>
                        {liveSignal?.components && (
                          <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                            <Pill label="RSI" score={liveSignal.components.rsi.score}
                              agrees={liveSignal.components.rsi.agrees}
                              vote={liveSignal.components.rsi.vote}
                            />
                            <Pill label="BB" score={liveSignal.components.bb.score}
                              agrees={liveSignal.components.bb.agrees}
                              vote={liveSignal.components.bb.vote}
                            />
                            <Pill label="EMA" score={liveSignal.components.ema.score}
                              agrees={liveSignal.components.ema.agrees}
                              vote={liveSignal.components.ema.vote}
                            />
                          </div>
                        )}
                      </div>
                      <div className="gc">
                        <div className="gl">Signal Strength</div>
                        <StrengthGauge value={liveSignal?.strength || 0} />
                        <div style={{ fontSize: 9, color: "#4d9968" }}>
                          Min entry: {minStrength}%
                        </div>
                      </div>
                    </div>

                    {pendingSignal && (
                      <div style={{ marginTop: 12 }}>
                        <div className="pb">
                          <div className="pbt">Pending manual confirmation</div>
                          <div className="pa">
                            <button
                              className="bex gc3"
                              onClick={() => placeTrade(pendingSignal)}
                            >
                              Execute {pendingSignal.direction}
                            </button>
                            <button
                              className="bex rc3"
                              onClick={dismissSignal}
                            >
                              Dismiss
                            </button>
                          </div>
                        </div>
                      </div>
                    )}
                  </section>

                  <section className="card">
                    <div className="tabs">
                      <button
                        className={`tab ${activeTab === "signal" ? "on" : ""}`}
                        onClick={() => setActiveTab("signal")}
                      >
                        Signals
                      </button>
                      <button
                        className={`tab ${activeTab === "trades" ? "on" : ""}`}
                        onClick={() => setActiveTab("trades")}
                      >
                        Trades
                      </button>
                      <button
                        className={`tab ${activeTab === "open" ? "on" : ""}`}
                        onClick={() => setActiveTab("open")}
                      >
                        Open Contracts
                      </button>
                      <button
                        className={`tab ${activeTab === "log" ? "on" : ""}`}
                        onClick={() => setActiveTab("log")}
                      >
                        Log
                      </button>
                    </div>

                    {activeTab === "signal" && (
                      <div>
                        {signals.length === 0 && (
                          <div className="em">No signals yet.</div>
                        )}
                        {signals.map(s => (
                          <div key={s.id} className="shr">
                            <span className={`db ${s.direction}`}>{s.direction}</span>
                            <span className="sr2">
                              {s.summary}
                            </span>
                            <span className="strb">
                              <span className="sst" style={{ color: strColor(s.strength) }}>
                                {s.strength}%
                              </span>
                              <span className="strtr">
                                <span className="strfi" style={{ width: `${s.strength}%`, background: strColor(s.strength) }} />
                              </span>
                            </span>
                            <span className="stim">{s.time}</span>
                          </div>
                        ))}
                      </div>
                    )}

                    {activeTab === "trades" && (
                      <div>
                        <div className="trow th">
                          <div>Time</div>
                          <div>Dir</div>
                          <div>Stake</div>
                          <div>Payout</div>
                          <div>Profit</div>
                          <div>Symbol</div>
                        </div>
                        {trades.length === 0 && (
                          <div className="em">No trades yet.</div>
                        )}
                        {trades.map(t => (
                          <div key={t.id} className="trow">
                            <div>{t.time}</div>
                            <div style={{ color: t.direction === "CALL" ? "#00ff88" : "#ff3d5f" }}>
                              {t.direction}
                            </div>
                            <div>{t.stake.toFixed(2)}</div>
                            <div>{t.payout.toFixed(2)}</div>
                            <div className={t.won ? "pp" : "pn"}>
                              {t.profit.toFixed(2)}
                            </div>
                            <div>{t.symbol}</div>
                          </div>
                        ))}
                      </div>
                    )}

                    {activeTab === "open" && (
                      <div>
                        {openContracts.length === 0 && (
                          <div className="em">No open contracts.</div>
                        )}
                        {openContracts.map(c => (
                          <div key={c.id} className="oc">
                            <span style={{ fontSize: 9, color: "#4d9968" }}>
                              #{c.id}
                            </span>
                            <span style={{ fontSize: 9 }}>
                              {c.symbol} · {c.direction}
                            </span>
                            <span style={{ fontSize: 9, color: "#b0f0cc" }}>
                              {c.buyPrice}
                            </span>
                            <span style={{ marginLeft: "auto", fontSize: 9, color: "#2a5438" }}>
                              {c.openTime}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}

                    {activeTab === "log" && (
                      <div>
                        {logs.length === 0 && (
                          <div className="em">No logs yet.</div>
                        )}
                        {logs.map(l => (
                          <div key={l.id} className="lr">
                            <span className="lt">{l.time}</span>
                            <span className={`lm ${l.type}`}>{l.msg}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </section>

                  <section className="card">
                    <div className="ct">Notes</div>
                    <div className="hn">
                      • Tuned for Volatility 50 index – parameters are conservative and require stronger confluence before entry.{" "}
                      • Max daily loss is a percentage of balance, and Martingale stakes are capped at 5% of balance.{" "}
                      • Always forward‑test this on a demo account before going live.
                    </div>
                  </section>
                </main>
              </div>
            </div>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<DerivBot />);
    </script>
  </body>
</html>
