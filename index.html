<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DerivBot</title>
    <script src="[https://unpkg.com/react@18.2.0/umd/react.development.js](https://unpkg.com/react@18.2.0/umd/react.development.js)" crossorigin></script>
    <script src="[https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js](https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js)" crossorigin></script>
    <script src="[https://unpkg.com/@babel/standalone@7.23.10/babel.min.js](https://unpkg.com/@babel/standalone@7.23.10/babel.min.js)"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="env,react">
      const { useState, useRef, useCallback, useEffect } = React;

      const DERIV_WS_URL = "wss://[ws.binaryws.com/websockets/v3?app_id=1089](https://ws.binaryws.com/websockets/v3?app_id=1089)";

      const SYMBOLS = [
        { value: "R_10",  label: "Volatility 10",  tag: "V10"  },
        { value: "R_25",  label: "Volatility 25",  tag: "V25"  },
        { value: "R_50",  label: "Volatility 50",  tag: "V50"  },
        { value: "R_75",  label: "Volatility 75",  tag: "V75"  },
        { value: "R_100", label: "Volatility 100", tag: "V100" },
      ];

      const STRATEGIES = [
        { value: "HYBRID", label: "Hybrid (RSI+BB+EMA)" },
        { value: "RSI",    label: "RSI Only"            },
        { value: "EMA",    label: "EMA Only"            },
        { value: "BB",     label: "Bollinger Band Only" },
        { value: "MACD",   label: "MACD Only"           },
      ];

      const DURATIONS = [
        { value: 1,  label: "1 min"  },
        { value: 2,  label: "2 min"  },
        { value: 5,  label: "5 min"  },
        { value: 10, label: "10 min" },
        { value: 15, label: "15 min" },
      ];

      // ─── Config ──────────────────────────────────────────────────────────────────
      const BASE_CFG = {
        HYBRID: { rsiPeriod:14, rsiBuy:30, rsiSell:70, bbPeriod:20, bbTouchPct:0.15, emaFast:9, emaSlow:21, minStrength:68, cooldownMs:25000, atrPeriod:14, atrMinPct:0.0003 },
        RSI:    { period:14, buy:30, sell:70, minStrength:65, cooldownMs:25000 },
        EMA:    { fast:9, slow:21, minStrength:70, cooldownMs:25000 },
        BB:     { period:20, touchPct:0.15, minStrength:65, cooldownMs:25000 },
        MACD:   { fast:12, slow:26, signal:9, minStrength:68, cooldownMs:25000 },
      };

      const SYMBOL_CFG = {
        R_50: {
          HYBRID: { rsiPeriod:10, rsiBuy:28, rsiSell:72, bbPeriod:18, bbTouchPct:0.18, emaFast:9, emaSlow:21, minStrength:70, cooldownMs:20000, atrPeriod:10, atrMinPct:0.0004 },
          RSI:    { period:9,  buy:25, sell:75, minStrength:68, cooldownMs:20000 },
          EMA:    { fast:7, slow:21, minStrength:74, cooldownMs:20000 },
          BB:     { period:18, touchPct:0.18, minStrength:70, cooldownMs:20000 },
          MACD:   { fast:12, slow:26, signal:9, minStrength:72, cooldownMs:20000 },
        },
        R_10: {
          HYBRID: { ...BASE_CFG.HYBRID, rsiBuy:25, rsiSell:75, minStrength:72, cooldownMs:30000 },
          RSI:    { ...BASE_CFG.RSI,  buy:22, sell:78, minStrength:70 },
          EMA:    { ...BASE_CFG.EMA,  fast:5, slow:13 },
          BB:     { ...BASE_CFG.BB,   touchPct:0.12 },
          MACD:   { ...BASE_CFG.MACD },
        },
        R_25: {
          HYBRID: { ...BASE_CFG.HYBRID, rsiBuy:27, rsiSell:73, cooldownMs:22000 },
          RSI:    { ...BASE_CFG.RSI,  buy:27, sell:73 },
          EMA:    { ...BASE_CFG.EMA },
          BB:     { ...BASE_CFG.BB },
          MACD:   { ...BASE_CFG.MACD },
        },
        R_75: {
          HYBRID: { ...BASE_CFG.HYBRID, rsiPeriod:12, bbTouchPct:0.16, cooldownMs:18000 },
          RSI:    { ...BASE_CFG.RSI,  period:12 },
          EMA:    { ...BASE_CFG.EMA,  fast:8 },
          BB:     { ...BASE_CFG.BB,   touchPct:0.16 },
          MACD:   { ...BASE_CFG.MACD },
        },
        R_100: {
          HYBRID: { ...BASE_CFG.HYBRID, rsiPeriod:10, bbTouchPct:0.20, cooldownMs:15000 },
          RSI:    { ...BASE_CFG.RSI,  period:10, buy:26, sell:74 },
          EMA:    { ...BASE_CFG.EMA,  fast:7 },
          BB:     { ...BASE_CFG.BB,   touchPct:0.20 },
          MACD:   { ...BASE_CFG.MACD },
        },
      };

      const getCfg = (sym, strat) => (SYMBOL_CFG[sym]?.[strat]) ?? BASE_CFG[strat] ?? null;

      // ─── Indicators ──────────────────────────────────────────────────────────────
      const calcEMA = (prices, period) => {
        if (prices.length < period) return null;
        const k = 2 / (period + 1);
        let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
        return ema;
      };

      const calcRSI = (prices, period = 14) => {
        if (prices.length < period + 1) return null;
        const changes = [];
        for (let i = 1; i < prices.length; i++) changes.push(prices[i] - prices[i - 1]);
        let avgGain = 0, avgLoss = 0;
        for (let i = 0; i < period; i++) {
          if (changes[i] > 0) avgGain += changes[i];
          else avgLoss += Math.abs(changes[i]);
        }
        avgGain /= period; avgLoss /= period;
        for (let i = period; i < changes.length; i++) {
          const g = changes[i] > 0 ? changes[i] : 0;
          const l = changes[i] < 0 ? Math.abs(changes[i]) : 0;
          avgGain = (avgGain * (period - 1) + g) / period;
          avgLoss = (avgLoss * (period - 1) + l) / period;
        }
        if (avgLoss === 0) return 100;
        return 100 - 100 / (1 + avgGain / avgLoss);
      };

      const calcBB = (prices, period = 20) => {
        if (prices.length < period) return null;
        const sl = prices.slice(-period);
        const mean = sl.reduce((a, b) => a + b, 0) / period;
        const std = Math.sqrt(sl.map(p => (p - mean) ** 2).reduce((a, b) => a + b, 0) / period);
        return { upper: mean + 2 * std, middle: mean, lower: mean - 2 * std };
      };

      const calcMACD = (prices, fast = 12, slow = 26, signalPeriod = 9) => {
        if (prices.length < slow + signalPeriod) return null;
        const kF = 2 / (fast + 1), kS = 2 / (slow + 1);
        let eF = prices.slice(0, fast).reduce((a, b) => a + b, 0) / fast;
        let eS = prices.slice(0, slow).reduce((a, b) => a + b, 0) / slow;
        for (let i = fast; i < slow; i++) eF = prices[i] * kF + eF * (1 - kF);
        const macdHist = [];
        for (let i = slow; i < prices.length; i++) {
          eF = prices[i] * kF + eF * (1 - kF);
          eS = prices[i] * kS + eS * (1 - kS);
          macdHist.push(eF - eS);
        }
        if (macdHist.length < signalPeriod) return null;
        const kSig = 2 / (signalPeriod + 1);
        let sig = macdHist.slice(0, signalPeriod).reduce((a, b) => a + b, 0) / signalPeriod;
        for (let i = signalPeriod; i < macdHist.length; i++) sig = macdHist[i] * kSig + sig * (1 - kSig);
        const macd = macdHist[macdHist.length - 1];
        return { macd, signal: sig, histogram: macd - sig };
      };

      const calcATR = (prices, period = 14) => {
        if (prices.length < period + 1) return null;
        let sum = 0;
        for (let i = prices.length - period; i < prices.length; i++) sum += Math.abs(prices[i] - prices[i - 1]);
        return sum / period;
      };

      // ─── Signal Logic ────────────────────────────────────────────────────────────
      const computeHybrid = (prices, symbol) => {
        const cfg = getCfg(symbol, "HYBRID");
        if (!cfg || prices.length < 50) return null;
        const price = prices[prices.length - 1];
        if (cfg.atrPeriod && cfg.atrMinPct) {
          const atr = calcATR(prices, cfg.atrPeriod);
          if (atr !== null && price > 0 && atr / price < cfg.atrMinPct) return null;
        }
        const rsi   = calcRSI(prices, cfg.rsiPeriod);
        const bb    = calcBB(prices, cfg.bbPeriod);
        const eFast = calcEMA(prices, cfg.emaFast);
        const eSlow = calcEMA(prices, cfg.emaSlow);
        if (rsi === null || bb === null || eFast === null || eSlow === null) return null;

        let rsiVote = 0, rsiScore = 0, rsiLabel = "";
        if (rsi < cfg.rsiBuy)       { rsiVote = 1;  rsiScore = Math.min(100, 65 + (cfg.rsiBuy - rsi) * 3); rsiLabel = rsi.toFixed(1) + " oversold"; }
        else if (rsi > cfg.rsiSell) { rsiVote = -1; rsiScore = Math.min(100, 65 + (rsi - cfg.rsiSell) * 3); rsiLabel = rsi.toFixed(1) + " overbought"; }
        else                        { rsiScore = Math.max(25, 55 - Math.abs(rsi - 50) * 1.3); rsiLabel = rsi.toFixed(1) + " neutral"; }

        const bbRange = bb.upper - bb.lower;
        const bbPos   = bbRange > 0 ? (price - bb.lower) / bbRange : 0.5;
        let bbVote = 0, bbScore = 0, bbLabel = "";
        if (bbPos < cfg.bbTouchPct)          { bbVote = 1;  bbScore = Math.min(100, 65 + (cfg.bbTouchPct - bbPos) * 260); bbLabel = (bbPos * 100).toFixed(0) + "% near lower"; }
        else if (bbPos > 1 - cfg.bbTouchPct) { bbVote = -1; bbScore = Math.min(100, 65 + (bbPos - (1 - cfg.bbTouchPct)) * 260); bbLabel = (bbPos * 100).toFixed(0) + "% near upper"; }
        else                                  { bbScore = 40; bbLabel = (bbPos * 100).toFixed(0) + "% mid band"; }

        const sep      = Math.abs(eFast - eSlow) / ((eSlow || 1) * 0.001 + 0.0001);
        const emaScore = Math.min(100, 60 + Math.min(sep * 22, 100) * 0.35);
        const emaVote  = eFast > eSlow ? 1 : -1;
        const emaLabel = eFast > eSlow ? "Fast above slow" : "Fast below slow";

        const callV = [rsiVote, bbVote, emaVote].filter(v => v === 1).length;
        const putV  = [rsiVote, bbVote, emaVote].filter(v => v === -1).length;
        if (callV < 2 && putV < 2) return null;

        const direction = callV >= putV ? "CALL" : "PUT";
        const dm        = direction === "CALL" ? 1 : -1;
        const allAgree  = callV === 3 || putV === 3;

        const W = { rsi: 0.35, bb: 0.30, ema: 0.35 };
        let ws = 0, tw = 0;
        const addV = (vote, score, w) => {
          if (vote === dm)     { ws += score * w; tw += w; }
          else if (vote === 0) { ws += score * w * 0.25; tw += w * 0.25; }
        };
        addV(rsiVote, rsiScore, W.rsi);
        addV(bbVote,  bbScore,  W.bb);
        if (emaVote === dm) { ws += emaScore * W.ema; tw += W.ema; }

        const strength = Math.min(100, Math.round((tw > 0 ? ws / tw : 0) + (allAgree ? 6 : 0)));
        if (strength < cfg.minStrength) return null;

        return {
          direction, strength, allAgree,
          summary: (allAgree ? "3/3" : "2/3") + " agree",
          components: {
            rsi: { vote: rsiVote, score: Math.round(rsiScore), label: rsiLabel, agrees: rsiVote === dm },
            bb:  { vote: bbVote,  score: Math.round(bbScore),  label: bbLabel,  agrees: bbVote  === dm },
            ema: { vote: emaVote, score: Math.round(emaScore), label: emaLabel, agrees: emaVote === dm },
          },
        };
      };

      const computeSingle = (strategy, prices, prev, symbol) => {
        if (prices.length < 40) return null;
        const cfg = getCfg(symbol, strategy);
        if (!cfg) return null;

        if (strategy === "RSI") {
          const rsi = calcRSI(prices, cfg.period);
          if (rsi === null) return null;
          if (rsi < cfg.buy)  return { direction:"CALL", strength:Math.min(100, Math.round(cfg.minStrength + (cfg.buy - rsi) * 3)),  summary:"RSI " + rsi.toFixed(1) + " oversold",   components:null };
          if (rsi > cfg.sell) return { direction:"PUT",  strength:Math.min(100, Math.round(cfg.minStrength + (rsi - cfg.sell) * 3)), summary:"RSI " + rsi.toFixed(1) + " overbought", components:null };
        }

        if (strategy === "EMA") {
          const pp    = prev.length >= cfg.slow ? prev : prices.slice(0, -1);
          const eFast = calcEMA(prices, cfg.fast), eSlow = calcEMA(prices, cfg.slow);
          const pFast = calcEMA(pp, cfg.fast),     pSlow = calcEMA(pp, cfg.slow);
          if (!eFast || !eSlow || !pFast || !pSlow) return null;
          if (pFast < pSlow && eFast > eSlow) return { direction:"CALL", strength:cfg.minStrength, summary:"Fast EMA crossed above slow", components:null };
          if (pFast > pSlow && eFast < eSlow) return { direction:"PUT",  strength:cfg.minStrength, summary:"Fast EMA crossed below slow", components:null };
        }

        if (strategy === "BB") {
          const price = prices[prices.length - 1];
          const bb = calcBB(prices, cfg.period);
          if (!bb) return null;
          const rng = bb.upper - bb.lower;
          const pos = rng > 0 ? (price - bb.lower) / rng : 0.5;
          if (pos <= cfg.touchPct)     return { direction:"CALL", strength:cfg.minStrength, summary:"Price near lower BB", components:null };
          if (pos >= 1 - cfg.touchPct) return { direction:"PUT",  strength:cfg.minStrength, summary:"Price near upper BB", components:null };
        }

        if (strategy === "MACD") {
          const pp = prev.length >= cfg.slow ? prev : prices.slice(0, -1);
          const m  = calcMACD(prices, cfg.fast, cfg.slow, cfg.signal);
          const pm = calcMACD(pp,     cfg.fast, cfg.slow, cfg.signal);
          if (!m || !pm) return null;
          if (pm.macd < pm.signal && m.macd > m.signal) return { direction:"CALL", strength:cfg.minStrength, summary:"MACD crossed above signal", components:null };
          if (pm.macd > pm.signal && m.macd < m.signal) return { direction:"PUT",  strength:cfg.minStrength, summary:"MACD crossed below signal", components:null };
        }

        return null;
      };

      const getSignal = (strategy, prices, prev, symbol) =>
        strategy === "HYBRID" ? computeHybrid(prices, symbol) : computeSingle(strategy, prices, prev, symbol);

      // ─── Sparkline ───────────────────────────────────────────────────────────────
      const Sparkline = ({ data, color, width, height }) => {
        const c = color || "#00ff88", w = width || 120, h = height || 34;
        if (!data || data.length < 2) return React.createElement("svg", { width: w, height: h });
        const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
        const pts = data.map((v, i) =>
          ((i / (data.length - 1)) * w).toFixed(1) + "," + (h - ((v - min) / range) * (h - 2) - 1).toFixed(1)
        ).join(" ");
        return (
          <svg width={w} height={h} style={{ overflow:"visible" }}>
            <polyline points={pts} fill="none" stroke={c} strokeWidth="1.5" strokeLinejoin="round" />
          </svg>
        );
      };

      // ─── Strength Gauge ──────────────────────────────────────────────────────────
      const StrengthGauge = ({ value, size }) => {
        const sz = size || 68;
        const r = sz / 2 - 7, cx = sz / 2, cy = sz / 2;
        const toRad = d => (d * Math.PI) / 180;
        const arc = (s, e) => {
          const sx = cx + r * Math.cos(toRad(s)), sy = cy + r * Math.sin(toRad(s));
          const ex = cx + r * Math.cos(toRad(e)), ey = cy + r * Math.sin(toRad(e));
          return "M " + sx + " " + sy + " A " + r + " " + r + " 0 " + (e - s > 180 ? 1 : 0) + " 1 " + ex + " " + ey;
        };
        const color  = value >= 80 ? "#00ff88" : value >= 65 ? "#ffaa00" : "#ff3d5f";
        const endDeg = 135 + (value / 100) * 270;
        return (
          <svg width={sz} height={sz}>
            <path d={arc(135, 404.9)} fill="none" stroke="#162e22" strokeWidth="6" strokeLinecap="round" />
            <path d={arc(135, Math.min(endDeg, 404.8))} fill="none" stroke={color} strokeWidth="6"
              strokeLinecap="round" style={{ filter:"drop-shadow(0 0 5px " + color + "90)" }} />
            <text x={cx} y={cy + 5} textAnchor="middle" fill={color} fontSize="13"
              fontFamily="'Syne',sans-serif" fontWeight="800">{value}%</text>
          </svg>
        );
      };

      // ─── Indicator Pill ──────────────────────────────────────────────────────────
      const Pill = ({ label, score, agrees, vote }) => {
        const color  = agrees ? "#00ff88" : vote === 0 ? "#5a9e78" : "#ff3d5f";
        const bg     = agrees ? "rgba(0,255,136,.09)" : vote === 0 ? "rgba(90,158,120,.06)" : "rgba(255,61,95,.09)";
        const border = agrees ? "rgba(0,255,136,.3)"  : vote === 0 ? "rgba(90,158,120,.2)"  : "rgba(255,61,95,.3)";
        const arrow  = vote === 1 ? "↑" : vote === -1 ? "↓" : "–";
        return (
          <div style={{ flex:1, background:bg, border:"1px solid " + border, borderRadius:4, padding:"7px 9px", display:"flex", flexDirection:"column", gap:4 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ fontSize:8, color:"#5a9e78", letterSpacing:1.5, textTransform:"uppercase" }}>{label}</span>
              <span style={{ fontSize:13, color:color, fontWeight:700, lineHeight:1 }}>{arrow}</span>
            </div>
            <div style={{ fontSize:12, color:color, fontWeight:700 }}>{score}%</div>
            <div style={{ height:3, background:"#162e22", borderRadius:2 }}>
              <div style={{ height:"100%", width:score + "%", background:color, borderRadius:2, transition:"width .4s" }} />
            </div>
          </div>
        );
      };

      // ─── Styles ──────────────────────────────────────────────────────────────────
      const CSS = "@import url('[https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap)');" +
        "*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}" +
        ":root{--bg:#020c08;--bg2:#050f0a;--bg3:#0a1910;--bd:#142a1c;--bd2:#1e3d2c;--g:#00ff88;--b:#00ccff;--r:#ff3d5f;--y:#ffaa00;--t:#b0f0cc;--t2:#4d9968;--t3:#2a5438;--card:#060d09}" +
        "body{background:var(--bg)}" +
        ".R{font-family:'Space Mono',monospace;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}" +
        ".H{display:flex;align-items:center;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:200;gap:8px}" +
        ".Lg{display:flex;align-items:center;gap:9px;flex-shrink:0}" +
        ".Lh{width:24px;height:24px;background:var(--g);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0}" +
        ".Lt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px}" +
        ".Lt em{color:var(--g);font-style:normal}" +
        ".Ls{font-size:7px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:1px}" +
        ".Hr{display:flex;align-items:center;gap:10px;margin-left:auto}" +
        ".dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}" +
        ".dot.on{background:var(--g);box-shadow:0 0 8px var(--g);animation:blink 2s infinite}" +
        ".dot.er{background:var(--r)}" +
        "@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}" +
        ".wsl{font-size:9px;color:var(--t2);letter-spacing:1px;text-transform:uppercase}" +
        ".acl{font-size:9px;color:var(--t2);white-space:nowrap}" +
        ".hb{display:none;background:none;border:1px solid var(--bd);color:var(--t2);padding:6px 11px;border-radius:3px;cursor:pointer;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;min-height:36px;white-space:nowrap}" +

        ".sbl{font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--bd);padding-bottom:5px;margin-bottom:2px}" +

        ".fi:focus,.fse:focus{border-color:var(--g)}" +
        ".fi::placeholder{color:var(--t3)}" +
        ".fse option{background:var(--bg3)}" +
        ".tr{display:flex;align-items:center;justify-content:space-between;padding:2px 0}" +
        ".tl{font-size:10px;color:var(--t2)}" +
        ".tog{position:relative;width:32px;height:18px;cursor:pointer;flex-shrink:0}" +
        ".tog input{opacity:0;width:0;height:0;position:absolute}" +
        ".tt{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--bd);border-radius:17px;transition:all .2s}" +
        ".tog input:checked ~ .tt{background:var(--g);border-color:var(--g)}" +
        ".tb{position:absolute;top:3px;left:3px;width:10px;height:10px;border-radius:50%;background:var(--t3);transition:all .2s}" +
        ".tog input:checked ~ .tb{transform:translateX(15px);background:var(--bg)}" +
        ".btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:9px 12px;border-radius:3px;border:none;cursor:pointer;transition:all .15s;font-weight:700;min-height:40px;width:100%}" +
        ".bg{background:var(--g);color:var(--bg)}" +
        ".bg:hover{filter:brightness(1.15)}" +
        ".bg:disabled{opacity:.4;cursor:not-allowed}" +
        ".br{background:var(--r);color:#fff}" +

        ".trow.th{color:var(--t3);font-size:7px;letter-spacing:1px;text-transform:uppercase}" +

        ".rb{width:100%;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:3px}" +
        ".rf{height:100%;border-radius:2px;transition:width .5s,background .5s}" +

        "::-webkit-scrollbar{width:3px;height:3px}" +
        "::-webkit-scrollbar-track{background:var(--bg)}" +
        "::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}" +
        "@media(max-width:860px){.sg{grid-template-columns:repeat(2,1fr)}.hb{display:block}.wsl{display:none}.lay{flex-direction:row}.S{position:fixed;top:0;left:0;bottom:0;z-index:199;width:260px;min-width:260px;transform:translateX(-100%);padding-top:58px;box-shadow:4px 0 24px rgba(0,0,0,.6)}.S.open{transform:translateX(0)}.ov.open{display:block}.M{padding:10px}}" +
        "@media(max-width:480px){.sg{grid-template-columns:repeat(2,1fr)}.sh{flex-direction:column}.gc{flex-direction:row;min-width:0;width:100%;justify-content:flex-start;gap:12px;padding:8px 10px}.trow{grid-template-columns:46px 32px 40px 50px 50px 50px;font-size:8px;gap:3px;padding:4px 6px}.strb{display:none}.stv{font-size:16px}.pb2{font-size:20px}.card{padding:10px}.M{padding:8px;gap:8px}}";

      // ─── Main App ────────────────────────────────────────────────────────────────
      function DerivBot() {
        const [tokenInput, setTokenInput]   = useState("");
        const [connected, setConnected]     = useState(false);
        const [authorized, setAuthorized]   = useState(false);
        const [accountInfo, setAccountInfo] = useState(null);
        const [balance, setBalance]         = useState(null);
        const [wsStatus, setWsStatus]       = useState("disconnected");
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [symbol, setSymbol]           = useState("R_50");
        const [strategy, setStrategy]       = useState("HYBRID");
        const [stake, setStake]             = useState("1");
        const [duration, setDuration]       = useState(5);
        const [maxDailyLoss, setMaxDailyLoss] = useState("5");
        const [maxTrades, setMaxTrades]     = useState("20");
        const [minStrength, setMinStrength] = useState("70");
        const [martingale, setMartingale]   = useState(false);
        const [martMul, setMartMul]         = useState("1.8");
        const [execMode, setExecMode]       = useState("auto");
        const [botRunning, setBotRunning]   = useState(false);
        const [currentPrice, setCurrentPrice] = useState(null);
        const [priceHistory, setPriceHistory] = useState([]);
        const [liveSignal, setLiveSignal]   = useState(null);
        const [pendingSignal, setPendingSignal] = useState(null);
        const [signals, setSignals]         = useState([]);
        const [trades, setTrades]           = useState([]);
        const [openContracts, setOpenContracts] = useState([]);
        const [dailyPnL, setDailyPnL]       = useState(0);
        const [todayTrades, setTodayTrades] = useState(0);
        const [consecLosses, setConsecLosses] = useState(0);
        const [activeTab, setActiveTab]     = useState("signal");
        const [logs, setLogs]               = useState([]);

        const socketRef      = useRef(null);
        const pricesRef      = useRef([]);
        const prevRef        = useRef([]);
        const runningRef     = useRef(false);
        const pnlRef         = useRef(0);
        const tradeCountRef  = useRef(0);
        const consecLossRef  = useRef(0);
        const initStakeRef   = useRef(1);
        const curStakeRef    = useRef(1);
        const execModeRef    = useRef("auto");
        const symbolRef      = useRef("R_50");
        const strategyRef    = useRef("HYBRID");
        const durationRef    = useRef(5);
        const minStrRef      = useRef(70);
        const accountInfoRef = useRef(null);
        const martingaleRef  = useRef(false);
        const martMulRef     = useRef(1.8);
        const maxLossRef     = useRef(0);
        const maxTradesRef   = useRef(20);
        const lastSignalRef  = useRef(0);
        const tickCountRef   = useRef(0);
        const pendingDirs    = useRef({});
        const handleMsgRef   = useRef(null);
        const evalSignalRef  = useRef(null);
        const lastUiUpdateRef = useRef(0); // <-- Added Ref for throttling UI

        useEffect(() => { execModeRef.current    = execMode;                }, [execMode]);
        useEffect(() => { symbolRef.current      = symbol;                  }, [symbol]);
        useEffect(() => { strategyRef.current    = strategy;                }, [strategy]);
        useEffect(() => { durationRef.current    = duration;                }, [duration]);
        useEffect(() => { minStrRef.current      = parseFloat(minStrength); }, [minStrength]);
        useEffect(() => { accountInfoRef.current = accountInfo;             }, [accountInfo]);
        useEffect(() => { martingaleRef.current  = martingale;              }, [martingale]);
        useEffect(() => { martMulRef.current     = parseFloat(martMul);     }, [martMul]);
        useEffect(() => { maxTradesRef.current   = parseInt(maxTrades, 10); }, [maxTrades]);
        useEffect(() => { initStakeRef.current   = parseFloat(stake);       }, [stake]);
        useEffect(() => {
          const bal = accountInfoRef.current?.balance ?? 0;
          maxLossRef.current = (bal * (parseFloat(maxDailyLoss) || 0)) / 100;
        }, [maxDailyLoss, balance, accountInfo]);

        const addLog = useCallback((msg, type) => {
          const t = type || "info";
          const time = new Date().toLocaleTimeString("en-GB");
          setLogs(p => [{ time, msg, type:t, id: Date.now() + Math.random() }, ...p].slice(0, 100));
        }, []);

        const placeTrade = useCallback((signal) => {
          if (!socketRef.current || socketRef.current.readyState !== WebSocket.OPEN) {
            addLog("WebSocket not ready", "error"); return;
          }
          const s = curStakeRef.current;
          pendingDirs.current["__next"] = signal.direction;
          socketRef.current.send(JSON.stringify({
            buy: 1, price: s,
            parameters: {
              amount: s, basis: "stake",
              contract_type: signal.direction,
              currency: accountInfoRef.current?.currency || "USD",
              duration: durationRef.current, duration_unit: "m",
              symbol: symbolRef.current,
            },
          }));
          setPendingSignal(null);
          addLog("Placing " + signal.direction + " · stake " + s.toFixed(2) + " · strength " + signal.strength + "%", "success");
        }, [addLog]);

        const dismissSignal = useCallback(() => {
          addLog("Signal dismissed", "warning");
          setPendingSignal(null);
        }, [addLog]);

        const handleMsg = (data) => {
          if (data.error) { addLog("Deriv error: " + data.error.message, "error"); return; }

          if (data.msg_type === "authorize") {
            setAuthorized(true);
            setAccountInfo(data.authorize);
            accountInfoRef.current = data.authorize;
            setBalance(data.authorize.balance);
            maxLossRef.current = (data.authorize.balance * (parseFloat(maxDailyLoss) || 0)) / 100;
            addLog("Authorized — " + data.authorize.loginid + " · " + data.authorize.currency + " " + data.authorize.balance, "success");
            socketRef.current?.send(JSON.stringify({ balance: 1, subscribe: 1 }));
          }

          if (data.msg_type === "balance") {
            setBalance(data.balance.balance);
          }

          if (data.msg_type === "tick") {
            const price = parseFloat(data.tick.quote);
            
            // Background array updates (always run)
            prevRef.current = [...pricesRef.current];
            pricesRef.current = [...pricesRef.current, price].slice(-400);
            tickCountRef.current += 1;
            
            // Background signal evaluation (always run)
            if (runningRef.current && pricesRef.current.length >= 40) {
              evalSignalRef.current(price);
            }

            // UI Throttle: Only update the React component state every 500ms
            const now = Date.now();
            if (now - lastUiUpdateRef.current > 500) {
              setCurrentPrice(price);
              setPriceHistory([...pricesRef.current]);
              lastUiUpdateRef.current = now;
            }
          }

          if (data.msg_type === "buy") {
            const cid = data.buy.contract_id;
            const dir = pendingDirs.current["__next"] || "CALL";
            delete pendingDirs.current["__next"];
            pendingDirs.current[cid] = dir;
            tradeCountRef.current += 1;
            setTodayTrades(p => p + 1);
            addLog("Contract #" + cid + " opened · stake " + data.buy.buy_price, "success");
            setOpenContracts(p => [...p, { id: cid, buyPrice: data.buy.buy_price, openTime: new Date().toLocaleTimeString(), symbol: symbolRef.current, direction: dir }]);
            socketRef.current?.send(JSON.stringify({ proposal_open_contract: 1, contract_id: cid, subscribe: 1 }));
          }

          if (data.msg_type === "proposal_open_contract") {
            const contract = data.proposal_open_contract;
            if (!contract.is_sold) return;
            const cid    = contract.contract_id;
            const profit = parseFloat(contract.profit);
            const dir    = pendingDirs.current[cid] || (contract.contract_type?.includes("CALL") ? "CALL" : "PUT");
            delete pendingDirs.current[cid];
            socketRef.current?.send(JSON.stringify({ forget: cid }));
            pnlRef.current += profit;
            setDailyPnL(p => p + profit);
            setOpenContracts(p => p.filter(c => c.id !== cid));

            if (profit > 0) {
              consecLossRef.current = 0;
              setConsecLosses(0);
              curStakeRef.current = initStakeRef.current;
              addLog("✓ WON +" + profit.toFixed(2), "success");
            } else {
              consecLossRef.current += 1;
              setConsecLosses(consecLossRef.current);
              if (martingaleRef.current) {
                const next = Math.min(curStakeRef.current * martMulRef.current, (accountInfoRef.current?.balance ?? 0) * 0.05);
                curStakeRef.current = next;
                addLog("✗ LOST " + profit.toFixed(2) + " · Martingale → " + next.toFixed(2), "warning");
              } else {
                addLog("✗ LOST " + profit.toFixed(2), "error");
              }
            }

            setTrades(p => [{
              id: cid, time: new Date().toLocaleTimeString(),
              symbol: symbolRef.current, direction: dir,
              stake: parseFloat(contract.buy_price), profit,
              won: profit > 0, payout: parseFloat(contract.sell_price || 0),
            }, ...p].slice(0, 50));
          }
        };

        const evalSignal = (price) => {
          const sym = symbolRef.current;
          const cfg = getCfg(sym, strategyRef.current);

          if (maxLossRef.current > 0 && pnlRef.current <= -maxLossRef.current) {
            addLog("⚠ Daily loss limit hit — stopping", "warning");
            setBotRunning(false); runningRef.current = false; return;
          }
          if (tradeCountRef.current >= maxTradesRef.current) {
            addLog("⚠ Max trades reached — stopping", "warning");
            setBotRunning(false); runningRef.current = false; return;
          }
          if (consecLossRef.current >= 5) {
            addLog("⚠ 5 consecutive losses — cooling down", "warning");
            consecLossRef.current = 0; setConsecLosses(0);
            lastSignalRef.current = Date.now() + 30000; return;
          }

          const prices = pricesRef.current;
          const prev   = prevRef.current.length > 0 ? prevRef.current : prices.slice(0, -1);
          const signal = getSignal(strategyRef.current, prices, prev, sym);
          setLiveSignal(signal);
          if (!signal || signal.strength < minStrRef.current) return;

          const now      = Date.now();
          const cooldown = cfg?.cooldownMs || 20000;
          if (now - lastSignalRef.current < cooldown) return;
          lastSignalRef.current = now;

          const entry = { id: now, time: new Date().toLocaleTimeString(), ...signal, price: price.toFixed(5), acted: execModeRef.current === "auto" };
          setSignals(p => [entry, ...p].slice(0, 30));
          addLog("Signal: " + signal.direction + " · " + signal.strength + "% · " + signal.summary, "signal");

          if (execModeRef.current === "auto") placeTrade(signal);
          else setPendingSignal(entry);
        };

        handleMsgRef.current  = handleMsg;
        evalSignalRef.current = evalSignal;

        const connect = useCallback(() => {
          if (socketRef.current) socketRef.current.close();
          setWsStatus("connecting");
          addLog("Connecting to Deriv…", "info");
          const ws = new WebSocket(DERIV_WS_URL);
          socketRef.current = ws;
          ws.onopen    = () => { setConnected(true);  setWsStatus("connected");    addLog("Connected", "success"); };
          ws.onclose   = () => { setConnected(false); setAuthorized(false); setWsStatus("disconnected"); setBotRunning(false); runningRef.current = false; addLog("Disconnected", "warning"); };
          ws.onerror   = () => { setWsStatus("error"); addLog("Connection error", "error"); };
          ws.onmessage = (e) => handleMsgRef.current(JSON.parse(e.data));
        }, [addLog]);

        const authorize = () => {
          if (!tokenInput.trim()) { addLog("Enter a token first", "error"); return; }
          socketRef.current?.send(JSON.stringify({ authorize: tokenInput }));
          addLog("Authorizing…", "info");
        };

        const startBot = () => {
          if (!authorized) { addLog("Authorize first", "error"); return; }
          pricesRef.current = []; prevRef.current = []; tickCountRef.current = 0;
          curStakeRef.current = initStakeRef.current;
          setBotRunning(true); runningRef.current = true;
          socketRef.current?.send(JSON.stringify({ forget_all: "ticks" }));
          socketRef.current?.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
          addLog("Bot started · " + strategy + " · " + symbol + " · " + (execMode === "auto" ? "Auto" : "Manual"), "success");
        };

        const stopBot = () => {
          setBotRunning(false); runningRef.current = false;
          socketRef.current?.send(JSON.stringify({ forget_all: "ticks" }));
          setPendingSignal(null); setLiveSignal(null);
          addLog("Bot stopped", "warning");
        };

        const resetDay = () => {
          pnlRef.current = 0; tradeCountRef.current = 0; consecLossRef.current = 0;
          curStakeRef.current = initStakeRef.current;
          setDailyPnL(0); setTodayTrades(0); setConsecLosses(0);
          addLog("Daily stats reset", "info");
        };

        const symInfo   = SYMBOLS.find(s => s.value === symbol);
        const winRate   = trades.length > 0 ? ((trades.filter(t => t.won).length / trades.length) * 100).toFixed(1) : null;
        const lossRatio = maxLossRef.current > 0 ? Math.min(100, (Math.abs(Math.min(0, dailyPnL)) / maxLossRef.current) * 100) : 0;
        const riskColor = lossRatio > 75 ? "#ff3d5f" : lossRatio > 50 ? "#ffaa00" : "#00ff88";
        const strColor  = s => s >= 80 ? "#00ff88" : s >= 65 ? "#ffaa00" : "#ff3d5f";

        return (
          <React.Fragment>
            <style>{CSS}</style>
            <div className="R">

              <header className="H">
                <div className="Lg">
                  <div className="Lh" />
                  <div>
                    <div className="Lt">DERIV<em>BOT</em></div>
                    <div className="Ls">Hybrid Trader v2.1</div>
                  </div>
                </div>
                <div className="Hr">
                  <div className={"dot" + (wsStatus === "connected" ? " on" : wsStatus === "error" ? " er" : "")} />
                  <span className="wsl">{wsStatus}</span>
                  {authorized && (
                    <span className="acl">{accountInfo?.loginid} · {accountInfo?.currency} {balance?.toFixed(2)}</span>
                  )}
                  <button className="hb" onClick={() => setSidebarOpen(o => !o)}>
                    {sidebarOpen ? "✕ Close" : "☰ Config"}
                  </button>
                </div>
              </header>

              <div className="lay">
                <div className={"ov" + (sidebarOpen ? " open" : "")} onClick={() => setSidebarOpen(false)} />

                <aside className={"S" + (sidebarOpen ? " open" : "")}>
                  <div>
                    <div className="sbl">Connection</div>
                    <div className="sbs">
                      <div className="fg">
                        <label className="fl">Token</label>
                        <input className="fi" type="password" placeholder="Paste Deriv API token"
                          value={tokenInput} onChange={e => setTokenInput(e.target.value)} />
                      </div>
                      <button className="btn bg" onClick={connect} disabled={connected}>
                        {connected ? "Connected" : "Connect"}
                      </button>
                      <button className="btn bh" onClick={authorize} disabled={!connected || authorized}>
                        {authorized ? "Authorized ✓" : "Authorize"}
                      </button>
                    </div>
                  </div>

                  <div>
                    <div className="sbl">Market &amp; Strategy</div>
                    <div className="sbs">
                      <div className="fg">
                        <label className="fl">Symbol</label>
                        <select className="fse" value={symbol} onChange={e => setSymbol(e.target.value)}>
                          {SYMBOLS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                        </select>
                      </div>
                      <div className="fg">
                        <label className="fl">Strategy</label>
                        <select className="fse" value={strategy} onChange={e => setStrategy(e.target.value)}>
                          {STRATEGIES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                        </select>
                      </div>
                      <div className="fg">
                        <label className="fl">Duration</label>
                        <select className="fse" value={duration} onChange={e => setDuration(parseInt(e.target.value, 10))}>
                          {DURATIONS.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
                        </select>
                      </div>
                    </div>
                  </div>

                  <div>
                    <div className="sbl">Risk &amp; Money</div>
                    <div className="sbs">
                      <div className="fg">
                        <label className="fl">Stake (amount)</label>
                        <input className="fi" value={stake} onChange={e => setStake(e.target.value)} />
                      </div>
                      <div className="fg">
                        <label className="fl">Max daily loss (% of balance)</label>
                        <input className="fi" value={maxDailyLoss} onChange={e => setMaxDailyLoss(e.target.value)} />
                      </div>
                      <div className="fg">
                        <label className="fl">Max trades per day</label>
                        <input className="fi" value={maxTrades} onChange={e => setMaxTrades(e.target.value)} />
                      </div>
                      <div className="fg">
                        <label className="fl">Min signal strength</label>
                        <input className="fi" value={minStrength} onChange={e => setMinStrength(e.target.value)} />
                      </div>
                      <div className="tr">
                        <span className="tl">Martingale (capped 5%)</span>
                        <label className="tog">
                          <input type="checkbox" checked={martingale} onChange={e => setMartingale(e.target.checked)} />
                          <span className="tt" />
                          <span className="tb" />
                        </label>
                      </div>
                      {martingale && (
                        <div className="fg">
                          <label className="fl">Martingale multiplier</label>
                          <input className="fi" value={martMul} onChange={e => setMartMul(e.target.value)} />
                        </div>
                      )}
                    </div>
                  </div>

                  <div>
                    <div className="sbl">Execution</div>
                    <div className="sbs">
                      <div className="mr">
                        <button className={"mb" + (execMode === "auto" ? " ma" : "")} onClick={() => setExecMode("auto")}>Auto</button>
                        <button className={"mb" + (execMode === "manual" ? " mm" : "")} onClick={() => setExecMode("manual")}>Manual</button>
                      </div>
                      <button className="btn bg" onClick={() => { startBot(); setSidebarOpen(false); }} disabled={!authorized || botRunning}>Start Bot</button>
                      <button className="btn br" onClick={stopBot} disabled={!botRunning}>Stop Bot</button>
                      <button className="btn bh" onClick={resetDay}>Reset Daily Stats</button>
                    </div>
                  </div>
                </aside>

                <main className="M">

                  <section className="sg">
                    <div className="st">
                      <div className="stl">Market</div>
                      <div className="stv">{symInfo?.label || symbol}</div>
                      <div className="sts">Tag: {symInfo?.tag}</div>
                    </div>
                    <div className="st">
                      <div className="stl">Balance</div>
                      <div className="stv cg">{balance != null ? balance.toFixed(2) : "--"}</div>
                      <div className="sts">Live account</div>
                    </div>
                    <div className="st">
                      <div className="stl">Today PnL</div>
                      <div className={"stv " + (dailyPnL >= 0 ? "cg" : "cr")}>{dailyPnL.toFixed(2)}</div>
                      <div className="sts">{"Trades: " + todayTrades + (winRate ? " · " + winRate + "% WR" : "")}</div>
                    </div>
                    <div className="st">
                      <div className="stl">Risk Load</div>
                      <div className="stv"><span style={{ color: riskColor }}>{lossRatio.toFixed(1)}%</span></div>
                      <div className="rb"><div className="rf" style={{ width: lossRatio + "%", background: riskColor }} /></div>
                      <div className="sts">vs daily cap</div>
                    </div>
                  </section>

                  <section className="card">
                    <div className="ct">Live Signal &amp; Market Snapshot</div>
                    <div className="sh">
                      <div className={"sm" + (liveSignal ? (liveSignal.direction === "CALL" ? " sc2" : " sp") : "")}>
                        <div className="pb2">{currentPrice != null ? currentPrice.toFixed(5) : "--"}</div>
                        <div className="sd">
                          {liveSignal ? (liveSignal.direction + " · " + liveSignal.strength + "% · " + liveSignal.summary) : "Waiting for qualified signal…"}
                        </div>
                        <div><Sparkline data={priceHistory} /></div>
                        {liveSignal && liveSignal.components && (
                          <div style={{ display:"flex", gap:6, marginTop:4 }}>
                            <Pill label="RSI" score={liveSignal.components.rsi.score} agrees={liveSignal.components.rsi.agrees} vote={liveSignal.components.rsi.vote} />
                            <Pill label="BB"  score={liveSignal.components.bb.score}  agrees={liveSignal.components.bb.agrees}  vote={liveSignal.components.bb.vote}  />
                            <Pill label="EMA" score={liveSignal.components.ema.score} agrees={liveSignal.components.ema.agrees} vote={liveSignal.components.ema.vote} />
                          </div>
                        )}
                      </div>
                      <div className="gc">
                        <div className="gl">Strength</div>
                        <StrengthGauge value={liveSignal ? liveSignal.strength : 0} />
                        <div style={{ fontSize:9, color:"#4d9968" }}>Min: {minStrength}%</div>
                      </div>
                    </div>
                    {pendingSignal && (
                      <div className="pb">
                        <div className="pbt">Manual confirmation required</div>
                        <div className="pa">
                          <button className="be gc3" onClick={() => placeTrade(pendingSignal)}>Execute {pendingSignal.direction}</button>
                          <button className="be rc3" onClick={dismissSignal}>Dismiss</button>
                        </div>
                      </div>
                    )}
                  </section>

                  <section className="card">
                    <div className="tabs">
                      {[["signal","Signals"],["trades","Trades"],["open","Open"],["log","Log"]].map(function(item) {
                        return (
                          <button key={item[0]} className={"tab" + (activeTab === item[0] ? " on" : "")} onClick={() => setActiveTab(item[0])}>
                            {item[1]}
                          </button>
                        );
                      })}
                    </div>

                    {activeTab === "signal" && (
                      <div>
                        {signals.length === 0 && <div className="em">No signals yet.</div>}
                        {signals.map(function(s) {
                          return (
                            <div key={s.id} className="shr">
                              <span className={"db " + s.direction}>{s.direction}</span>
                              <span className="sr2">{s.summary}</span>
                              <span className="strb">
                                <span className="sst" style={{ color: strColor(s.strength) }}>{s.strength}%</span>
                                <span className="strtr">
                                  <span className="strfi" style={{ width: s.strength + "%", background: strColor(s.strength) }} />
                                </span>
                              </span>
                              <span className="stim">{s.time}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {activeTab === "trades" && (
                      <div>
                        <div className="trow th">
                          <div>Time</div><div>Dir</div><div>Stake</div><div>Payout</div><div>Profit</div><div>Sym</div>
                        </div>
                        {trades.length === 0 && <div className="em">No trades yet.</div>}
                        {trades.map(function(t) {
                          return (
                            <div key={t.id} className="trow">
                              <div>{t.time}</div>
                              <div style={{ color: t.direction === "CALL" ? "#00ff88" : "#ff3d5f" }}>{t.direction}</div>
                              <div>{t.stake.toFixed(2)}</div>
                              <div>{t.payout.toFixed(2)}</div>
                              <div className={t.won ? "pp" : "pn"}>{t.profit.toFixed(2)}</div>
                              <div>{t.symbol}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {activeTab === "open" && (
                      <div>
                        {openContracts.length === 0 && <div className="em">No open contracts.</div>}
                        {openContracts.map(function(c) {
                          return (
                            <div key={c.id} className="oc">
                              <span style={{ fontSize:9, color:"#4d9968" }}>#{c.id}</span>
                              <span style={{ fontSize:9 }}>{c.symbol} · {c.direction}</span>
                              <span style={{ fontSize:9, color:"#b0f0cc" }}>{c.buyPrice}</span>
                              <span style={{ marginLeft:"auto", fontSize:9, color:"#2a5438" }}>{c.openTime}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {activeTab === "log" && (
                      <div>
                        {logs.length === 0 && <div className="em">No logs yet.</div>}
                        {logs.map(function(l) {
                          return (
                            <div key={l.id} className="lr">
                              <span className="lt">{l.time}</span>
                              <span className={"lm " + l.type}>{l.msg}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}

                  </section>

                  <section className="card">
                    <div className="ct">Notes</div>
                    <div className="hn">
                      · Hybrid uses Wilder RSI, true EMA MACD signal, and ATR volatility filter.
                      Each symbol has individually tuned parameters — V50 is the most aggressive.
                      Martingale capped at 5% of balance per stake.
                      Always test on a demo account before going live.
                    </div>
                  </section>

                </main>

              </div>

            </div>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<DerivBot />);
    </script>
  </body>
</html>
